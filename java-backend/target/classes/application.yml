spring:
  application:
    name: videotomd-backend
  
  # 数据源配置
  datasource:
    url: jdbc:mysql://localhost:3306/video_to_markdown?useUnicode=true&characterEncoding=utf8&useSSL=false&serverTimezone=Asia/Shanghai
    username: root
    password: ${MYSQL_PASSWORD:123456}
    driver-class-name: com.mysql.cj.jdbc.Driver
  
  # JPA配置
  jpa:
    hibernate:
      ddl-auto: none  # 使用SQL脚本管理表结构
    show-sql: true
    properties:
      hibernate:
        format_sql: true
        dialect: org.hibernate.dialect.MySQLDialect
  
  # RabbitMQ配置
  rabbitmq:
    host: localhost
    port: 5672
    username: admin
    password: ${RABBITMQ_PASSWORD:admin123}
    listener:
      simple:
        acknowledge-mode: manual  # 手动ACK
        prefetch: 1  # 每次只处理一个消息
  
  # 文件上传配置
  servlet:
    multipart:
      max-file-size: 500MB
      max-request-size: 500MB

# 应用自定义配置
app:
  # JWT配置
  jwt:
    secret: ${JWT_SECRET:videotomd-secret-key-change-in-production}
    expiration: 86400000  # 24小时(毫秒)
  
  # 限流配置
  rate-limit:
    daily-limit: 3  # 每天3次
  
  # 文件存储配置
  storage:
    base-path: ${STORAGE_BASE_PATH:./uploads}
    retention-days: 30  # 30天后自动清理

# RabbitMQ队列名称
rabbitmq:
  queue:
    video-task: video.task.queue
    result: result.queue

# Actuator配置
management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics
  endpoint:
    health:
      show-details: always

# SpringDoc配置 (Swagger UI)
springdoc:
  api-docs:
    path: /api-docs
  swagger-ui:
    path: /swagger-ui.html
    operations-sorter: method

# 日志配置
logging:
  level:
    com.videotomd: DEBUG
    org.springframework.security: DEBUG
    org.springframework.amqp: INFO
  pattern:
    console: "%d{yyyy-MM-dd HH:mm:ss} [%thread] %-5level %logger{36} - %msg%n"

# 服务器配置
server:
  port: 8080
  servlet:
    context-path: /
