services:
  gateway-nginx:
    image: nginx:1.27-alpine
    container_name: v2m-gateway-nginx
    restart: unless-stopped
    depends_on:
      - java-orchestrator
    ports:
      - "80:80/tcp"
      - "443:443/tcp"
      - "443:443/udp"
    volumes:
      - ./deploy/gateway/nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - ./deploy/gateway/nginx/certs:/etc/nginx/certs:ro
