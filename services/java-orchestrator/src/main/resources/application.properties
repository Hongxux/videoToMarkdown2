spring.application.name=fusion-orchestrator
server.port=8080

# gRPC Client Configuration
grpc.python.host=localhost
grpc.python.port=50051
grpc.python.timeout-seconds=300
# Keepalive 默认关闭，避免长任务期间触发 Python gRPC 服务端 "too_many_pings" 限流
grpc.python.keepalive.enabled=false
grpc.python.keepalive-time-seconds=600
grpc.python.keepalive-timeout-seconds=20
grpc.python.keepalive-without-calls=false

# Async Timeout Extension (10 minutes)
spring.mvc.async.request-timeout=600000
spring.servlet.multipart.max-file-size=2048MB
spring.servlet.multipart.max-request-size=2048MB
# Async executor (可按部署规模调优)
fusion.async.executor.core-pool-size=5
fusion.async.executor.max-pool-size=10
fusion.async.executor.queue-capacity=25
fusion.async.executor.thread-name-prefix=FusionWorker-

# Download watchdog (增量扫描，避免每轮全量递归遍历)
video.download.watchdog-scan-depth=2
video.download.watchdog-min-rescan-ms=1000
video.task.watchdog.enabled=true
video.task.watchdog.max-total-seconds=28800
video.task.watchdog.max-idle-strikes=3
video.task.watchdog.max-restart-per-stage=2
video.task.watchdog.poll-interval-seconds=10
video.task.watchdog.idle-window-min-seconds=180
video.task.watchdog.idle-window-max-seconds=1800
video.task.watchdog.idle-window-multiplier=3.0
video.task.watchdog.restart-backoff-seconds=60,180,420

# FFmpeg Configuration (auto-detect if empty)
ffmpeg.path=
ffmpeg.threads=4

# Task Queue Configuration
task.queue.max-concurrent=4
task.upload.dir=../../var/uploads
collection.db.path=../../var/state/collections.db
task.cards.root=../../var/cards
telemetry.llm-interaction-log.root=../../var/telemetry/llm-interactions

# Android app update feed (manifest + apk download)
mobile.app.update.android.manifest-path=../../var/app-updates/android/latest.json
mobile.app.update.android.download-base-url=
mobile.app.update.android.download-endpoint=/api/mobile/app/update/apk
mobile.app.update.android.releases-dir=../../var/app-updates/android/releases
mobile.app.update.android.release-apk-subdir=apk
mobile.app.update.android.publish-history-path=../../var/app-updates/android/publish-history.json
mobile.app.update.android.admin-token=hongxu

# Micro Hypothesis Extractor (article_exit async trigger)
telemetry.micro-hypothesis.enabled=true
telemetry.micro-hypothesis.base-url=https://api.deepseek.com/v1
telemetry.micro-hypothesis.model=deepseek-v3
telemetry.micro-hypothesis.api-key=${DEEPSEEK_API_KEY:}
telemetry.micro-hypothesis.timeout-seconds=20
telemetry.micro-hypothesis.max-events=80
telemetry.micro-hypothesis.cache-root=../../var/telemetry/cognitive-cache
telemetry.micro-hypothesis.cache-ttl-hours=168
telemetry.micro-hypothesis.prompt.system-resource=classpath:prompts/telemetry/micro-hypothesis/system-zh.txt
telemetry.micro-hypothesis.prompt.user-resource=classpath:prompts/telemetry/micro-hypothesis/user-zh.txt

# Macro Persona Forge (The Macro Persona Forge)
telemetry.macro-forge.enabled=true
telemetry.macro-forge.base-url=https://api.deepseek.com/v1
telemetry.macro-forge.model=deepseek-v3
telemetry.macro-forge.api-key=${DEEPSEEK_API_KEY:}
telemetry.macro-forge.timeout-seconds=90
telemetry.macro-forge.hypothesis-threshold=30
telemetry.macro-forge.interval-days=3
telemetry.macro-forge.core-articles-threshold=5
telemetry.macro-forge.max-slices-per-forge=180
telemetry.macro-forge.prompt.system-resource=classpath:prompts/telemetry/macro-forge/system-zh.txt
telemetry.macro-forge.prompt.user-resource=classpath:prompts/telemetry/macro-forge/user-zh.txt

# Persona-aware Reading Composer
telemetry.persona-reading.enabled=true
telemetry.persona-reading.base-url=https://api.deepseek.com/v1
telemetry.persona-reading.model=deepseek-chat
telemetry.persona-reading.api-key=${DEEPSEEK_API_KEY:}
telemetry.persona-reading.timeout-seconds=45
telemetry.persona-reading.max-nodes=220
telemetry.persona-reading.max-tokens=8000
telemetry.persona-reading.max-inflight=64
telemetry.persona-reading.chunk-strategy=semantic_unit
telemetry.persona-reading.cache-root=../../var/telemetry/persona-reading
telemetry.persona-reading.mock-persona-file=../../var/tmp_mock_persona.json
telemetry.persona-reading.prompt.system-resource=classpath:prompts/telemetry/persona-reading/system-zh.txt
telemetry.persona-reading.prompt.user-resource=classpath:prompts/telemetry/persona-reading/user-zh.txt

# DeepSeek Advisor (insight cards structured explanation)
deepseek.advisor.model=deepseek-chat
deepseek.advisor.structured-max-tokens=8000
telemetry.persona-reading.insight-cards.max-inflight=88
telemetry.persona-reading.insight-cards.batch-max-terms=8
telemetry.persona-reading.insight-cards.force-regenerate=false
telemetry.persona-reading.insight-cards.regenerate-on-legacy-marker=true
