        bindRootOverscrollGuard();
        bindEdgeBackNavigation();
        taskListRefreshPolicy.start();
        pushView(state.currentView);
        refreshQuickActionLabels();
        closeInlineStickyNote();
        setSyncStatus('synced');
        setExportStatus('idle', UI_COPY.saveHint);
        try {
            const runtimeLibrariesPromise = ensureRuntimeLibraries();
            await reloadTaskList({
                showLoading: true,
                loadingText: '正在加载故事库...',
            });
            const libResult = await runtimeLibrariesPromise;
            if (libResult && Array.isArray(libResult.missing) && libResult.missing.length > 0) {
                setTaskSubmitTip(`渲染库加载不完整（${libResult.missing.join('、')}），将自动降级显示。`, 'error');
            }
            const prefilledByShareTarget = (PWA_SHARE_TARGET && typeof PWA_SHARE_TARGET.prefillComposerFromShareTarget === 'function')
                ? PWA_SHARE_TARGET.prefillComposerFromShareTarget({
                    payload: shareTargetPayload,
                    onRequireTasksView: () => {
                        if (state.currentView !== 'tasks') {
                            pushView('tasks');
                        }
                    },
                    onOpenComposer: () => {
                        openTaskComposer({
                            focusInput: false,
                            pulse: true,
                            scrollIntoView: false,
                        });
                    },
                    onSetSubmitTip: (message) => {
                        setTaskSubmitTip(message);
                    },
                    shareDetectedTip: COMPOSER_COPY.shareDetectedTip || '已读取分享内容，正在提交...',
                })
                : false;
            if (prefilledByShareTarget) {
                await triggerComposerAutoSubmit('share-target');
                return;
            }
            const query = new URLSearchParams(window.location.search);
            const preferredTaskId = query.get('taskId');
            let toOpen = null;
            if (preferredTaskId) {
                toOpen = state.tasks.find(t => t.taskId === preferredTaskId) || null;
            }
            if (toOpen) {
                try {
                    await openTaskForContent(toOpen.taskId);
                } catch (error) {
                    showError(`打开内容失败：${normalizeErrorMessage(error)}`, { forceTaskList: true });
                    pushView('tasks');
                }
            } else {
                let autoOpened = false;
                if (!preferredTaskId) {
                    autoOpened = await autoEnterSingleInProgressTask();
                }
                if (!autoOpened) {
                    pushView('tasks');
                }
                if (preferredTaskId) {
                    updateUrlTaskId(null);
                }
            }
        } catch (error) {
            showError(`初始化失败：${normalizeErrorMessage(error)}`, { forceTaskList: true });
            pushView('tasks');
        }
    }

    function buildOutline(container) {
        const outlineList = document.getElementById('outlineList');
        if (!outlineList) return;

        const headings = Array.from(container.querySelectorAll('h1, h2, h3, h4'));
        state.outlineHeadings = headings;
        if (!headings.length) {
            outlineList.innerHTML = buildOutlineEmptyStateHtml();
            state.activeOutlineId = '';
            showControl('contentOutlineBtn', false);
            teardownScrollSpy();
            return;
        }
        showControl('contentOutlineBtn', true);

        // 1. 构建树状数据结构
        const root = { level: 0, children: [] };
        const stack = [root];

        const usedIds = new Set();
        headings.forEach((heading, index) => {
            let id = heading.id ? String(heading.id).trim() : '';
            if (!id || usedIds.has(id)) {
                id = `md-heading-${index + 1}`;
            }
            while (usedIds.has(id)) {
                id = `${id}-x`;
            }
            usedIds.add(id);
            heading.id = id;

            const level = Number(heading.tagName.substring(1)) || 1;
            const text = (heading.textContent || '').trim() || `标题 ${index + 1}`;
            const node = { id, level, text, children: [] };

            // 找到正确的父节点 (Stack top level needs to be < current level)
            while (stack.length > 1 && stack[stack.length - 1].level >= level) {
                stack.pop();
            }
            stack[stack.length - 1].children.push(node);
            stack.push(node);
        });

        // 2. 递归渲染 DOM
        function renderNode(node) {
            const hasChildren = node.children && node.children.length > 0;
            // H1/H2 默认展开，更深层默认折叠 (可配置)
            // 这里为了实现 "H2 items have a down-arrow toggle"，我们让 H2 的子级容器可折叠
            const expanded = node.level < 2; 
            
            let html = '';
            if (node.level > 0) {
                // 只有一级标题才有 "章节" 这种语义前缀吗？或者纯文本。
                // 交互层：整个条目可点跳转
                html += `
                    <div class="outline-node" data-target-id="${node.id}">
                        <div class="outline-label">${escapeHtml(node.text)}</div>
                        ${hasChildren ? `
                            <button class="outline-toggle" type="button" aria-label="切换折叠" aria-expanded="${expanded}">
                                <svg class="icon-glyph" viewBox="0 0 24 24"><path d="M6 9l6 6 6-6"/></svg>
                            </button>
                        ` : ''}
                    </div>
                `;
            }
            
            if (hasChildren) {
                // outline-tree 是根容器，outline-children 是子级容器
                const className = node.level === 0 ? 'outline-tree' : 'outline-children';
                // 根节点始终显示，子节点根据 expanded 状态
                const style = (node.level === 0 || expanded) ? '' : 'style="display:none"';
                html += `<ul class="${className}" ${style}>`;
                node.children.forEach(child => {
                    html += `<li class="outline-item-wrapper level-${child.level}">`;
                    html += renderNode(child);
                    html += `</li>`;
                });
                html += `</ul>`;
            }
            return html;
        }

        outlineList.innerHTML = renderNode(root);

        // 3. 绑定折叠事件 (利用事件委托)
        // 注意：click 跳转事件已在全局委托中处理 (document.getElementById('outlineList').addEventListener('click'...))
        // 这里只需要处理 toggle 按钮，或者在全局处理中增加 toggle 逻辑
        
        installScrollSpy(headings);
    }

    function setActiveOutline(targetId) {
        if (!targetId) return;
        state.activeOutlineId = targetId;
        
        // 1. 移除旧激活状态
        document.querySelectorAll('#outlineList .outline-node.active').forEach((node) => {
            node.classList.remove('active');
        });

        // 2. 激活新节点
        const targetNode = document.querySelector(`#outlineList .outline-node[data-target-id="${targetId}"]`);
        if (targetNode) {
            targetNode.classList.add('active');
            // 3. 自动展开父级
            let parent = targetNode.closest('.outline-children');
            while (parent) {
                if (parent.style.display === 'none') {
                    parent.style.display = '';
                    // 找到控制该 ul 的 toggle 按钮
                    // 结构: li > (div.outline-node > button) + ul.outline-children
                    // parent 是 ul，它的兄弟节点 div.outline-node 里的 button 需要更新状态
                    const wrapper = parent.closest('.outline-item-wrapper');
                    if (wrapper) {
                        const toggle = wrapper.querySelector('.outline-node > .outline-toggle');
                        if (toggle) toggle.setAttribute('aria-expanded', 'true');
                    }
                }
                parent = parent.parentElement.closest('.outline-children');
            }
        }
    }

    function teardownScrollSpy() {
        if (!state.scrollSpyHandler) return;
        const target = state.scrollSpyContainer || window;
        target.removeEventListener('scroll', state.scrollSpyHandler);
        if (state.scrollSpyRafId) {
            cancelAnimationFrame(state.scrollSpyRafId);
            state.scrollSpyRafId = 0;
        }
        state.scrollSpyHandler = null;
        state.scrollSpyContainer = null;
    }

    function installScrollSpy(headings) {
        teardownScrollSpy();
        if (!headings || !headings.length) return;
        const scrollContainer = document.getElementById('viewContent') || window;

        const run = () => {
            state.scrollSpyRafId = 0;
            const anchorY = 120;
            let current = headings[0];
            const containerTop = scrollContainer === window
                ? 0
                : scrollContainer.getBoundingClientRect().top;
            for (let i = 0; i < headings.length; i += 1) {
                const top = headings[i].getBoundingClientRect().top - containerTop;
                if (top <= anchorY) {
                    current = headings[i];
                } else {
                    break;
                }
            }
            if (current && current.id) {
                setActiveOutline(current.id);
            }
        };

        const handler = () => {
            if (state.scrollSpyRafId) return;
            state.scrollSpyRafId = requestAnimationFrame(run);
        };

        state.scrollSpyHandler = handler;
        state.scrollSpyContainer = scrollContainer;
        scrollContainer.addEventListener('scroll', handler, { passive: true });
        run();
    }

    // 统一控制头部按钮显隐，避免调用侧散落重复逻辑并保持可访问性状态同步。
    function showControl(controlId, visible) {
        const control = document.getElementById(controlId);
        if (!control) return;
        const shouldShow = !!visible;
        control.hidden = !shouldShow;
        control.setAttribute('aria-hidden', shouldShow ? 'false' : 'true');
        if (!shouldShow && document.activeElement === control && typeof control.blur === 'function') {
            control.blur();
        }
    }

    function setControlLabel(control, label) {
        if (!control) return;
        const text = String(label || '');
        const labelNode = control.querySelector('[data-btn-label], .btn-label');
        if (labelNode) {
            labelNode.textContent = text;
            return;
        }
        control.textContent = text;
    }

    function readDeleteSwipeSoundPreference() {
        try {
            const storage = window.localStorage;
            if (!storage) return DELETE_SWIPE_SOUND_DEFAULT_ENABLED;
            const raw = String(storage.getItem(DELETE_SWIPE_SOUND_STORAGE_KEY) || '').trim().toLowerCase();
            if (!raw) return DELETE_SWIPE_SOUND_DEFAULT_ENABLED;
            if (raw === '0' || raw === 'false' || raw === 'off') return false;
            if (raw === '1' || raw === 'true' || raw === 'on') return true;
            return DELETE_SWIPE_SOUND_DEFAULT_ENABLED;
        } catch (_error) {
            return DELETE_SWIPE_SOUND_DEFAULT_ENABLED;
        }
    }

    function persistDeleteSwipeSoundPreference(enabled) {
        try {
            const storage = window.localStorage;
            if (!storage) return;
            storage.setItem(DELETE_SWIPE_SOUND_STORAGE_KEY, enabled ? '1' : '0');
        } catch (_error) {
            // 存储失败不阻断主流程，保持当次会话可用。
        }
    }

    function buildDeleteSwipeSoundToggleLabel(enabled) {
        return enabled ? '撕纸音效：开' : '撕纸音效：关';
    }

    function refreshDeleteSwipeSoundToggleButton() {
        const button = document.getElementById('deleteSoundToggleBtn');
        if (!button) return;
        const enabled = !!state.deleteSwipeSoundEnabled;
        setControlLabel(button, buildDeleteSwipeSoundToggleLabel(enabled));
        button.setAttribute('aria-pressed', enabled ? 'true' : 'false');
        button.classList.toggle('btn-toggle-on', enabled);
    }

    function ensureDeleteSwipeAudioContext() {
        if (state.deleteSwipeAudioCtx) {
            return state.deleteSwipeAudioCtx;
        }
        try {
            const AudioCtx = window.AudioContext || window.webkitAudioContext;
            if (!AudioCtx) return null;
            state.deleteSwipeAudioCtx = new AudioCtx({ latencyHint: 'interactive' });
            return state.deleteSwipeAudioCtx;
        } catch (_error) {
            return null;
        }
    }

    function ensureDeleteSwipeNoiseBuffer(ctx) {
        if (!ctx) return null;
        if (state.deleteSwipeNoiseBuffer && state.deleteSwipeNoiseBuffer.sampleRate === ctx.sampleRate) {
            return state.deleteSwipeNoiseBuffer;
        }
        const lengthSeconds = 0.22;
        const frameCount = Math.max(1, Math.floor(ctx.sampleRate * lengthSeconds));
        const buffer = ctx.createBuffer(1, frameCount, ctx.sampleRate);
        const channel = buffer.getChannelData(0);
        for (let i = 0; i < frameCount; i += 1) {
            channel[i] = (Math.random() * 2 - 1) * (0.86 - (i / frameCount) * 0.5);
        }
        state.deleteSwipeNoiseBuffer = buffer;
        return buffer;
    }

    // 撕纸音效采用合成方式：噪声层提供“纤维撕裂”，短音层提供“断裂瞬态”。
    // 权衡：不依赖外部音频资源，但要避免过长/过响，以免喧宾夺主。
    function playDeleteSwipeSound(options = {}) {
        if (!state.deleteSwipeSoundEnabled) return;
        const ctx = ensureDeleteSwipeAudioContext();
        if (!ctx) return;
        if (ctx.state === 'suspended') {
            ctx.resume().catch(() => {});
        }
        const tearStrength = Math.max(0.4, Math.min(1.9, Number(options.tearStrength) || 1));
        const startAt = ctx.currentTime + 0.004;
        const endAt = startAt + 0.2;

        const master = ctx.createGain();
        master.gain.setValueAtTime(0.0001, startAt);
        master.gain.exponentialRampToValueAtTime(0.16 + (tearStrength * 0.08), startAt + 0.016);
        master.gain.exponentialRampToValueAtTime(0.0001, endAt);
        master.connect(ctx.destination);

        const noiseBuffer = ensureDeleteSwipeNoiseBuffer(ctx);
        if (noiseBuffer) {
            const noiseSource = ctx.createBufferSource();
            noiseSource.buffer = noiseBuffer;
            const highpass = ctx.createBiquadFilter();
            highpass.type = 'highpass';
            highpass.frequency.setValueAtTime(760 + (tearStrength * 520), startAt);

            const bandpass = ctx.createBiquadFilter();
            bandpass.type = 'bandpass';
            bandpass.frequency.setValueAtTime(1720 + (tearStrength * 880), startAt);
            bandpass.Q.setValueAtTime(0.86 + (tearStrength * 0.22), startAt);

            const noiseGain = ctx.createGain();
            noiseGain.gain.setValueAtTime(0.0001, startAt);
            noiseGain.gain.exponentialRampToValueAtTime(0.64 + (tearStrength * 0.22), startAt + 0.012);
            noiseGain.gain.exponentialRampToValueAtTime(0.0001, endAt);

            noiseSource.connect(highpass);
            highpass.connect(bandpass);
            bandpass.connect(noiseGain);
            noiseGain.connect(master);
            noiseSource.start(startAt);
            noiseSource.stop(endAt);
        }

        const tearOsc = ctx.createOscillator();
        tearOsc.type = 'triangle';
        const tearGain = ctx.createGain();
        tearGain.gain.setValueAtTime(0.0001, startAt);
        tearGain.gain.exponentialRampToValueAtTime(0.08 + (tearStrength * 0.05), startAt + 0.012);
        tearGain.gain.exponentialRampToValueAtTime(0.0001, startAt + 0.13);
        tearOsc.frequency.setValueAtTime(360 + (tearStrength * 140), startAt);
        tearOsc.frequency.exponentialRampToValueAtTime(104, startAt + 0.13);
        tearOsc.connect(tearGain);
        tearGain.connect(master);

        const snapOsc = ctx.createOscillator();
        snapOsc.type = 'sawtooth';
        const snapGain = ctx.createGain();
        snapGain.gain.setValueAtTime(0.0001, startAt);
        snapGain.gain.exponentialRampToValueAtTime(0.04 + (tearStrength * 0.018), startAt + 0.006);
        snapGain.gain.exponentialRampToValueAtTime(0.0001, startAt + 0.048);
        snapOsc.frequency.setValueAtTime(2140 + (tearStrength * 360), startAt);
        snapOsc.frequency.exponentialRampToValueAtTime(900, startAt + 0.048);
        snapOsc.connect(snapGain);
        snapGain.connect(master);

        tearOsc.start(startAt);
        tearOsc.stop(startAt + 0.14);
        snapOsc.start(startAt);
        snapOsc.stop(startAt + 0.05);
    }

    function setDeleteSwipeSoundEnabled(enabled, options = {}) {
        state.deleteSwipeSoundEnabled = !!enabled;
        if (!options || options.persist !== false) {
            persistDeleteSwipeSoundPreference(state.deleteSwipeSoundEnabled);
        }
        refreshDeleteSwipeSoundToggleButton();
    }

    function toggleDeleteSwipeSoundEnabled() {
        const nextEnabled = !state.deleteSwipeSoundEnabled;
        setDeleteSwipeSoundEnabled(nextEnabled);
        if (nextEnabled) {
            const ctx = ensureDeleteSwipeAudioContext();
            if (ctx && ctx.state === 'suspended') {
                ctx.resume().catch(() => {});
            }
            playDeleteSwipeSound({ tearStrength: 0.72 });
        }
    }

    function applyStaticUiCopy() {
        applyComposerCopy();

        const saveBtn = document.getElementById('exportTaskBtn');
        if (saveBtn) setControlLabel(saveBtn, UI_COPY.actionSaveFile);
        refreshDeleteSwipeSoundToggleButton();

        const invitationApplied = CONTENT_INVITATION && typeof CONTENT_INVITATION.applyStaticCopy === 'function'
            ? CONTENT_INVITATION.applyStaticCopy({
                hasCurrentTask: !!state.currentTaskId,
                viewerTitleNode: document.getElementById('viewerTitle'),
                emptyRoot: document.querySelector('#markdownBody .empty'),
                viewerHintOpen: UI_COPY.viewerHintOpen,
                viewerHintOpenContent: UI_COPY.viewerHintOpenContent,
            })
            : null;
        if (!invitationApplied) {
            const viewerTitle = document.getElementById('viewerTitle');
            if (viewerTitle && !state.currentTaskId) {
                viewerTitle.textContent = UI_COPY.viewerHintOpen;
            }
            const emptyTextNode = document.querySelector('#markdownBody .empty .empty-text');
            if (emptyTextNode && !state.currentTaskId) {
                emptyTextNode.textContent = UI_COPY.viewerHintOpenContent;
            } else {
                const emptyNode = document.querySelector('#markdownBody .empty');
                if (emptyNode && !state.currentTaskId) {
                    emptyNode.textContent = UI_COPY.viewerHintOpenContent;
                }
            }
        }
    }

    function refreshContentToolsPanelActions() {
        const reloadBtn = document.getElementById('reloadCurrentBtn');
        if (!reloadBtn) return;
        const shouldShowReload = !!(state.contentNeedsReload || state.contentToolsAdvancedReveal);
        reloadBtn.hidden = !shouldShowReload;
        reloadBtn.setAttribute('aria-hidden', shouldShowReload ? 'false' : 'true');
    }

    function setContentNeedsReload(flag) {
        state.contentNeedsReload = !!flag;
        refreshContentToolsPanelActions();
    }

    function setContentToolsAdvancedReveal(flag) {
        state.contentToolsAdvancedReveal = !!flag;
        refreshContentToolsPanelActions();
    }

    function setContentToolsOpen(open) {
        const next = !!open;
        state.contentToolsOpen = next;
        if (!next) {
            state.contentToolsAdvancedReveal = false;
        }
        const panel = document.getElementById('contentToolsPanel');
        const toggleBtn = document.getElementById('contentToolsToggleBtn');
        if (panel) {
            panel.classList.toggle('open', next);
        }
        if (toggleBtn) {
            toggleBtn.setAttribute('aria-expanded', next ? 'true' : 'false');
        }
        refreshContentToolsPanelActions();
    }

    function refreshQuickActionLabels() {
        const outlineBtn = document.getElementById('contentOutlineBtn');
        if (outlineBtn) {
            setControlLabel(outlineBtn, UI_COPY.actionOutline);
            outlineBtn.disabled = isParagraphEditorMode();
        }
        const toggleParagraphEditorBtn = document.getElementById('toggleParagraphEditorBtn');
        if (toggleParagraphEditorBtn) {
            const editing = isParagraphEditorMode();
            setControlLabel(toggleParagraphEditorBtn, editing ? UI_COPY.actionExitEdit : UI_COPY.actionEnterEdit);
            toggleParagraphEditorBtn.setAttribute('aria-pressed', editing ? 'true' : 'false');
            toggleParagraphEditorBtn.disabled = !state.currentTaskId;
        }
    }

    function bindRootOverscrollGuard() {
        if (document.body.dataset.rootOverscrollGuardBound === '1') return;
        document.body.dataset.rootOverscrollGuardBound = '1';
        const supportsOverscrollBehavior = !!(
            window.CSS
            && typeof window.CSS.supports === 'function'
            && window.CSS.supports('overscroll-behavior-y', 'contain')
        );
        if (supportsOverscrollBehavior) {
            return;
        }

        let guardState = null;
        const selector = '.task-list, .outline-list, .markdown-body.edit-scroll-host, .app-view';
        document.addEventListener('touchstart', (event) => {
            if (!event.touches || event.touches.length !== 1) return;
            const target = event.target;
            const scrollHost = target && target.closest ? target.closest(selector) : null;
            if (!scrollHost) {
                guardState = null;
                return;
            }
            guardState = {
                y: event.touches[0].clientY,
                scrollHost,
            };
        }, { passive: true });

        document.addEventListener('touchmove', (event) => {
            if (!guardState || !event.touches || event.touches.length !== 1) return;
            const scrollHost = guardState.scrollHost;
            if (!scrollHost) return;
            const currentY = event.touches[0].clientY;
            const dy = currentY - guardState.y;
            guardState.y = currentY;
            const atTop = scrollHost.scrollTop <= 0;
            const atBottom = Math.ceil(scrollHost.scrollTop + scrollHost.clientHeight) >= scrollHost.scrollHeight;
            if ((atTop && dy > 0) || (atBottom && dy < 0)) {
                event.preventDefault();
            }
        }, { passive: false });

        const clear = () => {
            guardState = null;
        };
        document.addEventListener('touchend', clear, { passive: true });
        document.addEventListener('touchcancel', clear, { passive: true });
    }

    function bindEdgeBackNavigation() {
        return getViewNavigation().bindEdgeBackNavigation();
    }

    function clearPressedFeedbackNode() {
        if (!state.pressedNode) return;
        const node = state.pressedNode;
        node.classList.remove('is-pressed');
        node.classList.add('is-releasing');
        window.setTimeout(() => {
            node.classList.remove('is-releasing');
        }, 220);
        state.pressedNode = null;
    }

    function spawnTaskItemRipple(target, event) {
        // 交互改为“卡片浮起”后，保留函数占位避免外部调用报错，但不再注入波纹节点。
        void target;
        void event;
    }

    function bindPressFeedback() {
        document.addEventListener('pointerdown', (event) => {
            const source = event.target;
            if (!source || !source.closest) return;
            const target = source.closest(PRESS_FEEDBACK_SELECTOR);
            if (!target || target.hasAttribute('disabled')) return;
            clearPressedFeedbackNode();
            state.pressedNode = target;
            state.pressedNode.classList.add('is-pressed');
        }, { passive: true });

        const clear = () => clearPressedFeedbackNode();
        document.addEventListener('pointerup', clear, { passive: true });
        document.addEventListener('pointercancel', clear, { passive: true });
        window.addEventListener('blur', clear);
    }

    function bindPaperScrollMotion(node) {
        if (bindPaperScrollMotionWithPerf) {
            bindPaperScrollMotionWithPerf(node);
            return;
        }
        if (!node || node.dataset.paperScrollBound === '1') return;
        node.dataset.paperScrollBound = '1';
        node.classList.add('paper-scroll-surface');

        let lastTop = node.scrollTop;
        let rafId = 0;
        let releaseTimer = 0;
        let pendingDelta = 0;

        const relax = () => {
            node.style.removeProperty('transform');
            node.classList.remove('is-paper-scrolling');
        };

        const apply = () => {
            rafId = 0;
            const delta = pendingDelta;
            pendingDelta = 0;

            const intensity = Math.min(1, Math.abs(delta) / 34);
            const shiftY = Math.max(-6, Math.min(6, -delta * 0.24));
            const tiltX = Math.max(-1.2, Math.min(1.2, delta * 0.05));
            const scale = 1 - intensity * 0.004;

            node.style.transform = `perspective(920px) translate3d(0, ${shiftY.toFixed(2)}px, 0) rotateX(${tiltX.toFixed(2)}deg) scale(${scale.toFixed(4)})`;
            node.classList.add('is-paper-scrolling');
        };

        node.addEventListener('scroll', () => {
            const nowTop = node.scrollTop;
            const delta = nowTop - lastTop;
            lastTop = nowTop;
            if (Math.abs(delta) < 0.5) return;

            pendingDelta = delta;
            if (!rafId) {
                rafId = requestAnimationFrame(apply);
            }
            if (releaseTimer) {
                clearTimeout(releaseTimer);
            }
            releaseTimer = setTimeout(relax, PAPER_SCROLL_RELAX_DELAY_MS);
        }, { passive: true });
    }

    function bindListScrollMotion() {
        bindPaperScrollMotion(document.getElementById('taskList'));
        bindPaperScrollMotion(document.getElementById('outlineList'));
    }

    window.addEventListener('beforeunload', () => {
        if (jsonParseWorkerPool && typeof jsonParseWorkerPool.dispose === 'function') {
            jsonParseWorkerPool.dispose();
        }
        if (conceptCardsController && typeof conceptCardsController.destroy === 'function') {
            conceptCardsController.destroy();
        }
    });

    document.addEventListener('DOMContentLoaded', bootstrap);
</script>
