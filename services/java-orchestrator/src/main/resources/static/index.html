<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Redirecting to Workspace...</title>
    <meta http-equiv="refresh" content="0;url=mobile-markdown.html">
    <style>
        :root {
            color-scheme: light dark;
        }

        body {
            margin: 0;
            min-height: 100vh;
            min-height: 100dvh;
            display: grid;
            place-items: center;
            font-family: "Segoe UI", "PingFang SC", sans-serif;
            background: radial-gradient(circle at top, rgba(79, 70, 229, 0.14), transparent 52%), #f1f5f9;
            color: #0f172a;
        }

        .redirect-tip {
            padding: 16px 18px;
            border-radius: 12px;
            border: 1px solid rgba(148, 163, 184, 0.4);
            background: rgba(255, 255, 255, 0.82);
            box-shadow: 0 10px 26px rgba(37, 99, 235, 0.12);
            font-size: 14px;
            line-height: 1.5;
        }

        @media (prefers-color-scheme: dark) {
            body {
                background: radial-gradient(circle at top, #232a37 0%, #000000 52%), #000000;
                color: #dce2ed;
            }

            .redirect-tip {
                border-color: #232730;
                background: #111111;
                box-shadow: 0 12px 28px rgba(0, 0, 0, 0.56);
            }
        }
    </style>
    <script>
        (function redirectToUnifiedExperience() {
            const pathname = window.location.pathname || "/";
            const suffix = "/index.html";
            let basePath = "/";
            if (pathname.endsWith(suffix)) {
                basePath = pathname.slice(0, -suffix.length) || "/";
            } else if (pathname.endsWith("/")) {
                basePath = pathname;
            } else {
                basePath = `${pathname}/`;
            }

            const target = `${basePath}mobile-markdown.html${window.location.search || ""}${window.location.hash || ""}`;
            if (window.location.href !== new URL(target, window.location.origin).href) {
                window.location.replace(target);
            }
        })();
    </script>
</head>
<body>
<div class="redirect-tip">Redirecting to the unified reading workspace...</div>
<noscript>
    <div class="redirect-tip">JavaScript is disabled. Please open <a href="mobile-markdown.html">mobile-markdown.html</a> manually.</div>
</noscript>
</body>
</html>
