    function pruneTaskFxState(now = Date.now()) {
        const motion = getTaskMotionState();
        let changed = false;
        const nextEntryFx = {};
        Object.keys(motion.entryFxUntil || {}).forEach((taskId) => {
            const expiresAt = Number(motion.entryFxUntil[taskId]) || 0;
            if (expiresAt > now) {
                nextEntryFx[taskId] = expiresAt;
            } else {
                changed = true;
            }
        });
        if (Object.keys(nextEntryFx).length !== Object.keys(motion.entryFxUntil || {}).length) {
            changed = true;
        }
        motion.entryFxUntil = nextEntryFx;

        const nextCompletionFx = {};
        Object.keys(motion.completionFxUntil || {}).forEach((taskId) => {
            const expiresAt = Number(motion.completionFxUntil[taskId]) || 0;
            if (expiresAt > now) {
                nextCompletionFx[taskId] = expiresAt;
            } else {
                changed = true;
            }
        });
        if (Object.keys(nextCompletionFx).length !== Object.keys(motion.completionFxUntil || {}).length) {
            changed = true;
        }
        motion.completionFxUntil = nextCompletionFx;

        const nextProcessingFx = {};
        Object.keys(motion.processingFxUntil || {}).forEach((taskId) => {
            const expiresAt = Number(motion.processingFxUntil[taskId]) || 0;
            if (expiresAt > now) {
                nextProcessingFx[taskId] = expiresAt;
            } else {
                changed = true;
            }
        });
        if (Object.keys(nextProcessingFx).length !== Object.keys(motion.processingFxUntil || {}).length) {
            changed = true;
        }
        motion.processingFxUntil = nextProcessingFx;

        const nextTitleFx = {};
        Object.keys(motion.titleFxUntil || {}).forEach((taskId) => {
            const expiresAt = Number(motion.titleFxUntil[taskId]) || 0;
            if (expiresAt > now) {
                nextTitleFx[taskId] = expiresAt;
            } else {
                changed = true;
            }
        });
        if (Object.keys(nextTitleFx).length !== Object.keys(motion.titleFxUntil || {}).length) {
            changed = true;
        }
        motion.titleFxUntil = nextTitleFx;

        const prevLen = (state.taskExitItems || []).length;
        state.taskExitItems = (state.taskExitItems || []).filter((item) => (Number(item.fxUntil) || 0) > now);
        if (state.taskExitItems.length !== prevLen) {
            changed = true;
        }
        return changed;
    }

    function scheduleTaskFxCleanup() {
        const motion = getTaskMotionState();
        if (motion.fxTimerId) {
            clearTimeout(motion.fxTimerId);
            motion.fxTimerId = 0;
        }
        const now = Date.now();
        let nearest = Infinity;
        Object.keys(motion.entryFxUntil || {}).forEach((taskId) => {
            const expiresAt = Number(motion.entryFxUntil[taskId]) || 0;
            if (expiresAt > now) {
                nearest = Math.min(nearest, expiresAt);
            }
        });
        Object.keys(motion.completionFxUntil || {}).forEach((taskId) => {
            const expiresAt = Number(motion.completionFxUntil[taskId]) || 0;
            if (expiresAt > now) {
                nearest = Math.min(nearest, expiresAt);
            }
        });
        Object.keys(motion.processingFxUntil || {}).forEach((taskId) => {
            const expiresAt = Number(motion.processingFxUntil[taskId]) || 0;
            if (expiresAt > now) {
                nearest = Math.min(nearest, expiresAt);
            }
        });
        Object.keys(motion.titleFxUntil || {}).forEach((taskId) => {
            const expiresAt = Number(motion.titleFxUntil[taskId]) || 0;
            if (expiresAt > now) {
                nearest = Math.min(nearest, expiresAt);
            }
        });
        (state.taskExitItems || []).forEach((item) => {
            const expiresAt = Number(item.fxUntil) || 0;
            if (expiresAt > now) {
                nearest = Math.min(nearest, expiresAt);
            }
        });
        if (!Number.isFinite(nearest)) {
            return;
        }
        const delay = Math.max(
            TASK_MOTION_CONFIG.cleanupMinDelayMs,
            Math.round(nearest - now) + TASK_MOTION_CONFIG.cleanupPaddingMs
        );
        motion.fxTimerId = setTimeout(() => {
            getTaskMotionState().fxTimerId = 0;
            const changed = pruneTaskFxState();
            if (changed) {
                renderTaskList();
            }
            scheduleTaskFxCleanup();
        }, delay);
    }

    // 任务列表动效决策链：识别“新入场 / 刚进入处理中 / 刚完成 / 刚消失”的任务，给出对应微交互反馈。
    function applyTaskListMotionDiff(previousTasks, nextTasks) {
        const now = Date.now();
        const prevList = Array.isArray(previousTasks) ? previousTasks : [];
        const nextList = Array.isArray(nextTasks) ? nextTasks : [];
        const nextIdSet = new Set(nextList.map((task) => String(task && task.taskId || '')));
        const prevById = new Map(prevList.map((task) => [String(task && task.taskId || ''), task]));
        const shouldAnimateNewRows = !!state.taskListHydrated;

        state.taskExitItems = (state.taskExitItems || []).filter((item) => !nextIdSet.has(String(item.taskId || '')));

        nextList.forEach((task) => {
            const taskId = String(task && task.taskId || '');
            if (!taskId) return;
            const previous = prevById.get(taskId);
            if (!previous) {
                if (shouldAnimateNewRows) {
                    setTaskMotionExpiry('entry', taskId, now + TASK_MOTION_CONFIG.entryFxMs);
                }
                return;
            }
            const prevStatus = normalizeTaskLifecycleStatus(previous.status);
            const nextStatus = normalizeTaskLifecycleStatus(task.status);
            if (prevStatus !== 'processing' && nextStatus === 'processing') {
                setTaskMotionExpiry('processing', taskId, now + TASK_MOTION_CONFIG.processingFxMs);
            }
            if (prevStatus !== 'completed' && nextStatus === 'completed') {
                setTaskMotionExpiry('completion', taskId, now + TASK_MOTION_CONFIG.completionFxMs);
            }
            if (shouldAnimateNewRows) {
                const previousTitle = normalizeTaskTitleForDiff(previous);
                const nextTitle = normalizeTaskTitleForDiff(task);
                if (previousTitle && nextTitle && previousTitle !== nextTitle) {
                    setTaskMotionExpiry('title', taskId, now + TASK_MOTION_CONFIG.titleFxMs);
                }
            }
        });

        prevList.forEach((task, index) => {
            const taskId = String(task && task.taskId || '');
            if (!taskId || nextIdSet.has(taskId)) return;
            const exists = (state.taskExitItems || []).some((item) => item.taskId === taskId);
            if (exists) return;
            state.taskExitItems.push({
                taskId,
                title: resolveTaskCardTitle(task),
                status: task.status || 'COMPLETED',
                markdownAvailable: !!task.markdownAvailable,
                createdAt: task.createdAt || null,
                exitOrder: index + 0.35,
                fxUntil: now + TASK_MOTION_CONFIG.exitFxMs,
            });
            setTaskMotionExpiry('completion', taskId, now + TASK_MOTION_CONFIG.exitFxMs, { maxOnly: true });
        });

        state.taskListHydrated = true;
        pruneTaskFxState(now);
        scheduleTaskFxCleanup();
    }

    function resolveTaskItemMotionClasses(taskIdRaw, statusVisual, options = {}) {
        const classes = ['task-item', `status-${statusVisual}`];
        if (!options.exiting && taskIdRaw === state.currentTaskId) {
            classes.push('active');
        }
        const entryFxUntil = getTaskMotionExpiry('entry', taskIdRaw);
        if (!options.exiting && entryFxUntil > Date.now()) {
            classes.push('fx-enter');
        }
        const processingFxUntil = getTaskMotionExpiry('processing', taskIdRaw);
        if (!options.exiting && statusVisual === 'processing' && processingFxUntil > Date.now()) {
            classes.push('fx-start-processing');
        }
        const titleFxUntil = getTaskMotionExpiry('title', taskIdRaw);
        if (!options.exiting && titleFxUntil > Date.now()) {
            classes.push('fx-title-highlight');
        }
        const completionFxUntil = getTaskMotionExpiry('completion', taskIdRaw);
        if (options.forceCompletionFx || completionFxUntil > Date.now()) {
            classes.push('fx-complete');
        }
        if (options.exiting) {
            classes.push('fx-exit');
        }
        return classes;
    }

                </div>

    async function reloadTaskList(options = {}) {
        if (state.taskListReloading) {
            return false;
        }
        state.taskListReloading = true;
        const loadingText = String(options.loadingText || '正在加载故事库...');
        const showLoading = !options || options.showLoading !== false;
        const previousTasks = Array.isArray(state.tasks) ? state.tasks.map((task) => ({ ...task })) : [];
        let cancelLoadingHint = null;
        if (showLoading) {
            cancelLoadingHint = createDelayedTaskListLoadingHint(loadingText, {
                delayMs: TASK_LIST_LOADING_HINT_DELAY_MS,
                showLoadingPanelWhenEmpty: true,
            });
        }
        try {
            await retryAsync(() => fetchTasks(), 1);
            applyTaskListMotionDiff(previousTasks, state.tasks || []);
            renderTaskList();
            setTaskSummary('');
            return true;
        } catch (error) {
            const msg = normalizeErrorMessage(error);
            setTaskSummary(`故事加载失败：${msg}`, 'error');
            renderTaskListError(`故事加载失败：${msg}`, { withRetry: true });
            throw error;
        } finally {
            if (cancelLoadingHint) {
                cancelLoadingHint();
            }
            state.taskListReloading = false;
        }
    }

    // 任务列表刷新策略模块：
    // 把触发条件、轮询节奏、失败退避、可见性恢复收敛到一个入口，避免逻辑散落在事件绑定中。
    function createTaskListRefreshPolicy(options = {}) {
        const baseIntervalMs = Number(options.baseIntervalMs) > 0
            ? Number(options.baseIntervalMs)
            : TASK_LIST_AUTO_REFRESH_MS;
        const maxBackoffMs = Number(options.maxBackoffMs) > baseIntervalMs
            ? Number(options.maxBackoffMs)
            : (baseIntervalMs * 8);
        const viewEnterMinGapMs = Number(options.viewEnterMinGapMs) > 0
            ? Number(options.viewEnterMinGapMs)
            : 1200;
        const resumeMinGapMs = Number(options.resumeMinGapMs) > 0
            ? Number(options.resumeMinGapMs)
            : 3500;

        let timerId = 0;
        let stopped = false;
        let consecutiveFailures = 0;
        let lastAttemptAt = 0;

        function clearTimer() {
            if (!timerId) return;
            clearTimeout(timerId);
            timerId = 0;
        }

        function isAutoRefreshEligible() {
            return state.currentView === 'tasks' && !document.hidden;
        }

        function computeNextDelayMs() {
            const factor = Math.pow(2, Math.min(consecutiveFailures, 4));
            return Math.min(maxBackoffMs, Math.round(baseIntervalMs * factor));
        }

        function scheduleNext() {
            if (stopped) return;
            clearTimer();
            const delay = computeNextDelayMs();
            timerId = setTimeout(async () => {
                timerId = 0;
                if (!isAutoRefreshEligible()) {
                    scheduleNext();
                    return;
                }
                await refresh('auto', {
                    showLoading: false,
                    minGapMs: Math.round(baseIntervalMs * 0.25),
                });
            }, delay);
        }

        async function refresh(source, options = {}) {
            const force = !!options.force;
            const showLoading = !!options.showLoading;
            const loadingText = options.loadingText || '正在加载故事库...';
            const minGapMs = Number(options.minGapMs) > 0 ? Number(options.minGapMs) : 0;
            const throwOnError = !!options.throwOnError;

            if (!force && !isAutoRefreshEligible()) {
                scheduleNext();
                return false;
            }
            const now = Date.now();
            if (!force && minGapMs > 0 && (now - lastAttemptAt) < minGapMs) {
                scheduleNext();
                return false;
            }

            lastAttemptAt = now;
            try {
                await reloadTaskList({ showLoading, loadingText });
                consecutiveFailures = 0;
                return true;
            } catch (error) {
                consecutiveFailures = Math.min(consecutiveFailures + 1, 6);
                if (throwOnError) {
                    throw error;
                }
                console.warn(`任务列表刷新失败(${source})`, error);
                return false;
            } finally {
                scheduleNext();
            }
        }

        return {
            start() {
                stopped = false;
                scheduleNext();
            },
            stop() {
                stopped = true;
                clearTimer();
            },
            onVisibilityChange() {
                if (document.hidden) {
                    scheduleNext();
                    return;
                }
                refresh('resume', {
                    showLoading: false,
                    minGapMs: resumeMinGapMs,
                });
            },
            onViewChange(nextView, previousView) {
                if (nextView === 'tasks' && nextView !== previousView) {
                    refresh('view-enter', {
                        showLoading: false,
                        minGapMs: viewEnterMinGapMs,
                    });
                }
            },
            async requestManualRefresh() {
                return refresh('manual', {
                    force: true,
                    showLoading: true,
                    loadingText: '正在刷新故事库...',
                    throwOnError: true,
                });
            },
            async requestRetryRefresh() {
                return refresh('retry', {
                    force: true,
                    showLoading: true,
                    loadingText: '正在重试加载故事库...',
                    throwOnError: true,
                });
            },
        };
    }

    const taskListRefreshPolicy = createTaskListRefreshPolicy({
        baseIntervalMs: TASK_LIST_AUTO_REFRESH_MS,
        maxBackoffMs: TASK_LIST_AUTO_REFRESH_MS * 8,
    });

    async function parseSubmitResponse(response) {
        const rawBody = await response.text();
        let result = {};
        try {
            result = rawBody ? JSON.parse(rawBody) : {};
        } catch (_parseError) {
            result = {};
        }
        if (!response.ok || !result.success) {
            const isBusyStatus = isBusyResponseStatus(response.status);
            const message = isBusyStatus
                ? USER_BUSY_MESSAGE
                : (result.message || `HTTP ${response.status}`);
            const submitError = new Error(message);
            submitError.httpStatus = response.status;
            submitError.serverMessage = result.message || '';
            submitError.responseBody = rawBody || '';
            throw submitError;
        }
        return result;
    }

    async function submitTaskFromMobileForm(options = {}) {
        const urlInput = document.getElementById('mobileVideoUrl');
        const fileInput = document.getElementById('mobileVideoFile');

        const rawInput = urlInput ? String(urlInput.value || '').trim() : '';
        const normalizedVideoUrl = normalizeTaskVideoInput(rawInput);
        const selectedVideoFile = fileInput && fileInput.files && fileInput.files.length > 0 ? fileInput.files[0] : null;

        if (!selectedVideoFile && !normalizedVideoUrl) {
            if (!options.silentIfEmpty) {
                setTaskSubmitTip(UI_COPY.composerInputRequired, 'error', {
                    highlightLink: false,
                });
                triggerComposerLaunchFx('error');
            }
            return false;
        }

        triggerComposerLaunchFx('launch');
        setTaskSubmitTip(selectedVideoFile ? COMPOSER_COPY.uploadingTip : COMPOSER_COPY.checkingTip);

        try {
            let response;
            if (selectedVideoFile) {
                const formData = new FormData();
                formData.append('videoFile', selectedVideoFile);
                formData.append('userId', MOBILE_USER_ID);
                formData.append('outputDir', './output');
                response = await fetch(`${TASK_API_BASE}/tasks/upload`, {
                    method: 'POST',
                    body: formData,
                });
            } else {
                response = await fetch(`${TASK_API_BASE}/tasks/submit`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({
                        userId: MOBILE_USER_ID,
                        videoUrl: normalizedVideoUrl,
                        outputDir: './output',
                    }),
                });
            }

            await parseSubmitResponse(response);
            setTaskSubmitTip(COMPOSER_COPY.queuedTip, 'success');
            triggerComposerLaunchFx('success');

            if (urlInput) {
                urlInput.value = '';
            }
            if (fileInput) {
                fileInput.value = '';
            }
            closeTaskComposer();

            await reloadTaskList({ showLoading: false });
            const autoOpened = await autoEnterSingleInProgressTask();
            if (!autoOpened) {
                pushView('tasks');
            }
            return true;
        } catch (error) {
            const feedback = buildTaskSubmitFriendlyError(error, {
                hasFile: !!selectedVideoFile,
            });
            setTaskSubmitTip(feedback.message, 'error', {
                highlightLink: feedback.highlightLink,
                onRetry: feedback.allowRetry
                    ? () => submitTaskFromMobileForm({ source: 'retry-button' })
                    : null,
                actionLabel: COMPOSER_COPY.retryActionLabel || '重试',
                pendingLabel: '重试中...',
            });
            triggerComposerLaunchFx('error');
            if (feedback.highlightLink) {
                focusTaskComposerInput({ scrollIntoView: false });
            }
            return false;
        }
    }

    function renderTaskList() {
        const taskList = document.getElementById('taskList');
        if (!taskList) return;
        pruneTaskFxState();

        const tasks = Array.isArray(state.tasks) ? state.tasks : [];
        updateTaskComposerVisibility();
        if (!state.taskListReloading) {
            setTaskSummary('');
        }
        const exitingItems = (state.taskExitItems || []).slice().sort((a, b) => (a.exitOrder || 0) - (b.exitOrder || 0));

        if (!tasks.length && !exitingItems.length) {
            const emptyHtml = buildTaskListEmptyStateHtml();
            if (!crossFadeTaskListFromLoading(taskList, emptyHtml)) {
                commitTaskListHtml(taskList, emptyHtml);
            }
            delete taskList.dataset.titleSourceMeta;
            delete taskList.dataset.titleSourceVideo;
            delete taskList.dataset.titleSourceTitle;
            delete taskList.dataset.titleSourceTaskId;
            return;
        }

        const titleSourceStats = collectTaskTitleSourceStats(tasks);
        taskList.dataset.titleSourceMeta = String(titleSourceStats.meta);
        taskList.dataset.titleSourceVideo = String(titleSourceStats.video);
        taskList.dataset.titleSourceTitle = String(titleSourceStats.title);
        taskList.dataset.titleSourceTaskId = String(titleSourceStats.taskId);

        const rows = [];
        tasks.forEach((task, index) => {
            rows.push({
                order: index,
                html: buildTaskItemHtml(task),
            });
        });
        exitingItems.forEach((task) => {
            rows.push({
                order: Number(task.exitOrder) || (tasks.length + 0.5),
                html: buildTaskItemHtml(task, { exiting: true, forceCompletionFx: true }),
            });
        });
        rows.sort((a, b) => a.order - b.order);
        const html = rows.map((row) => row.html).join('');
        if (!crossFadeTaskListFromLoading(taskList, html)) {
            commitTaskListHtml(taskList, html);
        }
        scheduleTaskFxCleanup();
    }

    // 统一处理后端返回的 Markdown 载荷，确保标题策略可控且一致。
    function applyMarkdownPayloadToState(payload, options = {}) {
        const data = payload && typeof payload === 'object' ? payload : {};
        const keepExistingTitle = !!(options && options.keepExistingTitle);
        const fallbackTitle = (options && options.fallbackTitle) ? String(options.fallbackTitle) : '';
        state.currentMarkdownPath = data.markdownPath || null;
        state.currentMarkdownBaseDir = data.baseDir || null;
        state.currentMarkdownRaw = data.markdown || '';
        if (!keepExistingTitle || !state.currentTaskTitle) {
            state.currentTaskTitle = data.title || fallbackTitle || state.currentTaskTitle || '';
        }
    }

    async function fetchMarkdownPayload(url) {
        const resp = await fetch(url);
        if (!resp.ok) {
            const text = await resp.text();
            throw new Error(text || `HTTP ${resp.status}`);
        }
        return resp.json();
    }

    function renderMarkdownLoadingSkeleton(options = {}) {
        const title = escapeHtml(String((options && options.title) || '正在打开内容...'));
        const detail = escapeHtml(String((options && options.detail) || '正在传输 Markdown 正文，请稍候。'));
        const markdownBody = document.getElementById('markdownBody');
        if (!markdownBody) {
            return;
        }
        markdownBody.innerHTML = `
            <div class="markdown-loading-shell" role="status" aria-live="polite">
                <div class="markdown-loading-title">${title}</div>
                <div class="markdown-loading-detail">${detail}</div>
                <div class="markdown-loading-lines" aria-hidden="true">
                    <span class="markdown-loading-line w-95"></span>
                    <span class="markdown-loading-line w-72"></span>
                    <span class="markdown-loading-line w-88"></span>
                    <span class="markdown-loading-line w-64"></span>
                    <span class="markdown-loading-line w-92"></span>
                    <span class="markdown-loading-line w-56"></span>
                </div>
            </div>
        `;
    }

    function isContentOpenRequestActive(requestSeq) {
        return Number(requestSeq) > 0 && Number(requestSeq) === Number(state.contentOpenRequestSeq);
    }

    async function loadTaskMarkdown(taskId, options = {}) {
        const requestSeq = Number(options.requestSeq) || 0;
        const shouldAbortApply = () => requestSeq > 0 && !isContentOpenRequestActive(requestSeq);
        const previousTaskId = state.currentTaskId;
        const hasExistingMarkdown = String(state.currentMarkdownRaw || '').trim().length > 0;
        const keepExistingVisibleContent = previousTaskId === taskId && hasExistingMarkdown;
        state.currentTaskId = taskId;
        updateUrlTaskId(taskId);
        pushView('content');
        setContentNeedsReload(false);
        setContentToolsAdvancedReveal(false);
        resetContentTransientState();
        renderTaskList();
        const viewerTitle = document.getElementById('viewerTitle');
        let slowTransferHintTimerId = 0;

        if (keepExistingVisibleContent) {
            if (viewerTitle) {
                viewerTitle.textContent = '正在更新内容...';
            }
        } else {
            if (viewerTitle) {
                viewerTitle.textContent = '正在打开内容...';
            }
            renderMarkdownLoadingSkeleton({
                title: '正在打开内容...',
                detail: '正在拉取正文并准备渲染。',
            });
            slowTransferHintTimerId = window.setTimeout(() => {
                if (shouldAbortApply()) {
                    return;
                }
                renderMarkdownLoadingSkeleton({
                    title: '内容传输中...',
                    detail: '当前正文较长，仍在传输，请稍候。',
                });
            }, 1600);
        }

        const payload = await fetchMarkdownPayload(
            `${API_BASE}/tasks/${encodeURIComponent(taskId)}/markdown?includePersonalization=false`
        )
            .finally(() => {
                if (slowTransferHintTimerId) {
                    window.clearTimeout(slowTransferHintTimerId);
                    slowTransferHintTimerId = 0;
                }
            });
        if (shouldAbortApply()) {
            return;
        }
        applyMarkdownPayloadToState(payload, {
            keepExistingTitle: false,
            fallbackTitle: taskId,
        });
        await refreshParagraphMetaFromServer();
        if (shouldAbortApply()) {
            return;
        }
        syncTaskTitleFromState(state.currentTaskTitle);
        refreshViewerTitle();

        // 确保进入内容页时段落状态已就绪，后续复制/收藏/批注可直接复用同一数据源。
        ensureParagraphEditorState();
        refreshQuickActionLabels();
        renderCurrentView();
        setSyncStatus('synced');
        setContentNeedsReload(false);
        setContentToolsAdvancedReveal(false);
    }

    async function loadTaskMarkdownByRelativePath(taskId, relativePath) {
        state.currentTaskId = taskId;
        pushView('content');
        updateUrlTaskId(taskId);
        setContentNeedsReload(false);
        setContentToolsAdvancedReveal(false);
        resetContentTransientState();
        renderMarkdownLoadingSkeleton({
            title: '正在打开笔记...',
            detail: '正在拉取所选 Markdown 文件。',
        });
        const payload = await fetchMarkdownPayload(
            `${API_BASE}/tasks/${encodeURIComponent(taskId)}/markdown/by-path?path=${encodeURIComponent(relativePath)}&includePersonalization=false`
        );
        applyMarkdownPayloadToState(payload, {
            keepExistingTitle: true,
            fallbackTitle: taskId || '',
        });
        await refreshParagraphMetaFromServer();
        syncTaskTitleFromState(state.currentTaskTitle);
        refreshViewerTitle();
        refreshQuickActionLabels();
        renderCurrentView();
        setSyncStatus('synced');
        setContentNeedsReload(false);
        setContentToolsAdvancedReveal(false);
    }

    function openPendingTaskContent(task) {
        if (!task || !task.taskId) {
            throw new Error('任务不存在');
        }
        const taskId = String(task.taskId);
        const fallbackTitle = resolveTaskCardTitle(task) || taskId;

        state.currentTaskId = taskId;
        state.currentTaskTitle = fallbackTitle;
        state.currentMarkdownPath = null;
        state.currentMarkdownBaseDir = null;
        state.currentMarkdownRaw = '';

        updateUrlTaskId(taskId);
        pushView('content');
        setContentNeedsReload(true);
        setContentToolsAdvancedReveal(false);
        resetContentTransientState();
        renderTaskList();
        syncTaskTitleFromState(state.currentTaskTitle);
        refreshViewerTitle();
        refreshQuickActionLabels();
        setSyncStatus('pending');

        const markdownBody = document.getElementById('markdownBody');
        if (markdownBody) {
            renderMarkdownLoadingSkeleton({
                title: '内容正在生成中...',
                detail: '系统会在完成后自动替换为可编辑正文。',
            });
        }
        teardownScrollSpy();
        const outlineList = document.getElementById('outlineList');
        if (outlineList) {
            outlineList.innerHTML = buildOutlineEmptyStateHtml();
        }
    }

    async function openTaskForContent(taskId, options = {}) {
        const normalizedTaskId = String(taskId || '').trim();
        if (!normalizedTaskId) {
            throw new Error('任务不存在');
        }
        const task = findTaskById(normalizedTaskId);
        const forceMarkdownRequest = !!(options && options.forceMarkdownRequest);
        if (!forceMarkdownRequest && state.contentOpenInFlight && state.contentOpenTaskId === normalizedTaskId) {
            return { mode: 'loading', task };
        }
        if (task && !forceMarkdownRequest && isTaskInProgress(task) && !task.markdownAvailable) {
            // 切到 pending 时显式作废旧的 markdown 打开请求，避免慢请求回写触发二次闪烁。
            state.contentOpenRequestSeq += 1;
            state.contentOpenInFlight = false;
            state.contentOpenTaskId = '';
            openPendingTaskContent(task);
            return { mode: 'pending', task };
        }
        const requestSeq = Number(state.contentOpenRequestSeq || 0) + 1;
        state.contentOpenRequestSeq = requestSeq;
        state.contentOpenInFlight = true;
        state.contentOpenTaskId = normalizedTaskId;
        try {
            await loadTaskMarkdown(normalizedTaskId, { requestSeq });
            if (!isContentOpenRequestActive(requestSeq)) {
                return { mode: 'stale', task: findTaskById(normalizedTaskId) };
            }
            return { mode: 'markdown', task: findTaskById(normalizedTaskId) };
        } finally {
            if (isContentOpenRequestActive(requestSeq)) {
                state.contentOpenInFlight = false;
                state.contentOpenTaskId = '';
            }
        }
    }

    async function autoEnterSingleInProgressTask() {
        const candidate = findSingleInProgressTask(state.tasks);
        if (!candidate || !candidate.taskId) {
            return false;
        }
        await openTaskForContent(candidate.taskId);
        return true;
    }

    function formatVideoClock(valueSeconds) {
        const seconds = Math.max(0, Number(valueSeconds) || 0);
        const h = Math.floor(seconds / 3600);
        const m = Math.floor((seconds % 3600) / 60);
        const s = Math.floor(seconds % 60);
        if (h > 0) {
            return `${String(h).padStart(2, '0')}:${String(m).padStart(2, '0')}:${String(s).padStart(2, '0')}`;
        }
        return `${String(m).padStart(2, '0')}:${String(s).padStart(2, '0')}`;
    }

    // 将原生 <video> 统一升级为沉浸式播放壳：默认隐藏控件，仅在触摸时浮现，减少“播放器控件感”。
    function enhanceImmersiveVideoPlayer(video) {
        if (!video || video.dataset.immersiveBound === '1') return;
        video.dataset.immersiveBound = '1';
        video.classList.add('immersive-video-el');
        video.controls = false;
        video.removeAttribute('controls');
        video.setAttribute('playsinline', 'playsinline');
        video.setAttribute('preload', 'metadata');
        if (!video.getAttribute('poster')) {
            video.setAttribute('poster', DEFAULT_VIDEO_POSTER);
        }

        const shell = document.createElement('div');
        shell.className = 'immersive-video-shell';
        const controls = document.createElement('div');
        controls.className = 'immersive-video-controls';
        controls.innerHTML = `
            <button class="immersive-video-btn" type="button" data-role="toggle" aria-label="播放或暂停">播放</button>
            <div class="immersive-video-timeline">
                <input class="immersive-video-seek" data-role="seek" type="range" min="0" max="1000" value="0" step="1" aria-label="视频进度">
                <span class="immersive-video-time" data-role="time">00:00 / 00:00</span>
            </div>
            <button class="immersive-video-btn" type="button" data-role="mute" aria-label="静音切换">声音</button>
            <button class="immersive-video-btn" type="button" data-role="fullscreen" aria-label="全屏播放">全屏</button>
        `;
        const toggleBtn = controls.querySelector('[data-role="toggle"]');
        const seek = controls.querySelector('[data-role="seek"]');
        const time = controls.querySelector('[data-role="time"]');
        const muteBtn = controls.querySelector('[data-role="mute"]');
        const fullscreenBtn = controls.querySelector('[data-role="fullscreen"]');
        if (!toggleBtn || !seek || !time || !muteBtn || !fullscreenBtn) {
            return;
        }

        const parent = video.parentNode;
        if (!parent) return;
        parent.insertBefore(shell, video);
        shell.appendChild(video);
        shell.appendChild(controls);

        let hideTimer = 0;
        let draggingSeek = false;
        const showControls = () => {
            shell.classList.add('controls-visible');
            if (hideTimer) {
                window.clearTimeout(hideTimer);
            }
            if (!video.paused) {
                hideTimer = window.setTimeout(() => {
                    shell.classList.remove('controls-visible');
                    hideTimer = 0;
                }, 1700);
            }
        };
        const updateProgress = () => {
            const duration = Number(video.duration) || 0;
            const current = Number(video.currentTime) || 0;
            if (duration > 0) {
                if (!draggingSeek) {
                    seek.value = String(Math.round((current / duration) * 1000));
                }
                time.textContent = `${formatVideoClock(current)} / ${formatVideoClock(duration)}`;
            } else {
                seek.value = '0';
                time.textContent = '00:00 / 00:00';
            }
            toggleBtn.textContent = video.paused ? '播放' : '暂停';
            muteBtn.textContent = video.muted ? '静音' : '声音';
        };
        const togglePlayPause = async () => {
            try {
                if (video.paused) {
                    await video.play();
                } else {
                    video.pause();
                }
            } catch (error) {
                console.warn('视频播放控制失败', error);
            }
            showControls();
        };
        const toggleMute = () => {
            video.muted = !video.muted;
            updateProgress();
            showControls();
        };
        const toggleFullscreen = async () => {
            try {
                if (document.fullscreenElement === shell && document.exitFullscreen) {
                    await document.exitFullscreen();
                } else if (shell.requestFullscreen) {
                    await shell.requestFullscreen();
                } else if (video.webkitEnterFullscreen) {
                    video.webkitEnterFullscreen();
                }
            } catch (error) {
                console.warn('全屏切换失败', error);
            }
            showControls();
        };

        shell.addEventListener('pointermove', showControls, { passive: true });
        shell.addEventListener('touchstart', showControls, { passive: true });
        shell.addEventListener('click', (event) => {
            const target = event.target;
            if (target && target.closest && target.closest('.immersive-video-controls')) {
                return;
            }
            togglePlayPause();
        });
        toggleBtn.addEventListener('click', (event) => {
            event.preventDefault();
            event.stopPropagation();
            togglePlayPause();
        });
        muteBtn.addEventListener('click', (event) => {
            event.preventDefault();
            event.stopPropagation();
            toggleMute();
        });
        fullscreenBtn.addEventListener('click', (event) => {
            event.preventDefault();
            event.stopPropagation();
            toggleFullscreen();
        });
        seek.addEventListener('pointerdown', (event) => {
            draggingSeek = true;
            event.stopPropagation();
            showControls();
        });
        seek.addEventListener('input', (event) => {
            const duration = Number(video.duration) || 0;
            if (duration <= 0) return;
            const next = (Number(event.target.value) / 1000) * duration;
            if (Number.isFinite(next)) {
                video.currentTime = Math.max(0, Math.min(duration, next));
            }
            updateProgress();
            showControls();
        });
        seek.addEventListener('change', () => {
            draggingSeek = false;
            showControls();
        });
        video.addEventListener('loadedmetadata', updateProgress);
        video.addEventListener('durationchange', updateProgress);
        video.addEventListener('timeupdate', updateProgress);
        video.addEventListener('play', () => {
            shell.classList.add('is-playing');
            updateProgress();
            showControls();
        });
        video.addEventListener('pause', () => {
            shell.classList.remove('is-playing');
            updateProgress();
            showControls();
        });
        video.addEventListener('ended', () => {
            shell.classList.remove('is-playing');
            shell.classList.add('controls-visible');
            updateProgress();
        });
        updateProgress();
        showControls();
    }

    function enhanceVideoLinks(container) {
        const links = Array.from(container.querySelectorAll('a[href]'));
        links.forEach((link) => {
            const href = link.getAttribute('href') || '';
            const originalHref = link.getAttribute('data-original-href') || href;
            if (!originalHref || !isVideoPath(originalHref)) return;
            if (link.dataset.previewBound === '1') return;
            link.dataset.previewBound = '1';
            const video = document.createElement('video');
            video.playsInline = true;
            video.preload = 'metadata';
            video.poster = DEFAULT_VIDEO_POSTER;
            video.src = href;
            video.setAttribute('data-immersive', '1');
            link.insertAdjacentElement('afterend', video);
        });
    }

    function enhanceInlineVideos(container) {
        if (!container) return;
        container.querySelectorAll('video').forEach((video) => {
            enhanceImmersiveVideoPlayer(video);
        });
    }

    function bindInternalNoteLinks(container, taskId) {
        container.querySelectorAll('a.internal-note-link[data-note-path]').forEach(link => {
            link.addEventListener('click', async (event) => {
                event.preventDefault();
                const notePath = link.getAttribute('data-note-path');
                if (!notePath) return;
                try {
                    await loadTaskMarkdownByRelativePath(taskId, notePath);
                } catch (error) {
                    showError(`打开内部笔记失败：${normalizeErrorMessage(error)}`);
                }
            });
        });
    }

    function renderMarkdownFragment(markdownText, taskId) {
        const transformed = transformObsidianSyntax(String(markdownText || ''), taskId);
        const engine = getMarkdownEngine(taskId);
        let html = '';
        if (!engine) {
            html = `<pre>${String(transformed).replace(/</g, '&lt;')}</pre>`;
        } else {
            html = engine.render(transformed);
        }
        if (window.DOMPurify) {
            html = window.DOMPurify.sanitize(html, {
                ADD_TAGS: ['video', 'source'],
                ADD_ATTR: ['controls', 'playsinline', 'preload', 'src', 'class', 'data-immersive', 'data-note-path', 'data-original-href', 'data-line', 'loading', 'decoding', 'poster', 'alt'],
            });
        }
        return html;
    }

    function buildFallbackAltFromSrc(src) {
        const raw = String(src || '');
        if (!raw) return '图片';
        const clean = raw.split('?')[0].split('#')[0];
        const base = clean.split('/').filter(Boolean).pop() || '';
        if (!base) return '图片';
        try {
            return decodeURIComponent(base);
        } catch (_error) {
            return base;
        }
    }

    function applyNativeMediaOptimizations(container) {
        if (!container) return;
        container.querySelectorAll('img').forEach((img) => {
            img.setAttribute('loading', 'lazy');
            img.setAttribute('decoding', 'async');
            const currentAlt = (img.getAttribute('alt') || '').trim();
            if (!currentAlt) {
                img.setAttribute('alt', buildFallbackAltFromSrc(img.getAttribute('src')));
            }
        });
        container.querySelectorAll('iframe').forEach((frame) => {
            frame.setAttribute('loading', 'lazy');
        });
        container.querySelectorAll('video').forEach((video) => {
            if (!video.getAttribute('poster')) {
                video.setAttribute('poster', DEFAULT_VIDEO_POSTER);
            }
            video.setAttribute('playsinline', 'playsinline');
            video.setAttribute('preload', 'metadata');
        });
    }

    // 统一渲染后的增强处理，保证内容页中的宽内容与大纲行为一致。
    function enhanceRenderedContent(container, taskId, options = {}) {
        const withMedia = !!(options && options.withMedia);
        const withLinks = !!(options && options.withLinks);
        const withMermaid = !!(options && options.withMermaid);
        const withOutline = options && Object.prototype.hasOwnProperty.call(options, 'withOutline')
            ? !!options.withOutline
            : true;
        wrapWideContentBlocks(container);
        applyNativeMediaOptimizations(container);
        if (withLinks && taskId) {
            bindInternalNoteLinks(container, taskId);
        }
        if (withMedia) {
            bindImagePreview(container);
            enhanceVideoLinks(container);
            enhanceInlineVideos(container);
            bindMediaLongPress(container);
        }
        if (withOutline) {
            buildOutline(container);
        }
        if (withMermaid) {
            renderMermaid(container);
        }
    }

    function renderMarkdown(markdownText, taskId) {
        const container = document.getElementById('markdownBody');
        if (!container) return;
        container.classList.remove('edit-scroll-host');
        hideParagraphWikilinkPanel();
        const contentText = String(markdownText || '');
        const token = Number(state.markdownRenderToken || 0) + 1;
        state.markdownRenderToken = token;

        const commitRender = () => {
            if (state.markdownRenderToken !== token) {
                return;
            }
            const html = renderMarkdownFragment(contentText, taskId);
            if (state.markdownRenderToken !== token) {
                return;
            }
            container.innerHTML = html;
            enhanceRenderedContent(container, taskId, {
                withMedia: true,
                withLinks: true,
                withMermaid: true,
            });
            applyFavoriteTagsToMarkdown(container);
            refreshConceptCards(container, contentText);
        };

        if (contentText.length >= 90000) {
            container.innerHTML = '<div class="empty">正在渲染内容...</div>';
            requestAnimationFrame(() => {
                setTimeout(commitRender, 0);
            });
            return;
        }
        commitRender();
    }

    function ensureParagraphEditorState() {
        if (!state.paragraphBlocks || !state.paragraphBlocks.length) {
            state.paragraphBlocks = splitMarkdownIntoParagraphBlocks(state.currentMarkdownRaw || '');
        }
        if (!state.paragraphMeta) {
            state.paragraphMeta = { favorites: {}, comments: {} };
        }
    }

    function buildParagraphPreviewHtml(markdownText) {
        const raw = String(markdownText || '');
        if (!raw) {
            return '<span class="paragraph-line-empty">（空行）</span>';
        }
        return escapeHtml(raw);
    }

    function normalizeParagraphComments(raw) {
        if (Array.isArray(raw)) {
            return raw.map((item) => String(item || '').trim()).filter(Boolean);
        }
        if (typeof raw === 'string') {
            const trimmed = raw.trim();
            return trimmed ? [trimmed] : [];
        }
        return [];
    }

    function getParagraphComments(index) {
        const all = state.paragraphMeta && state.paragraphMeta.comments ? state.paragraphMeta.comments : {};
        return normalizeParagraphComments(all[index]);
    }

    function setParagraphComments(index, comments) {
        const normalized = normalizeParagraphComments(comments);
        if (!state.paragraphMeta.comments) {
            state.paragraphMeta.comments = {};
        }
        if (!normalized.length) {
            delete state.paragraphMeta.comments[index];
            return;
        }
        state.paragraphMeta.comments[index] = normalized;
    }

    function normalizeCommentUnitsByLine(values) {
        const units = [];
        (values || []).forEach((value) => {
            String(value || '')
                .split(/\r?\n/)
                .map((line) => line.trim())
                .filter(Boolean)
                .forEach((line) => units.push(line));
        });
        return units;
    }

    function getInlineStickyRoot() {
        return document.getElementById('inlineStickyNote');
    }

    function clearInlineStickyTargetHighlight() {
        document.querySelectorAll('.inline-sticky-target-active').forEach((node) => {
            node.classList.remove('inline-sticky-target-active');
        });
    }

    function markInlineStickyTarget(index) {
        clearInlineStickyTargetHighlight();
        const target = getParagraphCardByIndex(index);
        if (target) {
            target.classList.add('inline-sticky-target-active');
        }
    }

    function removeInlineStickyDom() {
        const node = getInlineStickyRoot();
        if (node) {
            node.remove();
        }
    }

    function resolveInlineStickyOrigin(target, options = {}) {
        const rect = target.getBoundingClientRect();
        const fallbackX = rect.left + Math.min(96, Math.max(32, rect.width * 0.32));
        const anchorX = Number.isFinite(options.anchorX) ? Number(options.anchorX) : fallbackX;
        const originX = Math.max(8, Math.min(92, ((anchorX - rect.left) / Math.max(1, rect.width)) * 100));
        return { originX, originY: 10 };
    }

    function collectInlineStickyRenderIndexes() {
        const indexes = new Set();
        Object.keys((state.paragraphMeta && state.paragraphMeta.comments) || {}).forEach((raw) => {
            const index = Number(raw);
            if (!Number.isFinite(index) || index < 0) {
                return;
            }
            const comments = getParagraphComments(index);
            if (comments.length) {
                indexes.add(index);
            }
        });
        if (state.inlineStickyVisible && Number.isFinite(state.inlineStickyParagraphIndex) && state.inlineStickyParagraphIndex >= 0) {
            indexes.add(state.inlineStickyParagraphIndex);
        }
        return Array.from(indexes).sort((a, b) => a - b);
    }

    function buildInlineStickyPreviewText(comments) {
        const latest = String((comments || [])[Math.max(0, (comments || []).length - 1)] || '')
            .replace(/\s+/g, ' ')
            .trim();
        if (!latest) {
            return '查看批注';
        }
        if (latest.length <= INLINE_STICKY_CONFIG.previewMaxChars) {
            return latest;
        }
        return `${latest.slice(0, INLINE_STICKY_CONFIG.previewMaxChars)}…`;
    }

    function isInlineStickyMotionEnabled() {
        if (typeof window === 'undefined' || typeof window.matchMedia !== 'function') {
            return true;
        }
        const media = window.matchMedia('(prefers-reduced-motion: reduce)');
        return !media.matches;
    }

    function applyInlineStickyWobbleToDom() {
        const base = Number(state.inlineStickyWobbleDeg) || 0;
        document.querySelectorAll('.inline-sticky-note-inline.is-static').forEach((node) => {
            const factor = Number(node.getAttribute('data-sticky-wobble-factor')) || 1;
            node.style.setProperty('--sticky-wobble-rot', `${(base * factor).toFixed(3)}deg`);
        });
    }

    function stopInlineStickyWobbleDecay() {
        if (state.inlineStickyWobbleRafId) {
            cancelAnimationFrame(state.inlineStickyWobbleRafId);
            state.inlineStickyWobbleRafId = 0;
        }
    }

    function tickInlineStickyWobbleDecay() {
        state.inlineStickyWobbleDeg = (Number(state.inlineStickyWobbleDeg) || 0) * INLINE_STICKY_CONFIG.wobble.decay;
        if (Math.abs(state.inlineStickyWobbleDeg) < INLINE_STICKY_CONFIG.wobble.stopThreshold) {
            state.inlineStickyWobbleDeg = 0;
            applyInlineStickyWobbleToDom();
            state.inlineStickyWobbleRafId = 0;
            return;
        }
        applyInlineStickyWobbleToDom();
        state.inlineStickyWobbleRafId = requestAnimationFrame(tickInlineStickyWobbleDecay);
    }

    function nudgeInlineStickyWobble(deltaY, deltaMs) {
        if (!isInlineStickyMotionEnabled()) {
            return;
        }
        const safeMs = Math.max(INLINE_STICKY_CONFIG.wobble.minDeltaMs, Number(deltaMs) || 0);
        const velocity = Number(deltaY) / safeMs;
        const impulse = Math.max(
            -INLINE_STICKY_CONFIG.wobble.maxDeg,
            Math.min(INLINE_STICKY_CONFIG.wobble.maxDeg, velocity * INLINE_STICKY_CONFIG.wobble.impulseScale)
        );
        const prev = Number(state.inlineStickyWobbleDeg) || 0;
        state.inlineStickyWobbleDeg = (prev * INLINE_STICKY_CONFIG.wobble.carry) + impulse;
        applyInlineStickyWobbleToDom();
        if (!state.inlineStickyWobbleRafId) {
            state.inlineStickyWobbleRafId = requestAnimationFrame(tickInlineStickyWobbleDecay);
        }
    }

    function resolveInlineStickyScrollHost() {
        const markdownBody = document.getElementById('markdownBody');
        if (
            markdownBody
            && markdownBody.classList.contains('edit-scroll-host')
            && markdownBody.scrollHeight > (markdownBody.clientHeight + 1)
        ) {
            return markdownBody;
        }
        const contentView = document.getElementById('viewContent');
        if (contentView && contentView.scrollHeight > (contentView.clientHeight + 1)) {
            return contentView;
        }
        return contentView || markdownBody || document.scrollingElement || document.documentElement;
    }

    function bindInlineStickyScrollMotion() {
        const bindHost = (host) => {
            if (!host || host.dataset.inlineStickyMotionBound === '1') {
                return;
            }
            host.dataset.inlineStickyMotionBound = '1';
            host.addEventListener('scroll', () => {
                const activeHost = resolveInlineStickyScrollHost();
                if (activeHost !== host) {
                    return;
                }
                const now = performance.now();
                const top = Number(host.scrollTop) || 0;
                const lastAt = Number(state.inlineStickyWobbleLastAt) || 0;
                const lastTop = Number(state.inlineStickyWobbleLastTop) || 0;
                if (lastAt > 0) {
                    nudgeInlineStickyWobble(top - lastTop, now - lastAt);
                }
                state.inlineStickyWobbleLastTop = top;
                state.inlineStickyWobbleLastAt = now;
            }, { passive: true });
        };
        bindHost(document.getElementById('markdownBody'));
        bindHost(document.getElementById('viewContent'));
    }

    function clampStickyNumber(value, min, max) {
        return Math.max(min, Math.min(max, Number(value) || 0));
    }

    function clearInlineStickyCenterTimer() {
        if (state.inlineStickyCenterTimerId) {
            clearTimeout(state.inlineStickyCenterTimerId);
            state.inlineStickyCenterTimerId = 0;
        }
    }

    function scheduleInlineStickyCenterAlign(delayMs = 0, options = {}) {
        clearInlineStickyCenterTimer();
        const waitMs = Math.max(0, Number(delayMs) || 0);
        state.inlineStickyCenterTimerId = setTimeout(() => {
            state.inlineStickyCenterTimerId = 0;
            alignInlineStickyEditorToVisualCenter(options);
        }, waitMs);
    }

    function bindInlineStickyViewportSync() {
        if (state.inlineStickyViewportSyncBound) {
            return;
        }
        state.inlineStickyViewportSyncBound = true;
        const onViewportShift = () => {
            if (!state.inlineStickyVisible) {
                return;
            }
            // 键盘弹起会连续触发 viewport 变化，先快速就位，再做一次平滑复位。
            alignInlineStickyEditorToVisualCenter({ instant: true });
            scheduleInlineStickyCenterAlign(INLINE_STICKY_CONFIG.editorCenter.keyboardFollowupDelayMs, { instant: false });
        };
        if (window.visualViewport && typeof window.visualViewport.addEventListener === 'function') {
            window.visualViewport.addEventListener('resize', onViewportShift, { passive: true });
            window.visualViewport.addEventListener('scroll', onViewportShift, { passive: true });
            return;
        }
        window.addEventListener('resize', onViewportShift, { passive: true });
    }

    function alignInlineStickyEditorToVisualCenter(options = {}) {
        if (!state.inlineStickyVisible || state.inlineStickyParagraphIndex < 0) {
            return;
        }
        const sticky = getInlineStickyRoot();
        const scrollHost = resolveInlineStickyScrollHost();
        if (!sticky || !scrollHost) {
            return;
        }

        const containerRect = scrollHost.getBoundingClientRect();
        const stickyRect = sticky.getBoundingClientRect();
        if (!containerRect || !stickyRect || stickyRect.height <= 0 || containerRect.height <= 0) {
            return;
        }

        // 以当前可视视口计算“视觉中心”，键盘弹出时 visualViewport 会更准确。
        let viewportTop = 0;
        let viewportHeight = window.innerHeight || document.documentElement.clientHeight || 0;
        if (window.visualViewport && Number.isFinite(window.visualViewport.height)) {
            viewportTop = Number(window.visualViewport.offsetTop) || 0;
            viewportHeight = Number(window.visualViewport.height) || viewportHeight;
        }
        const desiredCenterYRaw = viewportTop + (viewportHeight * INLINE_STICKY_CONFIG.editorCenter.viewportRatio);
        const desiredCenterY = clampStickyNumber(
            desiredCenterYRaw,
            containerRect.top + INLINE_STICKY_CONFIG.editorCenter.edgePaddingPx,
            containerRect.bottom - INLINE_STICKY_CONFIG.editorCenter.edgePaddingPx
        );
        const stickyCenterY = stickyRect.top + (stickyRect.height / 2);
        const delta = stickyCenterY - desiredCenterY;
        if (Math.abs(delta) <= INLINE_STICKY_CONFIG.editorCenter.deadzonePx) {
            return;
        }

        const maxScrollTop = Math.max(0, scrollHost.scrollHeight - scrollHost.clientHeight);
        const nextTop = clampStickyNumber((Number(scrollHost.scrollTop) || 0) + delta, 0, maxScrollTop);
        scrollHost.scrollTo({
            top: nextTop,
            behavior: options.instant ? 'auto' : 'smooth',
        });
        state.inlineStickyWobbleLastTop = nextTop;
        state.inlineStickyWobbleLastAt = performance.now();
    }

    function renderInlineStickyAnnotations(container) {
        if (!container) {
            return;
        }
        container.querySelectorAll('.inline-sticky-note-inline').forEach((node) => node.remove());
        const indexes = collectInlineStickyRenderIndexes();
        indexes.forEach((index) => {
            const target = getParagraphCardByIndex(index);
            if (!target || !container.contains(target)) {
                return;
            }
            const comments = getParagraphComments(index);
            const editing = state.inlineStickyVisible && state.inlineStickyParagraphIndex === index;
            if (!editing && !comments.length) {
                return;
            }
            const sticky = document.createElement('section');
            sticky.className = `inline-sticky-note inline-sticky-note-inline${editing ? ' is-editing open' : ' is-static'}`;
            sticky.setAttribute('data-inline-sticky-index', String(index));
            sticky.setAttribute('aria-label', `第 ${index + 1} 行便签`);
            sticky.style.setProperty('--sticky-tilt-deg', `${((index % 5) - 2) * 0.22}deg`);
            if (editing) {
                sticky.id = 'inlineStickyNote';
                const origin = resolveInlineStickyOrigin(target, {
                    anchorX: state.inlineStickyAnchorX,
                });
                sticky.style.setProperty('--sticky-origin-x', `${origin.originX}%`);
                sticky.style.setProperty('--sticky-origin-y', `${origin.originY}%`);
                sticky.innerHTML = `
                    <div class="inline-sticky-body">
                        <textarea data-inline-sticky-editor placeholder="直接写想法，失焦会自动保存。">${escapeHtml(state.inlineStickyDraft || '')}</textarea>
                    </div>
                `;
            } else {
                const wobbleFactor = INLINE_STICKY_CONFIG.wobbleFactor.base
                    + (((index % 4) - 1.5) * INLINE_STICKY_CONFIG.wobbleFactor.step);
                sticky.setAttribute('data-sticky-wobble-factor', wobbleFactor.toFixed(2));
                const preview = buildInlineStickyPreviewText(comments);
                sticky.innerHTML = `
                    <div class="inline-sticky-body">
                        <div class="inline-sticky-pill" data-inline-sticky-view>
                            <span class="inline-sticky-pill-dot" aria-hidden="true"></span>
                            <span class="inline-sticky-pill-text">${escapeHtml(preview)}</span>
                            <span class="inline-sticky-pill-count">${comments.length}</span>
                        </div>
                    </div>
                `;
            }
            target.insertAdjacentElement('afterend', sticky);
        });
        applyInlineStickyWobbleToDom();
    }

    function syncInlineStickyDraftFromDom() {
        const editor = document.querySelector('#inlineStickyNote [data-inline-sticky-editor]');
        state.inlineStickyDraft = editor ? String(editor.value || '') : String(state.inlineStickyDraft || '');
    }

    function renderInlineSticky() {
        const markdownBody = document.getElementById('markdownBody');
        if (!markdownBody) {
            return;
        }
        clearInlineStickyTargetHighlight();
        if (state.inlineStickyVisible && state.inlineStickyParagraphIndex >= 0) {
            const target = getParagraphCardByIndex(state.inlineStickyParagraphIndex);
            if (!target) {
                closeInlineStickyNote();
                return;
            }
            markInlineStickyTarget(state.inlineStickyParagraphIndex);
        }
        applyFavoriteTagsToMarkdown(markdownBody);
        const sticky = getInlineStickyRoot();
        const editor = sticky ? sticky.querySelector('[data-inline-sticky-editor]') : null;
        if (editor) {
            try {
                editor.focus({ preventScroll: true });
            } catch (_error) {
                editor.focus();
            }
            const end = String(editor.value || '').length;
            editor.setSelectionRange(end, end);
            alignInlineStickyEditorToVisualCenter({ instant: false });
            requestAnimationFrame(() => {
                alignInlineStickyEditorToVisualCenter({ instant: false });
            });
            scheduleInlineStickyCenterAlign(INLINE_STICKY_CONFIG.editorCenter.followupDelayMs, { instant: false });
        }
    }

    function openInlineStickyNote(index, options = {}) {
        ensureParagraphEditorState();
        if (!Number.isFinite(index) || index < 0 || index >= state.paragraphBlocks.length) {
            return;
        }
        const list = getParagraphComments(index);
        state.inlineStickyParagraphIndex = index;
        state.inlineStickyDraft = list.join('\n');
        state.inlineStickyDirty = false;
        state.inlineStickyVisible = true;
        state.inlineStickyAnchorX = Number.isFinite(Number(options.anchorX)) ? Number(options.anchorX) : NaN;
        state.inlineStickyAnchorY = Number.isFinite(Number(options.anchorY)) ? Number(options.anchorY) : NaN;
        renderInlineSticky();
    }

    function closeInlineStickyNote() {
        state.inlineStickyVisible = false;
        state.inlineStickyParagraphIndex = -1;
        state.inlineStickyDraft = '';
        state.inlineStickyDirty = false;
        state.inlineStickyAnchorX = NaN;
        state.inlineStickyAnchorY = NaN;
        clearInlineStickyCenterTimer();
        removeInlineStickyDom();
        clearInlineStickyTargetHighlight();
        const markdownBody = document.getElementById('markdownBody');
        applyFavoriteTagsToMarkdown(markdownBody);
    }

    function isSameCommentList(a, b) {
        if (!Array.isArray(a) || !Array.isArray(b) || a.length !== b.length) {
            return false;
        }
        for (let i = 0; i < a.length; i += 1) {
            if (String(a[i] || '') !== String(b[i] || '')) {
                return false;
            }
        }
        return true;
    }

    async function saveInlineStickyNote(options = {}) {
        const shouldClose = options.close === true;
        if (state.inlineStickyParagraphIndex < 0) {
            if (shouldClose) {
                closeInlineStickyNote();
            }
            return;
        }
        const lineIndex = state.inlineStickyParagraphIndex;
        syncInlineStickyDraftFromDom();
        const normalized = normalizeCommentUnitsByLine([state.inlineStickyDraft]);
        const current = getParagraphComments(lineIndex);
        const changed = !isSameCommentList(current, normalized);
        if (changed) {
            setParagraphComments(lineIndex, normalized);
            // 批注保存只更新元数据并保持 Markdown 渲染视图，避免回退到旧的段落卡片渲染模式。
            if (state.currentTaskId) {
                const markdownBody = document.getElementById('markdownBody');
                applyFavoriteTagsToMarkdown(markdownBody);
            }
            scheduleParagraphBackgroundSync({ metaChanged: true });
        }
        state.inlineStickyDirty = false;
        if (shouldClose) {
            closeInlineStickyNote();
        }
    }

    function cloneParagraphMeta() {
        return {
            favorites: { ...(state.paragraphMeta.favorites || {}) },
            comments: JSON.parse(JSON.stringify(state.paragraphMeta.comments || {})),
        };
    }

    function cloneParagraphBlocks() {
        return (state.paragraphBlocks || []).map((block) => ({ ...block }));
    }

    function hideUndoToast(clearSnapshot) {
        const toast = document.getElementById('undoToast');
        if (toast) {
            toast.classList.remove('open');
        }
        if (state.undoDeleteTimeoutId) {
            clearTimeout(state.undoDeleteTimeoutId);
            state.undoDeleteTimeoutId = null;
        }
        if (clearSnapshot) {
            state.undoDeleteSnapshot = null;
        }
    }

    function showUndoToast(text, snapshot) {
        const toast = document.getElementById('undoToast');
        const label = document.getElementById('undoToastText');
        if (!toast || !label) return;
        state.undoDeleteSnapshot = snapshot;
        label.textContent = text || '已删除';
        toast.classList.add('open');
        if (state.undoDeleteTimeoutId) {
            clearTimeout(state.undoDeleteTimeoutId);
        }
        state.undoDeleteTimeoutId = setTimeout(() => {
            hideUndoToast(true);
        }, 6000);
    }

    async function undoLastDelete() {
        const snapshot = state.undoDeleteSnapshot;
        if (!snapshot) return;
        state.paragraphBlocks = snapshot.blocks.map((item) => ({ ...item }));
        state.paragraphMeta = {
            favorites: { ...(snapshot.meta.favorites || {}) },
            comments: JSON.parse(JSON.stringify(snapshot.meta.comments || {})),
        };
        syncCurrentMarkdownFromBlocks();
        hideUndoToast(true);
        renderCurrentView();
        scheduleParagraphBackgroundSync({ markdownChanged: true, metaChanged: true });
    }

    async function deleteLineAtIndex(index, options) {
        const opts = options || {};
        const requestedDeleteCount = Number(opts.deleteCount != null ? opts.deleteCount : opts.lineSpan);
        const deleteCount = Number.isFinite(requestedDeleteCount) && requestedDeleteCount > 0
            ? Math.min(state.paragraphBlocks.length - index, Math.floor(requestedDeleteCount))
            : 1;
        if (!Number.isFinite(index) || index < 0 || index >= state.paragraphBlocks.length || deleteCount <= 0) {
            return;
        }
        if (opts.confirmDelete) {
            const confirmText = deleteCount > 1
                ? `确认删除这 ${deleteCount} 行？这会直接修改 markdown 文件。`
                : UI_COPY.confirmDeleteLine;
            if (!confirm(confirmText)) {
                return;
            }
        }

        const backupBlocks = cloneParagraphBlocks();
        const backupMeta = cloneParagraphMeta();

        state.paragraphBlocks.splice(index, deleteCount);
        const editingIndex = Number(state.paragraphEditingIndex);
        if (Number.isFinite(editingIndex) && editingIndex >= 0) {
            if (editingIndex >= index && editingIndex < index + deleteCount) {
                state.paragraphEditingIndex = -1;
                state.paragraphDraftText = '';
            } else if (editingIndex >= index + deleteCount) {
                state.paragraphEditingIndex = editingIndex - deleteCount;
            }
        } else {
            state.paragraphEditingIndex = -1;
            state.paragraphDraftText = '';
        }
        reindexParagraphMetaAfterDelete(index, deleteCount);
        syncCurrentMarkdownFromBlocks();

        renderCurrentView();
        if (opts.withUndo) {
            const undoText = deleteCount > 1
                ? `已删除第 ${index + 1} - ${index + deleteCount} 行`
                : `已删除第 ${index + 1} 行`;
            showUndoToast(undoText, { blocks: backupBlocks, meta: backupMeta });
        }
        scheduleParagraphBackgroundSync({ markdownChanged: true, metaChanged: true });
    }

    function deriveFilenameFromUrl(url, fallbackBase) {
        try {
            const parsed = new URL(url, window.location.origin);
            const pathHint = parsed.searchParams.get('path');
            if (pathHint) {
                const segment = decodeURIComponent(pathHint).split('/').filter(Boolean).pop();
                if (segment) return segment;
            }
            const pathname = parsed.pathname || '';
            const tail = pathname.split('/').filter(Boolean).pop();
            if (tail && tail.includes('.')) return tail;
        } catch (_error) {
            // 忽略 URL 解析异常，回退默认文件名。
        }
        const stamp = Date.now();
        return `${fallbackBase}_${stamp}.bin`;
    }

    async function saveMediaElementToLocal(mediaEl) {
        const src = mediaEl && (mediaEl.currentSrc || mediaEl.src);
        if (!src) {
            setTaskSummary('未找到可保存的媒体链接', 'error');
            return;
        }
        const isVideo = mediaEl.tagName && mediaEl.tagName.toLowerCase() === 'video';
        const fallbackBase = isVideo ? 'video_clip' : 'image_asset';
        const filename = deriveFilenameFromUrl(src, fallbackBase);

        const resp = await fetch(src);
        if (!resp.ok) {
            throw new Error(`HTTP ${resp.status}`);
        }
        const blob = await resp.blob();
        const blobUrl = URL.createObjectURL(blob);
        try {
            const a = document.createElement('a');
            a.href = blobUrl;
            a.download = filename;
            document.body.appendChild(a);
            a.click();
            a.remove();
        } finally {
            URL.revokeObjectURL(blobUrl);
        }
    }

    function getImageLightboxElements() {
        return {
            root: document.getElementById('imageLightbox'),
            image: document.getElementById('imageLightboxImg'),
            caption: document.getElementById('imageLightboxCaption'),
            hint: document.getElementById('imageLightboxHint'),
        };
    }

    function clampNumber(value, min, max) {
        return Math.min(max, Math.max(min, Number(value) || 0));
    }

    function getTouchDistance(touches) {
        if (!touches || touches.length < 2) return 0;
        const dx = Number(touches[0].clientX) - Number(touches[1].clientX);
        const dy = Number(touches[0].clientY) - Number(touches[1].clientY);
        return Math.hypot(dx, dy);
    }

    function readImageLightboxTransform(refs) {
        const x = Number(refs.image.dataset.tx || 0);
        const y = Number(refs.image.dataset.ty || 0);
        const scale = Number(refs.image.dataset.scale || 1);
        return {
            x: Number.isFinite(x) ? x : 0,
            y: Number.isFinite(y) ? y : 0,
            scale: Number.isFinite(scale) ? scale : 1,
        };
    }

    function applyImageLightboxTransform(refs, nextX, nextY, nextScale, options = {}) {
        if (!refs || !refs.root || !refs.image) return;
        const scale = clampNumber(nextScale, 0.48, 2.1);
        const x = Number(nextX) || 0;
        const y = Number(nextY) || 0;
        refs.image.dataset.tx = String(x);
        refs.image.dataset.ty = String(y);
        refs.image.dataset.scale = String(scale);
        refs.image.style.transform = `translate3d(${x}px, ${y}px, 0) scale(${scale})`;
        refs.image.style.transition = options.withTransition
            ? 'transform 260ms cubic-bezier(0.24, 0.82, 0.22, 1)'
            : 'none';

        if (!options.skipBackdrop) {
            const moveProgress = Math.min(1, (Math.abs(y) + (Math.abs(x) * 0.35)) / 360);
            const scaleProgress = Math.min(1, Math.max(0, 1 - scale) * 1.35);
            const opacity = clampNumber(1 - Math.max(moveProgress, scaleProgress), 0.16, 1);
            refs.root.style.setProperty('--image-lightbox-backdrop-opacity', opacity.toFixed(3));
        }
    }

    function clearImageLightboxHintTimer() {
        if (state.imageLightboxHideHintTimer) {
            window.clearTimeout(state.imageLightboxHideHintTimer);
            state.imageLightboxHideHintTimer = 0;
        }
    }

    function showImageLightboxHint(refs) {
        if (!refs || !refs.hint) return;
        clearImageLightboxHintTimer();
        refs.hint.hidden = false;
        refs.hint.classList.add('visible');
        state.imageLightboxHideHintTimer = window.setTimeout(() => {
            refs.hint.classList.remove('visible');
            refs.hint.hidden = true;
            state.imageLightboxHideHintTimer = 0;
        }, 2200);
    }

    function resetImageLightboxState(refs) {
        const safeRefs = refs || getImageLightboxElements();
        if (!safeRefs.root || !safeRefs.image || !safeRefs.caption) return;
        const activeRefs = safeRefs;
        activeRefs.root.hidden = true;
        activeRefs.root.setAttribute('aria-hidden', 'true');
        activeRefs.root.classList.remove('is-open');
        activeRefs.root.style.removeProperty('--image-lightbox-backdrop-opacity');
        activeRefs.root.dataset.closing = '0';
        activeRefs.image.removeAttribute('src');
        activeRefs.image.setAttribute('alt', '');
        activeRefs.image.style.transform = '';
        activeRefs.image.style.transition = '';
        delete activeRefs.image.dataset.tx;
        delete activeRefs.image.dataset.ty;
        delete activeRefs.image.dataset.scale;
        activeRefs.caption.textContent = '';
        activeRefs.caption.hidden = true;
        if (activeRefs.hint) {
            activeRefs.hint.classList.remove('visible');
            activeRefs.hint.hidden = true;
        }
        clearImageLightboxHintTimer();
        state.imageLightboxOpen = false;
        state.imageLightboxSourceNode = null;
        state.imageLightboxGesture = null;
        state.pinchStartDistance = 0;
        state.pinchTriggered = false;
    }

    function animateImageLightboxBackToIdentity(refs) {
        const current = readImageLightboxTransform(refs);
        applyImageLightboxTransform(refs, current.x, current.y, current.scale, { withTransition: false, skipBackdrop: true });
        refs.root.style.setProperty('--image-lightbox-backdrop-opacity', refs.root.style.getPropertyValue('--image-lightbox-backdrop-opacity') || '1');
        if (typeof refs.image.animate !== 'function' || typeof refs.root.animate !== 'function') {
            applyImageLightboxTransform(refs, 0, 0, 1, { withTransition: true });
            refs.root.style.setProperty('--image-lightbox-backdrop-opacity', '1');
            return;
        }
        refs.image.animate(
            [
                { transform: `translate3d(${current.x}px, ${current.y}px, 0) scale(${current.scale})` },
                { transform: 'translate3d(0, 0, 0) scale(1)' },
            ],
            { duration: 250, easing: 'cubic-bezier(0.22, 0.82, 0.22, 1)', fill: 'forwards' }
        ).finished.finally(() => {
            if (!state.imageLightboxOpen) return;
            applyImageLightboxTransform(refs, 0, 0, 1, { withTransition: false });
        });
        refs.root.animate(
            [{ opacity: Number(refs.root.style.getPropertyValue('--image-lightbox-backdrop-opacity') || 1) }, { opacity: 1 }],
            { duration: 210, easing: 'linear', fill: 'forwards' }
        ).finished.finally(() => {
            if (state.imageLightboxOpen) {
                refs.root.style.setProperty('--image-lightbox-backdrop-opacity', '1');
            }
        });
    }

    function openImageLightboxFromNode(node) {
        const src = String((node && (node.currentSrc || node.getAttribute('src'))) || '').trim();
        if (!src) return;
        const refs = getImageLightboxElements();
        if (!refs.root || !refs.image || !refs.caption) return;
        const sourceRect = node.getBoundingClientRect();
        const alt = String((node && node.getAttribute('alt')) || '').trim();
        refs.image.setAttribute('src', src);
        refs.image.setAttribute('alt', alt || buildFallbackAltFromSrc(src));
        if (alt) {
            refs.caption.textContent = alt;
            refs.caption.hidden = false;
        } else {
            refs.caption.textContent = '';
            refs.caption.hidden = true;
        }
        refs.root.hidden = false;
        refs.root.setAttribute('aria-hidden', 'false');
        refs.root.classList.add('is-open');
        refs.root.dataset.closing = '0';
        refs.root.style.setProperty('--image-lightbox-backdrop-opacity', '1');
        state.imageLightboxSourceNode = node;
        state.imageLightboxOpen = true;
        state.imageLightboxGesture = null;
        applyImageLightboxTransform(refs, 0, 0, 1, { withTransition: false });
        showImageLightboxHint(refs);

        const playOpenAnimation = () => {
            if (!state.imageLightboxOpen) return;
            const destinationRect = refs.image.getBoundingClientRect();
            if (!destinationRect.width || !destinationRect.height || !sourceRect.width || !sourceRect.height) {
                return;
            }
            if (typeof refs.image.animate !== 'function' || typeof refs.root.animate !== 'function') {
                return;
            }
            const dx = sourceRect.left - destinationRect.left;
            const dy = sourceRect.top - destinationRect.top;
            const sx = sourceRect.width / destinationRect.width;
            const sy = sourceRect.height / destinationRect.height;
            refs.image.animate(
                [
                    { transformOrigin: 'top left', transform: `translate3d(${dx}px, ${dy}px, 0) scale(${sx}, ${sy})` },
                    { transformOrigin: 'top left', transform: 'translate3d(0, 0, 0) scale(1, 1)' },
                ],
                { duration: 320, easing: 'cubic-bezier(0.2, 0.82, 0.2, 1)', fill: 'both' }
            );
            refs.root.animate(
                [{ opacity: 0 }, { opacity: 1 }],
                { duration: 220, easing: 'linear', fill: 'both' }
            );
        };

        if (refs.image.complete && refs.image.naturalWidth > 0) {
            requestAnimationFrame(playOpenAnimation);
        } else {
            refs.image.addEventListener('load', () => requestAnimationFrame(playOpenAnimation), { once: true });
        }
    }

    function closeImageLightbox(options = {}) {
        const refs = getImageLightboxElements();
        if (!refs.root || !refs.image || !refs.caption) {
            state.imageLightboxOpen = false;
            return;
        }
        if (!state.imageLightboxOpen || refs.root.dataset.closing === '1') return;
        refs.root.dataset.closing = '1';
        const current = readImageLightboxTransform(refs);
        const imageRect = refs.image.getBoundingClientRect();
        const sourceNode = state.imageLightboxSourceNode;
        const sourceRect = sourceNode && sourceNode.isConnected ? sourceNode.getBoundingClientRect() : null;
        const velocityX = Number(options.velocityX) || 0;
        const velocityY = Number(options.velocityY) || 0;
        const speed = Math.min(1.2, Math.hypot(velocityX, velocityY));
        const duration = Math.round(210 + speed * 120);
        let endTransform = 'translate3d(0, 64px, 0) scale(0.72)';

        if (sourceRect && sourceRect.width > 4 && sourceRect.height > 4 && imageRect.width > 4 && imageRect.height > 4) {
            const dx = sourceRect.left - imageRect.left;
            const dy = sourceRect.top - imageRect.top;
            const sx = clampNumber(sourceRect.width / imageRect.width, 0.08, 1.4);
            const sy = clampNumber(sourceRect.height / imageRect.height, 0.08, 1.4);
            endTransform = `translate3d(${dx}px, ${dy}px, 0) scale(${sx}, ${sy})`;
        } else {
            const glideX = Math.round(velocityX * 180);
            const glideY = Math.round(72 + velocityY * 220);
            endTransform = `translate3d(${glideX}px, ${glideY}px, 0) scale(0.72)`;
        }
        if (typeof refs.image.animate !== 'function' || typeof refs.root.animate !== 'function') {
            resetImageLightboxState(refs);
            return;
        }

        const imageAnimation = refs.image.animate(
            [
                { transform: `translate3d(${current.x}px, ${current.y}px, 0) scale(${current.scale})` },
                { transform: endTransform },
            ],
            { duration, easing: 'cubic-bezier(0.32, 0.02, 0.2, 1)', fill: 'forwards' }
        );
        const backdropAnimation = refs.root.animate(
            [{ opacity: Number(refs.root.style.getPropertyValue('--image-lightbox-backdrop-opacity') || 1) }, { opacity: 0 }],
            { duration: Math.max(170, duration - 30), easing: 'linear', fill: 'forwards' }
        );
        Promise.allSettled([imageAnimation.finished, backdropAnimation.finished]).finally(() => {
            resetImageLightboxState(refs);
        });
    }

    // 统一在容器层做事件委托，避免每次重渲染都重复绑定全局监听。
    // 取舍：图片节点仍按需打标，保证同一节点不会重复绑定点击处理。
    function bindImagePreview(container) {
        if (!container) return;
        container.querySelectorAll('img').forEach((node) => {
            if (node.dataset.previewBound === '1') return;
            node.dataset.previewBound = '1';
            node.addEventListener('click', (event) => {
                const link = node.closest('a[href]');
                if (link) {
                    event.preventDefault();
