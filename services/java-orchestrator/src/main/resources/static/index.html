<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>故事工坊</title>
    <meta name="theme-color" content="#f1f5f9" media="(prefers-color-scheme: light)">
    <meta name="theme-color" content="#030305" media="(prefers-color-scheme: dark)">
    <link rel="manifest" href="/manifest.json">
    <link rel="preload" as="style" href="/lib/katex.min.css">
    <link rel="stylesheet" href="/lib/katex.min.css">
    <link rel="preload" as="style" href="/css/mobile-task-interactions.css">
    <link rel="stylesheet" href="/css/mobile-task-interactions.css">
    <link rel="preload" as="style" href="/css/mobile-task-feedback.css">
    <link rel="stylesheet" href="/css/mobile-task-feedback.css">
    <link rel="stylesheet" href="/css/design-tokens.css">
    <link rel="preload" as="style" href="/css/mobile-markdown-app.css">
    <link rel="stylesheet" href="/css/mobile-markdown-app.css">
    <link rel="preload" as="style" href="/css/mobile-concept-cards.css">
    <link rel="stylesheet" href="/css/mobile-concept-cards.css">
</head>
<body>
<div class="app">
    <main class="app-content">
        <section class="app-view active" id="viewLibrary" data-view="tasks">
            <section class="panel">
                <div class="header">
                    <div class="task-header-title">
                        <h1>我的故事</h1>
                        <span class="task-header-meta" id="taskHeaderMeta" aria-live="polite"></span>
                    </div>
                </div>
                <div class="task-pull-indicator" id="taskPullIndicator" aria-hidden="true">
                    <svg class="task-pull-indicator-arrow" viewBox="0 0 24 24" aria-hidden="true">
                        <path d="M12 5v14"/>
                        <path d="m7 14 5 5 5-5"/>
                    </svg>
                </div>
                <div class="submit-card" id="taskComposerCard">
                    <div class="submit-source-shell" id="mobileSourceSurface" role="group" tabindex="0" aria-label="故事入口，支持粘贴链接与拖拽上传视频">
                        <div class="submit-surface-copy" id="mobileSourceCopy">把一个视频变成故事草稿</div>
                        <input class="submit-input" id="mobileVideoUrl" type="text" placeholder="粘贴链接，回车即开始；也可拖入视频">
                    </div>
                    <input class="submit-file-input" id="mobileVideoFile" type="file" accept="video/*,.mp4,.mov,.mkv,.avi,.webm,.m4v" onchange="return window.mobileUploadInlineOnFileChange && window.mobileUploadInlineOnFileChange(this)">
                    <div class="submit-tip" id="mobileSubmitTip"></div>
                </div>
                <div class="status-tip" id="taskSummary"></div>
                <div class="task-list" id="taskList"></div>
                <button class="btn btn-ghost-icon task-composer-fab" id="taskComposerToggleBtn" type="button" aria-label="开始创作" title="开始创作" aria-expanded="false" hidden>
                    <svg class="icon-glyph" viewBox="0 0 24 24" aria-hidden="true">
                        <path d="M4 20c4-.6 7-2.5 9.2-5.8L20 6.4a2.2 2.2 0 0 0-3.1-3.1l-7.8 6.8C5.8 12.3 3.9 15.6 3.3 20z"></path>
                        <path d="M11 11l2 2"></path>
                    </svg>
                </button>
            </section>
        </section>

        <section class="app-view" id="viewContent" data-view="content">
            <section class="panel">
                <div class="header">
                    <div class="content-header-title">
                        <button class="btn btn-ghost-icon content-back-btn" id="contentBackBtn" type="button" aria-label="返回故事库">
                            <svg class="icon-glyph" viewBox="0 0 24 24" aria-hidden="true">
                                <path d="M15 6 9 12l6 6"/>
                            </svg>
                        </button>
                        <h2>故事</h2>
                    </div>
                    <div class="toolbar content-toolbar">
                        <button class="btn has-icon content-outline-btn" id="contentOutlineBtn" type="button">
                            <svg class="icon-glyph" viewBox="0 0 24 24" aria-hidden="true">
                                <path d="M5 7h14M5 12h10M5 17h12"/>
                                <path d="M4 7h0M4 12h0M4 17h0"/>
                            </svg>
                            <span class="btn-label">大纲</span>
                        </button>
                        <button class="btn btn-ghost-icon" id="contentToolsToggleBtn" type="button" aria-label="更多功能" title="更多功能" aria-expanded="false" aria-controls="contentToolsPanel">
                            <svg class="icon-glyph" viewBox="0 0 24 24" aria-hidden="true">
                                <path d="M12 6h.01M12 12h.01M12 18h.01"/>
                            </svg>
                        </button>
                    </div>
                </div>
                <div class="content-tools-panel" id="contentToolsPanel">
                    <button class="btn has-icon" id="toggleParagraphEditorBtn" type="button" aria-pressed="false">
                            <svg class="icon-glyph" viewBox="0 0 24 24" aria-hidden="true">
                                <path d="M4 20c4-.6 7-2.5 9.2-5.8L20 6.4a2.2 2.2 0 0 0-3.1-3.1l-7.8 6.8C5.8 12.3 3.9 15.6 3.3 20z"></path>
                                <path d="M11 11l2 2"></path>
                            </svg>
                            <span class="btn-label">进入编辑</span>
                    </button>
                    <button class="btn has-icon" id="exportTaskBtn" type="button">
                            <svg class="icon-glyph" viewBox="0 0 24 24" aria-hidden="true">
                                <path d="M12 4v10"/>
                                <path d="M8.5 10.5 12 14l3.5-3.5"/>
                                <path d="M5 17h14"/>
                            </svg>
                            <span class="btn-label">保存文件</span>
                    </button>
                    <button class="btn has-icon" id="renameTaskBtn" type="button">
                            <svg class="icon-glyph" viewBox="0 0 24 24" aria-hidden="true">
                                <path d="M5 6h14M8 6v12M16 6v12M5 18h14"/>
                            </svg>
                            <span class="btn-label">修改标题</span>
                        </button>
                    <button class="btn has-icon" id="deleteSoundToggleBtn" type="button" aria-pressed="true">
                            <svg class="icon-glyph" viewBox="0 0 24 24" aria-hidden="true">
                                <path d="M4 14v-4h3l4-3v10l-4-3z"/>
                                <path d="M15 9.5a4 4 0 0 1 0 5"/>
                                <path d="M17.8 7.2a7 7 0 0 1 0 9.6"/>
                            </svg>
                            <span class="btn-label">撕纸音效：开</span>
                    </button>
                    <button class="btn has-icon" id="reloadCurrentBtn" type="button" hidden>
                            <svg class="icon-glyph" viewBox="0 0 24 24" aria-hidden="true">
                                <path d="M20 12a8 8 0 1 1-2.3-5.7"/>
                                <path d="M20 4v5h-5"/>
                            </svg>
                            <span class="btn-label">重新打开</span>
                    </button>
                </div>
                <div class="viewer-title-row">
                    <div class="viewer-title" id="viewerTitle">开启你的阅读之旅</div>
                    <span class="sync-status" id="syncStatus" aria-hidden="true" hidden></span>
                </div>
                <div class="export-progress" id="exportProgress"><span id="exportProgressBar"></span></div>
                <div class="viewer-layout">
                    <article class="markdown-body" id="markdownBody">
                        <div class="empty empty-invitation" id="contentInvitation">
                            <div class="empty-icon" aria-hidden="true"></div>
                            <div class="empty-text">选择一个故事，开始阅读</div>
                        </div>
                    </article>
                </div>
            </section>
        </section>

        <section class="app-view" id="viewDocOutline" data-view="outline">
            <section class="panel panel-outline">
                <div class="header">
                    <div class="content-header-title">
                        <button class="btn btn-ghost-icon content-back-btn" id="outlineBackBtn" type="button" aria-label="返回内容">
                            <svg class="icon-glyph" viewBox="0 0 24 24" aria-hidden="true">
                                <path d="M15 6 9 12l6 6"/>
                            </svg>
                        </button>
                        <h2>文档大纲</h2>
                    </div>
                </div>
                <div class="outline-list outline-list-page" id="outlineList">
                    <div class="empty-state empty-state-minimal">
                        <div class="empty-state-title">Start Something New.</div>
                        <div class="empty-state-desc">打开一个故事后，这里会出现结构线索。</div>
                        <button class="btn btn-primary empty-state-cta" type="button" data-empty-action="open-task-list">去故事库</button>
                    </div>
                </div>
            </section>
        </section>
    </main>

</div>
<div class="image-lightbox" id="imageLightbox" role="dialog" aria-modal="true" aria-label="图片预览" aria-hidden="true" hidden>
    <img class="image-lightbox-content" id="imageLightboxImg" alt="">
    <div class="image-lightbox-hint" id="imageLightboxHint">双指捏合或上甩关闭</div>
    <div class="image-lightbox-caption" id="imageLightboxCaption" hidden></div>
</div>
<div class="undo-toast" id="undoToast">
    <span id="undoToastText">已删除</span>
    <button id="undoToastBtn" type="button">撤回</button>
</div>

<script src="/lib/mobile-submit-feedback.js"></script>
<script>
    // 提交区文案默认值单一来源：兜底脚本与主脚本共享，避免维护时分叉。
    // 取舍：先定义默认值，再与外部注入文案合并，兼顾稳定兜底与按需覆盖。
    window.__MOBILE_COMPOSER_COPY_DEFAULT = window.__MOBILE_COMPOSER_COPY_DEFAULT || {
        surfacePrompt: '把一个视频变成故事草稿',
        inputPlaceholder: '粘贴链接，回车即开始；也可拖入视频',
        sourceAriaLabel: '故事入口，支持粘贴链接与拖拽上传视频',
        idleTip: '粘贴链接或拖入视频，马上开写',
        inputRequired: '我们还没拿到素材，贴个链接或拖入视频吧',
        checkingTip: '正在识别链接素材...',
        uploadingTip: '正在接收视频素材...',
        queuedTip: '素材已收下，正在生成故事草稿',
        errorTip: '我们没能抓住那个视频，换个素材再试试',
        dropOnlyTip: '请拖入视频文件',
        retryActionLabel: '重试',
        shareDetectedTip: '已读取分享素材，马上开始...',
    };
    window.__MOBILE_COMPOSER_COPY = Object.assign(
        {},
        window.__MOBILE_COMPOSER_COPY_DEFAULT,
        window.__MOBILE_COMPOSER_COPY || {}
    );
</script>

<script>
    // 移动端提交兜底脚本（ES5）：即使主脚本初始化失败，输入入口仍可提交并提示结果。
    (function () {
        var USER_BUSY_MESSAGE = '系统繁忙，请稍后重试';
        var COMPOSER_COPY = window.__MOBILE_COMPOSER_COPY || {};

        function composerCopy(key, fallback) {
            var value = COMPOSER_COPY && COMPOSER_COPY[key];
            if (typeof value === 'string' && value.trim()) {
                return value.trim();
            }
            return fallback;
        }

        // 兜底链路也按同一份文案渲染，避免主脚本异常时出现两套口径。
        function applyComposerCopy() {
            var inputNode = document.getElementById('mobileVideoUrl');
            if (inputNode) {
                inputNode.setAttribute('placeholder', composerCopy('inputPlaceholder', '粘贴链接，回车即开始；也可拖入视频'));
            }
            var shellNode = document.getElementById('mobileSourceSurface');
            if (shellNode) {
                shellNode.setAttribute('aria-label', composerCopy('sourceAriaLabel', '故事入口，支持粘贴链接与拖拽上传视频'));
            }
            var surfaceCopyNode = document.getElementById('mobileSourceCopy');
            if (surfaceCopyNode) {
                surfaceCopyNode.textContent = composerCopy('surfacePrompt', '把一个视频变成故事草稿');
            }
        }

        function isBusyResponseStatus(status) {
            return status === 429 || status === 503 || status >= 500;
        }

        function normalizeInlineErrorMessage(error) {
            if (!error) return USER_BUSY_MESSAGE;
            var raw = '';
            if (typeof error === 'string') {
                raw = error;
            } else if (error && typeof error.message === 'string') {
                raw = error.message;
            } else {
                raw = String(error);
            }
            var message = String(raw || '').trim();
            if (!message) return USER_BUSY_MESSAGE;
            if (/^(HTTP\s*\d+|internal server error|service unavailable|gateway timeout)/i.test(message)) {
                return USER_BUSY_MESSAGE;
            }
            if (/(exception|traceback|stack|nullpointer|typeerror|referenceerror|syntaxerror|grpc|econn|sqlstate|java\.|python\.| at )/i.test(message)) {
                return USER_BUSY_MESSAGE;
            }
            return message;
        }

        function buildFriendlySubmitFeedback(error, options) {
            var opts = options || {};
            if (window.MobileSubmitFeedback && typeof window.MobileSubmitFeedback.classifySubmitError === 'function') {
                return window.MobileSubmitFeedback.classifySubmitError({
                    error: error,
                    hasFile: !!opts.hasFile,
                    httpStatus: opts.httpStatus,
                }, {
                    normalizeErrorMessage: normalizeInlineErrorMessage,
                    busyMessage: USER_BUSY_MESSAGE,
                });
            }
            var text = normalizeInlineErrorMessage(error);
            return {
                message: text || '我们没能抓住那个视频。请再试一次。',
                highlightLink: !opts.hasFile && /url|链接/.test(String(text || '').toLowerCase()),
                allowRetry: true,
            };
        }

        function setTip(message, type, options) {
            var tipOptions = options || {};
            var normalizedType = String(type || '');
            var text = String(message || '').trim();
            var tip = document.getElementById('mobileSubmitTip');
            if (tip) {
                tip.textContent = '';
                tip.classList.remove('success', 'error', 'with-action', 'is-entering');
                if (normalizedType === 'success') {
                    tip.classList.add('success');
                } else if (normalizedType === 'error') {
                    tip.classList.add('error');
                }
                if (text) {
                    var tipContent = document.createElement('span');
                    tipContent.className = 'submit-tip-content';
                    var tipText = document.createElement('span');
                    tipText.className = 'submit-tip-text';
                    tipText.textContent = text;
                    tipContent.appendChild(tipText);
                    if (normalizedType === 'error' && typeof tipOptions.onRetry === 'function') {
                        var retryBtn = document.createElement('button');
                        retryBtn.type = 'button';
                        retryBtn.className = 'submit-tip-action';
                        retryBtn.textContent = composerCopy('retryActionLabel', '重试');
                        retryBtn.addEventListener('click', function () {
                            retryBtn.disabled = true;
                            retryBtn.textContent = '重试中...';
                            Promise.resolve()
                                .then(function () { return tipOptions.onRetry(); })
                                .catch(function () { return null; })
                                .finally(function () {
                                    retryBtn.disabled = false;
                                    retryBtn.textContent = composerCopy('retryActionLabel', '重试');
                                });
                        });
                        tip.classList.add('with-action');
                        tipContent.appendChild(retryBtn);
                    }
                    tip.appendChild(tipContent);
                    if (typeof requestAnimationFrame === 'function') {
                        requestAnimationFrame(function () {
                            tip.classList.add('is-entering');
                        });
                    } else {
                        tip.classList.add('is-entering');
                    }
                }
            }
            var surfaceNode = document.getElementById('mobileSourceSurface');
            if (surfaceNode && surfaceNode.classList) {
                surfaceNode.classList.remove('is-link-suspect');
                if (normalizedType === 'error') {
                    surfaceNode.classList.remove('is-rejecting');
                    surfaceNode.offsetWidth;
                    surfaceNode.classList.add('is-rejecting');
                    if (tipOptions.highlightLink) {
                        surfaceNode.classList.add('is-link-suspect');
                    }
                }
            }
            var inputNode = document.getElementById('mobileVideoUrl');
            if (inputNode && inputNode.classList) {
                inputNode.classList.toggle('is-link-suspect', !!tipOptions.highlightLink && normalizedType === 'error');
            }
            if (inputNode) {
                var fallback = composerCopy('inputPlaceholder', '粘贴链接，回车即开始；也可拖入视频');
                var nextHint = text;
                if (!nextHint) {
                    nextHint = fallback;
                } else if (normalizedType === 'error') {
                    nextHint = composerCopy('errorTip', '我们没能抓住那个视频，换个素材再试试');
                }
                inputNode.setAttribute('placeholder', nextHint);
                if (tipOptions.highlightLink && inputNode.value && typeof inputNode.setSelectionRange === 'function') {
                    try {
                        inputNode.setSelectionRange(0, inputNode.value.length);
                    } catch (_error) {
                        // ignore selection errors
                    }
                }
            }
        }

        function parseJson(text) {
            if (!text) return {};
            try {
                return JSON.parse(text);
            } catch (_error) {
                return {};
            }
        }

        function submitRequest(url, payload, isJson, onDone) {
            var xhr = new XMLHttpRequest();
            xhr.open('POST', url, true);
            if (isJson) {
                xhr.setRequestHeader('Content-Type', 'application/json');
            }
            xhr.onreadystatechange = function () {
                if (xhr.readyState !== 4) return;
                var bodyText = xhr.responseText || '';
                var bodyJson = parseJson(bodyText);
                var ok = xhr.status >= 200 && xhr.status < 300 && bodyJson && bodyJson.success;
                if (ok) {
                    onDone(null, bodyJson);
                    return;
                }
                var isBusyStatus = isBusyResponseStatus(xhr.status);
                var message = isBusyStatus
                    ? USER_BUSY_MESSAGE
                    : ((bodyJson && bodyJson.message) ? bodyJson.message : ('HTTP ' + xhr.status));
                var requestError = new Error(message);
                requestError.httpStatus = xhr.status;
                requestError.serverMessage = bodyJson && bodyJson.message ? bodyJson.message : '';
                onDone(requestError, null);
            };
            xhr.onerror = function () {
                onDone(new Error(USER_BUSY_MESSAGE), null);
            };
            xhr.send(payload);
        }

        window.mobileUploadInlineOnFileChange = function (inputEl) {
            var selected = inputEl && inputEl.files && inputEl.files.length > 0 ? inputEl.files[0] : null;
            if (!selected) {
                setTip(composerCopy('idleTip', '粘贴链接或拖入视频，马上开写'));
                return true;
            }
            setTip(composerCopy('uploadingTip', '正在接收视频素材...'));
            return true;
        };
        window.mobileUploadInlineOpenPicker = function (event) {
            if (event) {
                if (event.preventDefault) event.preventDefault();
                if (event.stopPropagation) event.stopPropagation();
            }
            var fileInput = document.getElementById('mobileVideoFile');
            if (!fileInput || typeof fileInput.click !== 'function') return false;
            fileInput.click();
            return false;
        };

        // 统一输入表面绑定：将拖拽、点击、键盘触发收敛到一处，降低后续维护分叉风险。
        function bindUnifiedSourceSurface(options) {
            var surfaceId = options && options.surfaceId ? String(options.surfaceId) : 'mobileSourceSurface';
            var fileInputId = options && options.fileInputId ? String(options.fileInputId) : 'mobileVideoFile';
            var submitBtnId = options && options.submitBtnId ? String(options.submitBtnId) : '';
            var onError = options && typeof options.onError === 'function' ? options.onError : function () {};
            var onFileBound = options && typeof options.onFileBound === 'function' ? options.onFileBound : function () {};

            var dropZone = document.getElementById(surfaceId);
            var fileInput = document.getElementById(fileInputId);
            if (!dropZone || !fileInput) return false;
            // 允许主脚本二次注入回调：首次绑定事件，后续仅热更新回调函数，避免“兜底脚本抢先绑定”导致功能分叉。
            if (dropZone.__sourceSurfaceHooks) {
                dropZone.__sourceSurfaceHooks.onError = onError;
                dropZone.__sourceSurfaceHooks.onFileBound = onFileBound;
                return true;
            }
            dropZone.__sourceSurfaceHooks = {
                onError: onError,
                onFileBound: onFileBound,
            };
            if (dropZone.dataset) {
                dropZone.dataset.uploadBound = '1';
            }

            function toggleDragActive(active) {
                if (!dropZone.classList) return;
                dropZone.classList.toggle('drag-active', !!active);
                dropZone.classList.toggle('drag-welcome', !!active);
            }

            function triggerDropRipple(clientX, clientY) {
                if (!dropZone.appendChild) return;
                var rect = dropZone.getBoundingClientRect();
                var size = Math.max(rect.width, rect.height) * 1.36;
                var centerX = (typeof clientX === 'number' && clientX > 0) ? clientX : (rect.left + rect.width / 2);
                var centerY = (typeof clientY === 'number' && clientY > 0) ? clientY : (rect.top + rect.height / 2);
                var ripple = document.createElement('span');
                ripple.className = 'submit-drop-ripple';
                ripple.style.width = size + 'px';
                ripple.style.height = size + 'px';
                ripple.style.left = (centerX - rect.left - (size / 2)) + 'px';
                ripple.style.top = (centerY - rect.top - (size / 2)) + 'px';
                dropZone.appendChild(ripple);
                if (typeof ripple.addEventListener === 'function') {
                    ripple.addEventListener('animationend', function () {
                        if (ripple && ripple.parentNode) {
                            ripple.parentNode.removeChild(ripple);
                        }
                    });
                }
                setTimeout(function () {
                    if (ripple && ripple.parentNode) {
                        ripple.parentNode.removeChild(ripple);
                    }
                }, 900);
            }

            function pulseDropAccepted() {
                if (!dropZone.classList) return;
                dropZone.classList.remove('drop-accepted');
                if (typeof dropZone.offsetWidth === 'number') {
                    dropZone.offsetWidth;
                }
                dropZone.classList.add('drop-accepted');
            }

            function findFirstVideoFile(fileList) {
                if (!fileList || fileList.length <= 0) return null;
                for (var i = 0; i < fileList.length; i += 1) {
                    var file = fileList[i];
                    if (file && file.type && /^video\//i.test(file.type)) {
                        return file;
                    }
                }
                return fileList[0];
            }

            function assignFileToInput(file) {
                if (!file) return false;
                if (typeof DataTransfer === 'undefined') return false;
                try {
                    var dt = new DataTransfer();
                    dt.items.add(file);
                    fileInput.files = dt.files;
                    return true;
                } catch (_error) {
                    return false;
                }
            }

            function isSurfaceInteractiveTarget(target) {
                if (!target || !target.closest) return false;
                if (submitBtnId && target.closest('#' + submitBtnId)) return true;
                return !!target.closest('input, textarea, button, a, select, label');
            }

            dropZone.addEventListener('click', function (event) {
                if (isSurfaceInteractiveTarget(event && event.target)) return;
                if (event && event.preventDefault) event.preventDefault();
                fileInput.click();
            });

            dropZone.addEventListener('keydown', function (event) {
                if (!event) return;
                var key = event.key;
                if (key !== 'Enter' && key !== ' ' && key !== 'Spacebar') return;
                if (isSurfaceInteractiveTarget(event.target)) return;
                if (event.preventDefault) event.preventDefault();
                fileInput.click();
            });

            dropZone.addEventListener('dragenter', function (event) {
                if (event && event.preventDefault) event.preventDefault();
                toggleDragActive(true);
            });

            dropZone.addEventListener('dragover', function (event) {
                if (event && event.preventDefault) event.preventDefault();
                toggleDragActive(true);
            });

            dropZone.addEventListener('dragleave', function (event) {
                if (!event || !event.relatedTarget || !dropZone.contains(event.relatedTarget)) {
                    toggleDragActive(false);
                }
            });

            dropZone.addEventListener('drop', function (event) {
                if (event && event.preventDefault) event.preventDefault();
                toggleDragActive(false);
                triggerDropRipple(event && event.clientX, event && event.clientY);
                pulseDropAccepted();
                var dropped = event && event.dataTransfer ? findFirstVideoFile(event.dataTransfer.files) : null;
                if (!dropped) {
                    if (dropZone.__sourceSurfaceHooks && dropZone.__sourceSurfaceHooks.onError) {
                        dropZone.__sourceSurfaceHooks.onError('没有检测到可用视频文件。');
                    }
                    return;
                }
                if (!assignFileToInput(dropped)) {
                    if (dropZone.__sourceSurfaceHooks && dropZone.__sourceSurfaceHooks.onError) {
                        dropZone.__sourceSurfaceHooks.onError(composerCopy('dropOnlyTip', '请拖入视频文件'));
                    }
                    return;
                }
                if (dropZone.__sourceSurfaceHooks && dropZone.__sourceSurfaceHooks.onFileBound) {
                    dropZone.__sourceSurfaceHooks.onFileBound(fileInput);
                }
            });

            return true;
        }

        window.mobileBindUnifiedSourceSurface = bindUnifiedSourceSurface;
        bindUnifiedSourceSurface({
            surfaceId: 'mobileSourceSurface',
            fileInputId: 'mobileVideoFile',
            onError: function (message) {
                setTip(message, 'error');
            },
            onFileBound: function (inputEl) {
                if (window.mobileUploadInlineOnFileChange) {
                    window.mobileUploadInlineOnFileChange(inputEl);
                }
            },
        });
        applyComposerCopy();

        window.mobileUploadInlineSubmit = function (event) {
            if (event) {
                if (event.preventDefault) event.preventDefault();
                if (event.stopPropagation) event.stopPropagation();
            }

            var urlInput = document.getElementById('mobileVideoUrl');
            var fileInput = document.getElementById('mobileVideoFile');

            var rawUrl = urlInput && urlInput.value ? String(urlInput.value).trim() : '';
            var hasFile = !!(fileInput && fileInput.files && fileInput.files.length > 0);

            if (!hasFile && !rawUrl) {
                var requiredMessage = composerCopy('inputRequired', '我们还没拿到素材，贴个链接或拖入视频吧');
                setTip(requiredMessage, 'error', { highlightLink: false });
                return false;
            }

            setTip(hasFile ? composerCopy('uploadingTip', '正在接收视频素材...') : composerCopy('checkingTip', '正在识别链接素材...'));

            if (hasFile) {
                var fd = new FormData();
                fd.append('videoFile', fileInput.files[0]);
                fd.append('outputDir', './output');
                submitRequest(window.location.origin + '/api/mobile/tasks/upload', fd, false, function (error, result) {
                    if (error) {
                        var feedback = buildFriendlySubmitFeedback(error, {
                            httpStatus: error && error.httpStatus,
                            hasFile: true,
                        });
                        setTip(feedback.message, 'error', {
                            highlightLink: feedback.highlightLink,
                            onRetry: feedback.allowRetry ? function () {
                                return window.mobileUploadInlineSubmit();
                            } : null,
                        });
                        return;
                    }
                    if (urlInput) urlInput.value = '';
                    if (fileInput) fileInput.value = '';
                    setTip(composerCopy('queuedTip', '素材已收下，正在生成故事草稿'), 'success');
                });
                return false;
            }

            var payload = JSON.stringify({
                videoUrl: rawUrl,
                outputDir: './output'
            });
            submitRequest(window.location.origin + '/api/mobile/tasks/submit', payload, true, function (error, result) {
                if (error) {
                    var feedback = buildFriendlySubmitFeedback(error, {
                        httpStatus: error && error.httpStatus,
                        hasFile: false,
                    });
                    setTip(feedback.message, 'error', {
                        highlightLink: feedback.highlightLink,
                        onRetry: feedback.allowRetry ? function () {
                            return window.mobileUploadInlineSubmit();
                        } : null,
                    });
                    return;
                }
                if (urlInput) urlInput.value = '';
                setTip(composerCopy('queuedTip', '素材已收下，正在生成故事草稿'), 'success');
            });
            return false;
        };
    })();
</script>

    // 2) 允许老状态在运行期被兜底修复，减少结构演进时的兼容风险。
    function getTaskMotionState() {
        if (!state.taskMotion || typeof state.taskMotion !== 'object') {
            state.taskMotion = createTaskMotionState();
            return state.taskMotion;
        }
        const motion = state.taskMotion;
        if (!motion.entryFxUntil || typeof motion.entryFxUntil !== 'object') {
            motion.entryFxUntil = {};
        }
        if (!motion.completionFxUntil || typeof motion.completionFxUntil !== 'object') {
            motion.completionFxUntil = {};

        if (!motion.processingFxUntil || typeof motion.processingFxUntil !== 'object') {
            motion.processingFxUntil = {};
        }
        if (!motion.titleFxUntil || typeof motion.titleFxUntil !== 'object') {
            motion.titleFxUntil = {};
        }
        if (!Number.isFinite(Number(motion.fxTimerId))) {
            motion.fxTimerId = 0;
        }
        return motion;

    function resolveTaskMotionBucket(motion, kind) {
        if (kind === 'processing') return motion.processingFxUntil;
        if (kind === 'entry') return motion.entryFxUntil;
        if (kind === 'title') return motion.titleFxUntil;
        return motion.completionFxUntil;

        if (!taskId) return 0;
        const motion = getTaskMotionState();
        const bucket = resolveTaskMotionBucket(motion, kind);
        return Number(bucket[String(taskId)]) || 0;
    }

        if (!taskId) return;
        const motion = getTaskMotionState();
        const key = String(taskId);
        const bucket = resolveTaskMotionBucket(motion, kind);
        const next = Number(expiresAt) || 0;
        if (options.maxOnly) {
            bucket[key] = Math.max(Number(bucket[key]) || 0, next);
        } else {
            bucket[key] = next;

    function isAbsoluteUrl(url) {
        if (!url) return false;

    function getExt(path) {
        if (!path) return '';
        const clean = String(path).split('?')[0].split('#')[0];
        const idx = clean.lastIndexOf('.');
        return idx >= 0 ? clean.slice(idx + 1).toLowerCase() : '';
    }

    function isImagePath(path) {
        return ['png', 'jpg', 'jpeg', 'gif', 'webp', 'bmp', 'svg'].includes(getExt(path));
    }

    function isVideoPath(path) {
        return ['mp4', 'webm', 'mov', 'm4v'].includes(getExt(path));
    }

    function isMarkdownPath(path) {
        const ext = getExt(path);
        return ext === 'md' || ext === 'markdown';

        if (lower === 'processing') return 'badge-processing';
        if (lower === 'completed') return 'badge-completed';
        if (lower === 'failed') return 'badge-failed';
        if (lower === 'cancelled') return 'badge-cancelled';
        return 'badge-queued';
    }

    function formatTime(isoText) {
        if (!isoText) return '';
        const date = new Date(isoText);
        if (Number.isNaN(date.getTime())) return isoText;
        return date.toLocaleString();
    }

    function extractBvId(input) {
        if (!input) return null;
        const match = String(input).match(BV_PATTERN);
        // 保留用户原始 BV 大小写，避免把混合大小写 ID 改写后导致解析失败。
        return match ? match[0] : null;
    }

    function looksLikeLocalPath(input) {
        if (!input) return false;
        const value = String(input).trim();
        if (value.startsWith('file://')) return true;
        if (value.startsWith('./') || value.startsWith('../')) return true;
        if (value.startsWith('/') || value.startsWith('\\')) return true;
        return WINDOWS_PATH_PATTERN.test(value);
    }

    function normalizeTaskVideoInput(rawInput) {
        const trimmed = String(rawInput || '').trim();
        if (!trimmed) return '';
        if (looksLikeLocalPath(trimmed)) return trimmed;
        const bv = extractBvId(trimmed);
        if (!bv) return trimmed;
        if (/^https?:\/\//i.test(trimmed) && !/bilibili\.com/i.test(trimmed)) {
            return trimmed;
        }
        return `https://www.bilibili.com/video/${bv}`;

    // 加载占位切换到真实内容时做交叉淡入，避免出现“硬切闪烁”。
    function crossFadeTaskListFromLoading(taskList, nextHtml, options = {}) {
        const loadingLayer = taskList.querySelector(':scope > .task-list-loading');
        const prefersReducedMotion = !!(
            window.matchMedia
            && window.matchMedia('(prefers-reduced-motion: reduce)').matches
        );
        if (!loadingLayer || prefersReducedMotion) {
            return false;
        }
        const nextLayer = document.createElement('div');
        nextLayer.className = 'task-list-crossfade-next';
        nextLayer.innerHTML = nextHtml;
        taskList.appendChild(nextLayer);
        taskList.classList.add('task-list-crossfading');

        let done = false;
        const finalize = () => {
            if (done) return;
            done = true;
            taskList.classList.remove('task-list-crossfading');
            commitTaskListHtml(taskList, nextHtml, options);
        };

        requestAnimationFrame(() => {
            loadingLayer.classList.add('is-fade-out');
            nextLayer.classList.add('is-fade-in');
        });

        nextLayer.addEventListener('transitionend', (event) => {
            if (event.target === nextLayer && event.propertyName === 'opacity') {
                finalize();
            }
        });
        setTimeout(finalize, 320);
        return true;
    }

    function renderTaskListLoading(message) {
        const taskList = document.getElementById('taskList');
        if (!taskList) return;
        const safeMessage = escapeHtml(String(message || '故事加载中...'));
        const html = `
            <div class="task-list-loading-text">${safeMessage}</div>
        `;
        commitTaskListHtml(taskList, `<div class="task-list-loading">${html}</div>`, {
            role: 'status',
            ariaLabel: String(message || '故事加载中'),
        });

    // 仅在请求“明显变慢”时才显示加载提示，优先把快路径还给真实内容，避免加载动画造成噪音。
    // 取舍：慢请求的反馈会延迟一小段时间（默认1秒），但可显著减少快请求的闪烁与误导感。
    function createDelayedTaskListLoadingHint(message, options = {}) {
        const delayMsRaw = Number(options.delayMs);
        const delayMs = Number.isFinite(delayMsRaw) && delayMsRaw >= 0
            ? Math.round(delayMsRaw)
            : TASK_LIST_LOADING_HINT_DELAY_MS;
        const showLoadingPanelWhenEmpty = !options || options.showLoadingPanelWhenEmpty !== false;
        let active = true;
        let timerId = setTimeout(() => {
            if (!active) return;
            setTaskSummary(message, 'loading');
            const hasTasks = Array.isArray(state.tasks) && state.tasks.length > 0;
            if (showLoadingPanelWhenEmpty && !hasTasks) {
                renderTaskListLoading(message);
            }
        }, delayMs);

        return () => {
            active = false;
            if (timerId) {
                clearTimeout(timerId);
                timerId = 0;
            }
        };
    }

    function renderTaskListError(message, options = {}) {
        const taskList = document.getElementById('taskList');
        if (!taskList) return;
        const withRetry = !options || options.withRetry !== false;
        const safeMessage = escapeHtml(String(message || '故事加载失败'));
        const html = `
            <div class="task-list-error">
                <div class="message">${safeMessage}</div>
                ${withRetry ? '<button class="btn btn-primary" type="button" data-task-action="retry-load">重试加载故事库</button>' : ''}
            </div>
        `;
        if (!crossFadeTaskListFromLoading(taskList, html)) {
            commitTaskListHtml(taskList, html);

    function isBusyLikeMessage(message) {
        const text = String(message || '').toLowerCase();
        if (!text) return false;
        return (
            text.includes('429') ||
            text.includes('503') ||
            text.includes('too many requests') ||
            text.includes('service unavailable') ||
            text.includes('rate limit') ||
            text.includes('busy') ||
            text.includes('overload') ||
            text.includes('timeout') ||
            text.includes('繁忙') ||
            text.includes('过载') ||
            text.includes('限流') ||
            text.includes('超时') ||
            text.includes('暂时不可用')
        );
    }

    function looksTechnicalLeakMessage(message) {
        const text = String(message || '');
        if (!text.trim()) return false;
        return (
            /(^HTTP\s*\d+|internal server error|gateway timeout|bad gateway|upstream)/i.test(text) ||
            /(exception|traceback|stack|nullpointer|typeerror|referenceerror|syntaxerror|grpc|econn|sqlstate|ora-|java\.|python\.| at )/i.test(text)
        );
    }

    function normalizeErrorMessage(error, options = {}) {
        const fallback = String(options.fallback || '操作失败，请稍后重试');
        if (!error) return fallback;
        let raw = '';
        if (typeof error === 'string') {
            raw = error;
        } else if (error && typeof error.message === 'string' && error.message.trim()) {
            raw = error.message;
        } else {
            raw = String(error);
        }
        const message = String(raw || '').trim();
        if (!message) return fallback;
        if (isBusyLikeMessage(message)) {
            return USER_BUSY_MESSAGE;
        }
        if (looksTechnicalLeakMessage(message)) {
            return fallback;
        }
        return message;
    }

    function buildTaskSubmitFriendlyError(error, options = {}) {
        if (window.MobileSubmitFeedback && typeof window.MobileSubmitFeedback.classifySubmitError === 'function') {
            return window.MobileSubmitFeedback.classifySubmitError({
                error,
                hasFile: !!options.hasFile,
            }, {
                normalizeErrorMessage,
                busyMessage: USER_BUSY_MESSAGE,
            });
        }
        const normalizedMessage = normalizeErrorMessage(error, { fallback: USER_BUSY_MESSAGE });
        return {
            message: normalizedMessage || '我们没能抓住那个视频。请再试一次。',
            highlightLink: !options.hasFile && /url|链接/.test(String(normalizedMessage || '').toLowerCase()),
            allowRetry: true,
        };
    }

    function loadScriptWithTimeout(src, timeoutMs = 6500) {
        return new Promise((resolve, reject) => {
            const script = document.createElement('script');
            const cleanup = () => {
                script.onerror = null;
                script.onload = null;
                if (timerId) {
                    clearTimeout(timerId);
                }
            };
            let timerId = setTimeout(() => {
                cleanup();
                script.remove();
                reject(new Error(`脚本加载超时: ${src}`));
            }, timeoutMs);

            script.src = src;
            script.async = true;
            script.onload = () => {
                cleanup();
                resolve(src);
            };
            script.onerror = () => {
                cleanup();
                script.remove();
                reject(new Error(`脚本加载失败: ${src}`));
            };
            document.head.appendChild(script);
        });
    }

    async function loadLibraryWithFallback(libDef) {
        if (libDef.check()) {
            return true;
        }
        for (const source of libDef.urls || []) {
            try {
                await loadScriptWithTimeout(source);
                if (libDef.check()) {
                    return true;
                }
            } catch (error) {
                console.warn(`[mobile-markdown] 资源加载失败(${libDef.key}): ${source}`, error);
            }
        }
        return libDef.check();
    }

    async function ensureRuntimeLibraries() {
        if (runtimeLibraryLoadPromise) {
            return runtimeLibraryLoadPromise;
        }
        runtimeLibraryLoadPromise = (async () => {
            const missing = [];
            for (const libDef of RUNTIME_LIBRARY_DEFS) {
                const loaded = await loadLibraryWithFallback(libDef);
                if (!loaded) {
                    missing.push(libDef.label);
                }
            }
            state.runtimeLibLoadErrors = missing;
            return { missing };
        })();
        return runtimeLibraryLoadPromise;
    }

    function formatBytes(bytes) {
        const value = Number(bytes);
        if (!Number.isFinite(value) || value <= 0) {
            return '0 B';
        }
        const units = ['B', 'KB', 'MB', 'GB', 'TB'];
        let idx = 0;
        let size = value;
        while (size >= 1024 && idx < units.length - 1) {
            size /= 1024;
            idx += 1;
        }
        const digits = size >= 100 ? 0 : size >= 10 ? 1 : 2;
        return `${size.toFixed(digits)} ${units[idx]}`;
    }

    async function retryAsync(fn, maxRetries) {
        let lastError = null;
        const retries = Number.isFinite(maxRetries) ? Math.max(0, maxRetries) : 0;
        for (let attempt = 0; attempt <= retries; attempt += 1) {
            try {
                return await fn();
            } catch (error) {
                lastError = error;
                if (attempt >= retries) {
                    break;
                }
                await new Promise((resolve) => setTimeout(resolve, 250 * (attempt + 1)));
            }
        }
        throw lastError || new Error('重试失败');
    }

    function escapeHtml(raw) {
        return String(raw || '')
            .replace(/&/g, '&amp;')
            .replace(/</g, '&lt;')
            .replace(/>/g, '&gt;')
            .replace(/"/g, '&quot;')
            .replace(/'/g, '&#39;');
    }

    function splitMarkdownIntoParagraphBlocks(markdown) {
        const text = String(markdown || '');
        if (text.length === 0) return [];
        return text.split(/\r?\n/).map((line, idx) => ({ id: `l-${idx + 1}`, text: line }));
    }

    function joinParagraphBlocks(blocks) {
        return (blocks || []).map((block) => String(block.text || '')).join('\n');
    }

    async function saveMarkdownToServer(markdownText) {
        const relativePath = buildSavePathHint();
        const payload = {

        const resp = await fetch(`${API_BASE}/tasks/${encodeURIComponent(state.currentTaskId)}/markdown`, {
            method: 'PUT',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify(payload),
        });
        if (!resp.ok) {
            const text = await resp.text();
            throw new Error(text || `HTTP ${resp.status}`);
        }
        return resp.json();
    }

    function buildSavePathHint() {
        const fullPath = state.currentMarkdownPath || '';
        const baseDir = state.currentMarkdownBaseDir || '';
        if (!fullPath || !baseDir) {
            return '';
        }
        const normFull = String(fullPath).replace(/\\/g, '/');
        const normBase = String(baseDir).replace(/\\/g, '/').replace(/\/+$/, '');
        const lowerFull = normFull.toLowerCase();
        const lowerBase = normBase.toLowerCase();
        if (!lowerFull.startsWith(lowerBase)) {
            return '';
        }
        let relative = normFull.slice(normBase.length);
        while (relative.startsWith('/')) {
            relative = relative.slice(1);
        }
        return relative;
    }

    function syncCurrentMarkdownFromBlocks() {
        state.currentMarkdownRaw = joinParagraphBlocks(state.paragraphBlocks || []);
    }

            body: JSON.stringify(payload),
        });
        if (!resp.ok) {
            const text = await resp.text();
            throw new Error(text || `HTTP ${resp.status}`);
        }
        return resp.json();
    }

    function enqueueParagraphBackgroundSync(snapshot) {
        paragraphBackgroundSyncQueue = paragraphBackgroundSyncQueue
            .catch(() => null)
            .then(async () => {
                if (!snapshot || !snapshot.taskId) {
                    return;
                }
                const shouldSaveMarkdown = snapshot.markdownChanged === true;
                const shouldSaveMeta = snapshot.metaChanged === true;
                if (!shouldSaveMarkdown && !shouldSaveMeta) {
                    return;
                }
                if (state.currentTaskId === snapshot.taskId) {
                    setSyncStatus('syncing');
                }
                try {
                    if (shouldSaveMarkdown) {
                        const savedMarkdown = await retryAsync(
                            () => saveMarkdownSnapshot(snapshot.taskId, snapshot.markdown, snapshot.pathHint),
                            2
                        );
                        if (state.currentTaskId === snapshot.taskId && savedMarkdown) {
                            if (savedMarkdown.markdownPath) {
                                state.currentMarkdownPath = savedMarkdown.markdownPath;
                            }
                            if (savedMarkdown.baseDir) {
                                state.currentMarkdownBaseDir = savedMarkdown.baseDir;
                            }
                            refreshViewerTitle();
                        }
                    }
                    if (shouldSaveMeta) {
                        await retryAsync(
                            () => saveMetaSnapshot(snapshot.taskId, snapshot.pathHint, snapshot.meta),
                            2
                        );
                    }
                    if (state.currentTaskId === snapshot.taskId) {
                        setSyncStatus('synced');
                    }
                } catch (error) {
                    console.warn('后台保存失败', error);
                    if (state.currentTaskId === snapshot.taskId) {
                        setSyncStatus('error');
                    }
                }
            });
        return paragraphBackgroundSyncQueue;
    }

    function scheduleParagraphBackgroundSync(options = {}) {
        if (!state.currentTaskId) {
            return;
        }
        const markdownChanged = options.markdownChanged === true;
        const metaChanged = options.metaChanged === true;
        if (!markdownChanged && !metaChanged) {
            return;
        }
        const taskId = state.currentTaskId;
        if (!paragraphBackgroundSyncPending || paragraphBackgroundSyncPending.taskId !== taskId) {
            paragraphBackgroundSyncPending = {
                taskId,
                pathHint: buildSavePathHint(),
                markdownChanged: false,
                metaChanged: false,
                markdown: '',
                meta: null,
            };
        }
        paragraphBackgroundSyncPending.pathHint = buildSavePathHint();
        if (markdownChanged) {
            paragraphBackgroundSyncPending.markdownChanged = true;
            paragraphBackgroundSyncPending.markdown = joinParagraphBlocks(state.paragraphBlocks || []);
        }
        if (metaChanged) {
            paragraphBackgroundSyncPending.metaChanged = true;
            paragraphBackgroundSyncPending.meta = cloneParagraphMeta();
        }
        setSyncStatus('pending');
        if (paragraphBackgroundSyncTimer) {
            clearTimeout(paragraphBackgroundSyncTimer);
        }
        paragraphBackgroundSyncTimer = setTimeout(() => {
            paragraphBackgroundSyncTimer = null;
            const snapshot = paragraphBackgroundSyncPending;
            paragraphBackgroundSyncPending = null;
            enqueueParagraphBackgroundSync(snapshot);
        }, 140);
    }

    function applyObsidianHighlightSyntax(markdown) {
        const lines = String(markdown || '').split(/\r?\n/);
        let inFence = false;
        let fenceChar = '';
        let fenceLen = 0;

        const transformed = lines.map((line) => {
            const fenceMatch = line.match(/^\s*(`{3,}|~{3,})/);
            if (fenceMatch) {
                const marker = fenceMatch[1];
                const markerChar = marker.charAt(0);
                const markerLen = marker.length;
                if (!inFence) {
                    inFence = true;
                    fenceChar = markerChar;
                    fenceLen = markerLen;
                } else if (markerChar === fenceChar && markerLen >= fenceLen) {
                    inFence = false;
                }
                return line;
            }
            if (inFence) {
                return line;
            }
            return line.replace(/==([^=\n][^=\n]*?)==/g, '<mark>$1</mark>');
        });
        return transformed.join('\n');
    }

    function transformObsidianSyntax(markdown, taskId) {
        let out = String(markdown || '');

        // Obsidian Callout 语法降级为可读 blockquote 标签，保证移动端可识别上下文。
        out = out.replace(/^>\s*\[!([A-Za-z]+)\][+-]?\s*(.*)$/gm, (_m, type, title) => {
            const t = String(type || 'NOTE').toUpperCase();
            const text = (title || '').trim();
            return `> **${t}** ${text}`;
        });

        // 处理 ![[...]] embed：图片/视频直接内嵌，其他资源转为可点击链接。
        out = out.replace(/!\[\[([^\]]+)\]\]/g, (_m, inner) => {
            const raw = String(inner || '').trim();
            const parts = raw.split('|');
            const path = (parts[0] || '').trim();
            const alias = (parts[1] || '').trim();
            if (!path) return _m;
            if (isImagePath(path)) {
                return `![](${buildAssetUrl(taskId, path)})`;
            }
            if (isVideoPath(path)) {
                return `<video playsinline preload="metadata" data-immersive="1" src="${buildAssetUrl(taskId, path)}"></video>`;
            }
            if (isMarkdownPath(path)) {
                const label = alias || path;
                return `[${label}](obsidian-note:${encodeURIComponent(path)})`;
            }
            const label = alias || path;
            return `[${label}](${buildAssetUrl(taskId, path)})`;
        });

        // 处理 [[...]] wikilink：优先视作同任务内笔记链接，否则当作资源链接。
        out = out.replace(/(^|[^!])\[\[([^\]]+)\]\]/g, (_m, prefix, inner) => {
            const raw = String(inner || '').trim();
            const parts = raw.split('|');
            let path = (parts[0] || '').trim();
            const alias = (parts[1] || '').trim();
            if (!path) return _m;
            const label = alias || path;
            if (!getExt(path)) {
                path = `${path}.md`;
            }
            if (isMarkdownPath(path)) {
                return `${prefix}[${label}](obsidian-note:${encodeURIComponent(path)})`;
            }
            return `${prefix}[${label}](${buildAssetUrl(taskId, path)})`;
        });

        out = applyObsidianHighlightSyntax(out);
        return out;
    }

    // 给宽内容（例如表格）添加局部横向滚动容器，避免撑破页面。
    function wrapWideContentBlocks(container) {
        if (!container) {
            return;
        }
        const tables = container.querySelectorAll('table');
        tables.forEach((table) => {
            const parent = table.parentElement;
            if (!parent || parent.classList.contains('md-table-scroll')) {
                return;
            }
            const wrapper = document.createElement('div');
            wrapper.className = 'md-table-scroll';
            parent.insertBefore(wrapper, table);
            wrapper.appendChild(table);
        });
    }

    // 解析 fenced code 语言标记（仅取首个语言 token），用于高亮与 UI 标签。
    function normalizeCodeLanguage(rawInfo) {
        const info = String(rawInfo || '').trim().toLowerCase();
        if (!info) return '';
        return info.split(/\s+/)[0];
    }

    // 基于 highlight.js 渲染代码块；若不可用则安全降级为纯文本。
    function renderHighlightedFence(token) {
        const language = normalizeCodeLanguage(token && token.info);
        const source = token && typeof token.content === 'string' ? token.content : '';
        const lineAttr = token && typeof token.attrGet === 'function' ? token.attrGet('data-line') : '';
        const lineEndAttr = token && typeof token.attrGet === 'function' ? token.attrGet('data-line-end') : '';
        const lineFragment = lineAttr ? ` data-line="${escapeHtml(lineAttr)}"` : '';
        const lineEndFragment = lineEndAttr ? ` data-line-end="${escapeHtml(lineEndAttr)}"` : '';
        const languageClass = language ? ` language-${escapeHtml(language)}` : '';
        const languageTag = language ? ` data-lang="${escapeHtml(language)}"` : '';
        const hljs = window.hljs;

        let highlighted = '';
        if (hljs && typeof hljs.highlight === 'function') {
            try {
                if (language && (!hljs.getLanguage || hljs.getLanguage(language))) {
                    highlighted = hljs.highlight(source, { language, ignoreIllegals: true }).value;
                } else if (typeof hljs.highlightAuto === 'function' && source.length <= 3200) {
                    // 无语言提示且代码块很大时，自动探测成本高；这里优先保证主线程响应。
                    highlighted = hljs.highlightAuto(source).value;
                }
            } catch (error) {
                console.warn('[mobile-markdown] 代码高亮失败，降级为纯文本渲染', error);
                highlighted = '';
            }
        }

        if (!highlighted) {
            highlighted = escapeHtml(source);
        }
        return `<pre${lineFragment}${lineEndFragment}${languageTag}><code class="hljs${languageClass}">${highlighted}</code></pre>`;
    }

    function setTokenLineAttrs(token) {
        if (!token || !Array.isArray(token.map) || token.map.length < 1) {
            return;
        }
        const startLineZeroBased = Number(token.map[0]);
        if (!Number.isFinite(startLineZeroBased) || startLineZeroBased < 0) {
            return;
        }
        if (!token.attrGet('data-line')) {
            token.attrSet('data-line', String(startLineZeroBased + 1));
        }
        const endExclusive = Number(token.map[1]);
        const endInclusiveOneBased = Number.isFinite(endExclusive) && endExclusive > startLineZeroBased
            ? endExclusive
            : (startLineZeroBased + 1);
        if (!token.attrGet('data-line-end')) {
            token.attrSet('data-line-end', String(endInclusiveOneBased));
        }
    }

    function getMarkdownEngine(taskId) {
        if (!window.markdownit) {
            return null;
        }
        const cacheKey = String(taskId || '__global__');
        if (!state.mdEngineCache || typeof state.mdEngineCache !== 'object') {
            state.mdEngineCache = {};
        }
        const cachedEngine = state.mdEngineCache[cacheKey];
        if (cachedEngine) {
            return cachedEngine;
        }
        const md = window.markdownit({
            html: true,
            linkify: true,
            breaks: true,
        });
        const defaultRenderToken = md.renderer.renderToken.bind(md.renderer);
        md.renderer.renderToken = function(tokens, idx, options) {
            const token = tokens[idx];
            if (
                token
                && token.nesting === 1
                && Array.isArray(token.map)
                && token.map.length > 0
            ) {
                setTokenLineAttrs(token);
            }
            return defaultRenderToken(tokens, idx, options);
        };
        if (window.markdownitKatex) {
            try {
                md.use(window.markdownitKatex, {
                    throwOnError: false,
                    errorColor: '#cc0000',
                });
            } catch (error) {
                console.warn('KaTeX 插件初始化失败，降级为普通文本渲染', error);
            }
        }

        const defaultImageRule = md.renderer.rules.image ||
            function(tokens, idx, options, env, self) { return self.renderToken(tokens, idx, options); };
        md.renderer.rules.image = function(tokens, idx, options, env, self) {
            const token = tokens[idx];
            const src = token.attrGet('src');
            if (src && !isAbsoluteUrl(src)) {
                token.attrSet('src', buildAssetUrl(taskId, src));
            }
            token.attrSet('loading', 'lazy');
            token.attrSet('decoding', 'async');
            return defaultImageRule(tokens, idx, options, env, self);
        };

        const defaultLinkOpenRule = md.renderer.rules.link_open ||
            function(tokens, idx, options, env, self) { return self.renderToken(tokens, idx, options); };
        md.renderer.rules.link_open = function(tokens, idx, options, env, self) {
            const token = tokens[idx];
            const href = token.attrGet('href');
            if (href && href.startsWith('obsidian-note:')) {
                const notePath = decodeURIComponent(href.substring('obsidian-note:'.length));
                token.attrSet('href', '#');
                token.attrSet('data-note-path', notePath);
                token.attrSet('class', 'internal-note-link');
            } else if (href && !isAbsoluteUrl(href)) {
                token.attrSet('data-original-href', href);
                token.attrSet('href', buildAssetUrl(taskId, href));
            }
            return defaultLinkOpenRule(tokens, idx, options, env, self);
        };

        const defaultFenceRule = md.renderer.rules.fence ||
            function(tokens, idx, options, env, self) { return self.renderToken(tokens, idx, options); };
        md.renderer.rules.fence = function(tokens, idx, options, env, self) {
            const token = tokens[idx];
            if (Array.isArray(token.map) && token.map.length > 0) {
                setTokenLineAttrs(token);
            }
            const info = normalizeCodeLanguage(token.info);
            if (info === 'mermaid') {
                const lineAttr = token.attrGet('data-line');
                const lineEndAttr = token.attrGet('data-line-end');
                const lineFragment = lineAttr ? ` data-line="${escapeHtml(lineAttr)}"` : '';
                const lineEndFragment = lineEndAttr ? ` data-line-end="${escapeHtml(lineEndAttr)}"` : '';
                return `<div class="mermaid"${lineFragment}${lineEndFragment}>${token.content}</div>`;
            }
            if (token) {
                return renderHighlightedFence(token);
            }
            return defaultFenceRule(tokens, idx, options, env, self);
        };

        state.mdEngineCache[cacheKey] = md;
        return md;
    }

    async function fetchWithTimeout(url, options = {}, timeoutMs = 12000) {
        const controller = new AbortController();
        const timerId = setTimeout(() => controller.abort(), timeoutMs);
        try {
            return await fetch(url, { ...options, signal: controller.signal });
        } catch (error) {
            if (error && error.name === 'AbortError') {
                throw new Error(`请求超时（${Math.round(timeoutMs / 1000)}秒）`);
            }
            throw error;
        } finally {
            clearTimeout(timerId);
        }
    }

    async function fetchTasks() {
        const resp = await fetchWithTimeout(`${API_BASE}/tasks`, {}, 12000);
        if (!resp.ok) {
            throw new Error(`获取故事库失败: HTTP ${resp.status}`);
        }
        const data = await resp.json();
        if (Array.isArray(data)) {
            state.tasks = data;
        } else if (data && Array.isArray(data.tasks)) {
            state.tasks = data.tasks;
        } else if (data && Array.isArray(data.data)) {
            state.tasks = data.data;
        } else {
            console.warn('获取故事列表格式异常', data);
            state.tasks = [];
        }
        return state.tasks;
    }

    function normalizeTaskLifecycleStatus(status) {
        return String(status || '').trim().toLowerCase();
    }

    function getTaskStatusVisual(status) {
        const normalized = normalizeTaskLifecycleStatus(status);
        if (normalized === 'completed') return 'completed';
        if (normalized === 'processing') return 'processing';
        if (normalized === 'failed') return 'failed';
        if (normalized === 'cancelled') return 'cancelled';
        return 'queued';
    }

    function inferTaskProgressPercent(task) {
        const raw = Number(task && task.progress);
        if (Number.isFinite(raw) && raw >= 0) {
            const normalized = raw <= 1 ? raw * 100 : raw;
            return Math.max(0, Math.min(100, normalized));
        }
        const visual = getTaskStatusVisual(task && task.status);
        if (visual === 'completed') return 100;
        if (visual === 'processing') return 62;
        if (visual === 'failed' || visual === 'cancelled') return 100;
        return 12;
    }

    function findTaskById(taskId) {
        const normalizedTaskId = String(taskId || '').trim();
        if (!normalizedTaskId) return null;
        return (state.tasks || []).find((task) => String(task && task.taskId || '') === normalizedTaskId) || null;
    }

    function isTaskInProgress(task) {
        const normalized = normalizeTaskLifecycleStatus(task && task.status);
        return (
            normalized === 'queued'
            || normalized === 'processing'
            || normalized === 'pending'
            || normalized === 'running'
            || normalized === 'submitted'
            || normalized === 'in_progress'
        );
    }

    function findSingleInProgressTask(tasks) {
        const list = Array.isArray(tasks) ? tasks : [];
        const normalized = list.filter((task) => !!(task && task.taskId));
        if (normalized.length !== 1) {
            return null;
        }
        return isTaskInProgress(normalized[0]) ? normalized[0] : null;
    }

    function compactTaskId(taskIdRaw) {
        const id = String(taskIdRaw || '');
        if (id.length <= 10) return id || 'N/A';
        return `${id.slice(0, 4)}…${id.slice(-4)}`;
    }

    function formatTaskCardTime(isoText) {
        if (!isoText) return '';
        const date = new Date(isoText);
        if (Number.isNaN(date.getTime())) return '';
        return date.toLocaleTimeString([], { hour: '2-digit', minute: '2-digit' });
    }

    function resolveTaskSourceKind(task) {
        const raw = String(
            (task && (task.videoUrl || task.source || task.platform || task.inputType || '')) || ''
        ).toLowerCase();
        if (!raw) return 'unknown';
        if (raw.includes('bilibili') || raw.includes('/video/bv') || /bv[0-9a-z]{10}/i.test(raw)) {
            return 'bilibili';
        }
        if (raw.startsWith('http://') || raw.startsWith('https://')) {
            return 'link';
        }
        if (raw.includes('.') || raw.includes('\\') || raw.includes('/')) {
            return 'file';
        }
        return 'unknown';
    }

    function normalizeTaskTitleText(value) {
        return String(value == null ? '' : value).trim();
    }

    function isStorageFallbackTitle(task, titleText) {
        const normalizedTitle = normalizeTaskTitleText(titleText);
        if (!normalizedTitle) {
            return false;
        }
        const source = String(task && task.source || '').toLowerCase();
        const storageKey = normalizeTaskTitleText(task && task.storageKey);
        const taskId = normalizeTaskTitleText(task && task.taskId);
        const taskIdWithoutPrefix = taskId.startsWith('storage:') ? taskId.slice('storage:'.length) : taskId;
        return source === 'storage'
            && (
                (storageKey && normalizedTitle === storageKey)
                || (taskIdWithoutPrefix && normalizedTitle === taskIdWithoutPrefix)
            );
    }

    function extractVideoInputDisplay(videoUrlRaw) {
        const raw = normalizeTaskTitleText(videoUrlRaw);
        if (!raw) {
            return '';
        }
        const bvId = extractBvId(raw);
        if (bvId) {
            return bvId;
        }
        if (/^https?:\/\//i.test(raw)) {
            try {
                const parsed = new URL(raw);
                const host = String(parsed.hostname || '').replace(/^www\./i, '');
                const path = decodeURIComponent(String(parsed.pathname || '')).replace(/\/+$/, '');
                if (!host) {
                    return raw;
                }
                if (!path || path === '/') {
                    return host;
                }
                const segments = path.split('/').filter(Boolean);
                const tail = segments.length > 0 ? segments[segments.length - 1] : '';
                return tail ? `${host}/${tail}` : host;
            } catch (_error) {
                return raw;
            }
        }
        if (looksLikeLocalPath(raw)) {
            const normalized = raw.replace(/\\/g, '/');
            const parts = normalized.split('/').filter(Boolean);
            const fileName = parts.length > 0 ? parts[parts.length - 1] : '';
            return fileName || raw;
        }
        return raw;
    }

    function resolveTaskCardTitle(task) {
        const metaTitle = normalizeTaskTitleText(task && task.metaTitle);
        if (metaTitle) {
            return metaTitle;
        }
        const videoDisplay = extractVideoInputDisplay(task && task.videoUrl);
        if (videoDisplay) {
            return videoDisplay;
        }
        const title = normalizeTaskTitleText(task && task.title);
        if (title && !isStorageFallbackTitle(task, title)) {
            return title;
        }
        return normalizeTaskTitleText(task && task.taskId) || '未命名故事';
    }

    function normalizeTaskTitleSource(value) {
        const normalized = String(value || '').trim();
        if (normalized === 'meta' || normalized === 'video' || normalized === 'title' || normalized === 'taskId') {
            return normalized;
        }
        return '';
    }

    function resolveTaskTitleSource(task) {
        const provided = normalizeTaskTitleSource(task && task.titleSource);
        if (provided) {
            return provided;
        }
        const metaTitle = normalizeTaskTitleText(task && task.metaTitle);
        if (metaTitle) {
            return 'meta';
        }
        const videoDisplay = extractVideoInputDisplay(task && task.videoUrl);
        if (videoDisplay) {
            return 'video';
        }
        const title = normalizeTaskTitleText(task && task.title);
        if (title && !isStorageFallbackTitle(task, title)) {
            return 'title';
        }
        return 'taskId';
    }

    function collectTaskTitleSourceStats(tasks) {
        const stats = { meta: 0, video: 0, title: 0, taskId: 0 };
        (Array.isArray(tasks) ? tasks : []).forEach((task) => {
            const source = resolveTaskTitleSource(task);
            if (Object.prototype.hasOwnProperty.call(stats, source)) {
                stats[source] += 1;
            }
        });
        return stats;
    }

    function normalizeTaskTitleForDiff(task) {
        return resolveTaskCardTitle(task).replace(/\s+/g, ' ');
    }

    function getTaskStatusLabel(statusVisual) {
        if (statusVisual === 'completed') return '已成稿';
        if (statusVisual === 'processing') return '创作中';
        if (statusVisual === 'failed') return '需要帮助';
        if (statusVisual === 'cancelled') return '已暂停';
        return '排队中';
    }

    function buildTaskStatusHint(statusVisual, progressPercent) {
        const safeProgress = Math.max(0, Math.min(100, Math.round(Number(progressPercent) || 0)));
        if (statusVisual === 'completed') return '已可阅读';
        if (statusVisual === 'processing') return `${safeProgress}%`;
        if (statusVisual === 'failed') return '点击查看并重试';
        if (statusVisual === 'cancelled') return '已暂停';
        return '等待开始';
    }

    function buildTaskSourceIconSvg(sourceKind) {
        if (sourceKind === 'bilibili') {
            return `<span class="task-source-glyph" aria-hidden="true">B</span><span class="task-source-text">Bilibili</span>`;
        }
        if (sourceKind === 'link') {
            return `<span class="task-source-glyph" aria-hidden="true">链</span><span class="task-source-text">网页链接</span>`;
        }
        if (sourceKind === 'file') {
            return `<span class="task-source-glyph" aria-hidden="true">片</span><span class="task-source-text">本地视频</span>`;
        }
        return `<span class="task-source-glyph" aria-hidden="true">源</span><span class="task-source-text">其他来源</span>`;
    }

    function renderGhostEmptyState(options = {}) {
        const title = escapeHtml(String(options.title || '开始你的第一个故事'));
        const desc = escapeHtml(String(options.desc || '粘贴链接或拖入视频，系统会自动生成可编辑草稿。'));
        const actionText = options.actionText ? escapeHtml(String(options.actionText)) : '';
        const action = options.action ? escapeHtml(String(options.action)) : '';
        const cta = actionText

                <div class="empty-state-title">${title}</div>
                <div class="empty-state-desc">${desc}</div>
                ${cta}
            </div>
        `;
    }

    function buildEmptyStateIllustrationSvg() {

        const bgId = `emptyBg_${suffix}`;

        const glowId = `emptyGlow_${suffix}`;
