                }
                openImageLightboxFromNode(node);
            });
        });
    }

    function bindImageLightboxInteractions() {
        const refs = getImageLightboxElements();
        if (!refs.root || refs.root.dataset.bound === '1') return;
        refs.root.dataset.bound = '1';
        refs.root.addEventListener('click', (event) => {
            if (event.target === refs.root) {
                closeImageLightbox();
            }
        });
        refs.image.addEventListener('touchstart', (event) => {
            if (!state.imageLightboxOpen) return;
            if (!event.touches || event.touches.length <= 0) return;
            clearImageLightboxHintTimer();
            if (refs.hint) {
                refs.hint.classList.remove('visible');
                refs.hint.hidden = true;
            }
            const current = readImageLightboxTransform(refs);
            if (event.touches.length >= 2) {
                const distance = getTouchDistance(event.touches);
                state.imageLightboxGesture = {
                    mode: 'pinch',
                    startDistance: distance,
                    startScale: current.scale,
                    baseX: current.x,
                    baseY: current.y,
                    velocityX: 0,
                    velocityY: 0,
                    lastAt: Date.now(),
                };
                state.pinchStartDistance = distance;
                state.pinchTriggered = false;
                return;
            }
            const touch = event.touches[0];
            state.imageLightboxGesture = {
                mode: 'drag',
                startX: touch.clientX,
                startY: touch.clientY,
                baseX: current.x,
                baseY: current.y,
                baseScale: current.scale,
                velocityX: 0,
                velocityY: 0,
                lastX: touch.clientX,
                lastY: touch.clientY,
                lastAt: Date.now(),
            };
        }, { passive: true });
        refs.image.addEventListener('touchmove', (event) => {
            const gesture = state.imageLightboxGesture;
            if (!state.imageLightboxOpen || !gesture) return;
            if (gesture.mode === 'pinch' && event.touches && event.touches.length >= 2) {
                const distance = getTouchDistance(event.touches);
                if (!Number.isFinite(distance) || distance <= 0 || !Number.isFinite(gesture.startDistance) || gesture.startDistance <= 0) {
                    return;
                }
                const scale = clampNumber(gesture.startScale * (distance / gesture.startDistance), 0.55, 2.1);
                applyImageLightboxTransform(refs, gesture.baseX, gesture.baseY, scale);
                state.pinchTriggered = true;
                if (event.cancelable) {
                    event.preventDefault();
                }
                return;
            }
            if (!event.touches || event.touches.length !== 1) return;
            const touch = event.touches[0];
            const dx = touch.clientX - gesture.startX;
            const dy = touch.clientY - gesture.startY;
            const now = Date.now();
            const dt = Math.max(1, now - (gesture.lastAt || now));
            gesture.velocityX = (touch.clientX - (gesture.lastX || touch.clientX)) / dt;
            gesture.velocityY = (touch.clientY - (gesture.lastY || touch.clientY)) / dt;
            gesture.lastX = touch.clientX;
            gesture.lastY = touch.clientY;
            gesture.lastAt = now;
            applyImageLightboxTransform(refs, gesture.baseX + dx, gesture.baseY + dy, gesture.baseScale || 1);
            if (event.cancelable) {
                event.preventDefault();
            }
        }, { passive: false });

        const releaseGesture = () => {
            if (!state.imageLightboxOpen) return;
            const gesture = state.imageLightboxGesture;
            state.imageLightboxGesture = null;
            if (!gesture) return;
            const current = readImageLightboxTransform(refs);
            const velocityX = Number(gesture.velocityX) || 0;
            const velocityY = Number(gesture.velocityY) || 0;
            const speed = Math.hypot(velocityX, velocityY);
            const shouldDismiss = (
                current.scale < 0.8
                || Math.abs(current.y) > 126
                || Math.abs(current.x) > 200
                || speed > 0.95
            );
            if (shouldDismiss) {
                closeImageLightbox({ velocityX, velocityY });
                return;
            }
            animateImageLightboxBackToIdentity(refs);
        };
        refs.image.addEventListener('touchend', (event) => {
            if (event.touches && event.touches.length > 0) return;
            releaseGesture();
        }, { passive: true });
        refs.image.addEventListener('touchcancel', releaseGesture, { passive: true });

        document.addEventListener('keydown', (event) => {
            if (event.key !== 'Escape' || !state.imageLightboxOpen) return;
            event.preventDefault();
            closeImageLightbox();
        });
    }

    function bindMediaLongPress(container) {
        if (!container) return;
        const mediaNodes = container.querySelectorAll('img, video');
        mediaNodes.forEach((node) => {
            if (node.dataset.saveBound === '1') return;
            node.dataset.saveBound = '1';

            const clearTimer = () => {
                if (state.mediaPressTimer) {
                    clearTimeout(state.mediaPressTimer);
                    state.mediaPressTimer = null;
                }
            };

            node.addEventListener('touchstart', () => {
                clearTimer();
                state.mediaPressTimer = setTimeout(async () => {
                    state.mediaPressTimer = null;
                    const ok = confirm('是否保存该媒体到本地？');
                    if (!ok) return;
                    try {
                        await saveMediaElementToLocal(node);
                    } catch (error) {
                        setTaskSummary(`${UI_COPY.saveFailed}：${normalizeErrorMessage(error, { fallback: '请稍后重试' })}`, 'error');
                    }
                }, 2000);
            }, { passive: true });
            node.addEventListener('touchmove', clearTimer, { passive: true });
            node.addEventListener('touchend', clearTimer, { passive: true });
            node.addEventListener('touchcancel', clearTimer, { passive: true });
            node.addEventListener('contextmenu', async (event) => {
                event.preventDefault();
                const ok = confirm('是否保存该媒体到本地？');
                if (!ok) return;
                try {
                    await saveMediaElementToLocal(node);
                } catch (error) {
                    setTaskSummary(`${UI_COPY.saveFailed}：${normalizeErrorMessage(error, { fallback: '请稍后重试' })}`, 'error');
                }
            });
        });
    }

    function touchDistance(t1, t2) {
        const dx = t1.clientX - t2.clientX;
        const dy = t1.clientY - t2.clientY;
        return Math.sqrt(dx * dx + dy * dy);
    }

    const PARAGRAPH_WIKILINK_TRIGGER_REGEX = /\[\[([^\]\n|]*)$/;
    const PARAGRAPH_WIKILINK_MAX_ITEMS = 8;
    const PARAGRAPH_WIKILINK_KEY_SKIP_SET = new Set(['ArrowUp', 'ArrowDown', 'Enter', 'Tab', 'Escape']);

    function isParagraphEditorMode() {
        return !!(state.currentTaskId && state.paragraphEditorEnabled);
    }

    function ensureParagraphWikilinkPanel() {
        if (paragraphWikilinkPanel && paragraphWikilinkPanel.parentNode) {
            return paragraphWikilinkPanel;
        }
        const panel = document.createElement('div');
        panel.className = 'paragraph-wikilink-panel';
        panel.hidden = true;
        panel.addEventListener('mousedown', (event) => {
            event.preventDefault();
            const item = event.target.closest('[data-paragraph-wikilink-index]');
            if (!item) return;
            const index = Number(item.getAttribute('data-paragraph-wikilink-index'));
            applyParagraphWikilinkSuggestion(index);
        });
        document.body.appendChild(panel);
        paragraphWikilinkPanel = panel;
        return panel;
    }

    function hideParagraphWikilinkPanel() {
        paragraphWikilinkSuggestions = [];
        paragraphWikilinkActiveIndex = -1;
        paragraphWikilinkTriggerStart = -1;
        paragraphWikilinkActiveEditor = null;
        if (!paragraphWikilinkPanel) return;
        paragraphWikilinkPanel.hidden = true;
        paragraphWikilinkPanel.innerHTML = '';
    }

    async function ensureParagraphWikilinkTitlesLoaded() {
        if (paragraphWikilinkTitlesLoaded) {
            return paragraphWikilinkTitles;
        }
        if (paragraphWikilinkTitleLoadPromise) {
            return paragraphWikilinkTitleLoadPromise;
        }
        paragraphWikilinkTitleLoadPromise = fetch(`${API_BASE}/cards/titles`)
            .then(async (resp) => {
                if (!resp.ok) {
                    const text = await resp.text();
                    throw new Error(text || `HTTP ${resp.status}`);
                }
                return resp.json();
            })
            .then((payload) => {
                const raw = Array.isArray(payload && payload.titles) ? payload.titles : [];
                const normalized = raw
                    .map((item) => String(item || '').trim())
                    .filter(Boolean);
                paragraphWikilinkTitles = Array.from(new Set(normalized));
                paragraphWikilinkTitlesLoaded = true;
                return paragraphWikilinkTitles;
            })
            .catch((error) => {
                console.warn('加载卡片标题失败（段落 wikilink）', error);
                paragraphWikilinkTitles = [];
                paragraphWikilinkTitlesLoaded = true;
                return paragraphWikilinkTitles;
            })
            .finally(() => {
                paragraphWikilinkTitleLoadPromise = null;
            });
        return paragraphWikilinkTitleLoadPromise;
    }

    function collectParagraphInlineCandidatesFromMarkdown() {
        const source = String(state.currentMarkdownRaw || '');
        if (!source) return [];
        const bucket = [];
        const headingRegex = /^#{1,6}\s+(.+)$/gm;
        let headingMatch;
        while ((headingMatch = headingRegex.exec(source)) !== null) {
            const heading = String(headingMatch[1] || '').trim();
            if (heading) {
                bucket.push(heading);
            }
        }
        const wikilinkRegex = /\[\[([^\]\n|]+)(?:\|[^\]]*)?\]\]/g;
        let linkMatch;
        while ((linkMatch = wikilinkRegex.exec(source)) !== null) {
            const title = String(linkMatch[1] || '').trim();
            if (title) {
                bucket.push(title);
            }
        }
        return bucket;
    }

    function collectParagraphWikilinkCandidates(query) {
        const normalizedQuery = String(query || '').trim().toLowerCase();
        const candidates = [];
        const seen = new Set();
        const pushUnique = (raw) => {
            const value = String(raw || '').trim();
            if (!value) return;
            const key = value.toLowerCase();
            if (seen.has(key)) return;
            seen.add(key);
            candidates.push(value);
        };
        paragraphWikilinkTitles.forEach(pushUnique);
        (state.tasks || []).forEach((task) => {
            pushUnique(task && (task.title || task.taskId));
        });
        collectParagraphInlineCandidatesFromMarkdown().forEach(pushUnique);

        const startsWith = [];
        const contains = [];
        candidates.forEach((item) => {
            if (!normalizedQuery) {
                startsWith.push(item);
                return;
            }
            const lower = item.toLowerCase();
            const hit = lower.indexOf(normalizedQuery);
            if (hit < 0) return;
            if (hit === 0) {
                startsWith.push(item);
            } else {
                contains.push(item);
            }
        });
        return startsWith.concat(contains).slice(0, PARAGRAPH_WIKILINK_MAX_ITEMS);
    }

    function renderParagraphWikilinkPanelForEditor(editor, suggestions) {
        const panel = ensureParagraphWikilinkPanel();
        paragraphWikilinkSuggestions = Array.isArray(suggestions) ? suggestions : [];
        paragraphWikilinkActiveIndex = paragraphWikilinkSuggestions.length ? 0 : -1;
        paragraphWikilinkActiveEditor = editor;
        panel.innerHTML = paragraphWikilinkSuggestions.map((item, index) => `
            <button
                type="button"
                class="paragraph-wikilink-item${index === paragraphWikilinkActiveIndex ? ' is-active' : ''}"
                data-paragraph-wikilink-index="${index}"
            >
                ${escapeHtml(item)}
            </button>
        `).join('');
        const rect = editor.getBoundingClientRect();
        panel.style.left = `${Math.max(8, Math.round(rect.left))}px`;
        panel.style.top = `${Math.round(rect.bottom + 4)}px`;
        panel.style.width = `${Math.max(180, Math.round(rect.width))}px`;
        panel.hidden = paragraphWikilinkSuggestions.length === 0;
    }

    function refreshParagraphWikilinkActiveState() {
        if (!paragraphWikilinkPanel) return;
        paragraphWikilinkPanel.querySelectorAll('.paragraph-wikilink-item').forEach((node, index) => {
            node.classList.toggle('is-active', index === paragraphWikilinkActiveIndex);
        });
    }

    function moveParagraphWikilinkActiveIndex(direction) {
        if (!paragraphWikilinkSuggestions.length) return;
        const total = paragraphWikilinkSuggestions.length;
        const current = Number.isFinite(paragraphWikilinkActiveIndex) && paragraphWikilinkActiveIndex >= 0
            ? paragraphWikilinkActiveIndex
            : 0;
        paragraphWikilinkActiveIndex = (current + direction + total) % total;
        refreshParagraphWikilinkActiveState();
    }

    function applyParagraphWikilinkSuggestion(index) {
        const editor = paragraphWikilinkActiveEditor;
        if (!editor) {
            hideParagraphWikilinkPanel();
            return;
        }
        const selected = paragraphWikilinkSuggestions[Number(index)];
        if (!selected) {
            hideParagraphWikilinkPanel();
            return;
        }
        const cursor = Number(editor.selectionStart);
        const triggerStart = Number(paragraphWikilinkTriggerStart);
        if (!Number.isFinite(cursor) || !Number.isFinite(triggerStart) || triggerStart < 0 || triggerStart > cursor) {
            hideParagraphWikilinkPanel();
            return;
        }
        const before = editor.value.slice(0, triggerStart);
        const after = editor.value.slice(cursor);
        const insert = `[[${selected}]]`;
        editor.value = `${before}${insert}${after}`;
        const nextCursor = before.length + insert.length;
        editor.setSelectionRange(nextCursor, nextCursor);
        state.paragraphDraftText = String(editor.value || '');
        hideParagraphWikilinkPanel();
        editor.focus({ preventScroll: true });
    }

    async function refreshParagraphWikilinkSuggestions(editor) {
        if (!editor || !editor.matches('[data-p-editor]')) {
            hideParagraphWikilinkPanel();
            return;
        }
        const cursor = Number(editor.selectionStart);
        if (!Number.isFinite(cursor) || cursor < 0) {
            hideParagraphWikilinkPanel();
            return;
        }
        const beforeCursor = String(editor.value || '').slice(0, cursor);
        const triggerMatch = beforeCursor.match(PARAGRAPH_WIKILINK_TRIGGER_REGEX);
        if (!triggerMatch) {
            hideParagraphWikilinkPanel();
            return;
        }
        paragraphWikilinkTriggerStart = cursor - triggerMatch[0].length;
        await ensureParagraphWikilinkTitlesLoaded();
        const query = String(triggerMatch[1] || '');
        const suggestions = collectParagraphWikilinkCandidates(query);
        if (!suggestions.length) {
            hideParagraphWikilinkPanel();
            return;
        }
        renderParagraphWikilinkPanelForEditor(editor, suggestions);
    }

    function renderParagraphCardHtml(index) {
        const block = state.paragraphBlocks[index];
        if (!block) {
            return '';
        }
        const favorite = PARAGRAPH_MARK_ENABLED && !!state.paragraphMeta.favorites[index];
        const highlightClass = favorite ? ' is-highlighted' : '';
        const comments = getParagraphComments(index);
        const commentCount = comments.length;
        const latestComment = commentCount ? comments[commentCount - 1] : '';
        const editing = state.paragraphEditingIndex === index;
        const previewHtml = block.text
            ? buildParagraphPreviewHtml(block.text)
            : '<span class="paragraph-line-empty">（空行）</span>';
        const noteHtml = latestComment
            ? `<div class="paragraph-note">最近批注：${escapeHtml(latestComment)}${commentCount > 1 ? `（共 ${commentCount} 条）` : ''}</div>`
            : '';

        if (editing) {
            return `
                <section class="paragraph-card editing${highlightClass}" data-p-index="${index}">
                    <textarea class="paragraph-textarea" data-p-editor="${index}" data-p-wikilink="1">${escapeHtml(state.paragraphDraftText)}</textarea>
                    <div class="paragraph-editor-actions">
                        <button class="btn btn-ghost paragraph-editor-action" type="button" data-p-save="${index}">保存</button>
                        <button class="btn btn-ghost paragraph-editor-action" type="button" data-p-cancel="${index}">取消</button>
                    </div>
                    ${noteHtml}
                </section>
            `;
        }
        return `
            <section class="paragraph-card${highlightClass}" data-p-index="${index}">
                <div class="paragraph-preview">${previewHtml}</div>
                ${noteHtml}
            </section>
        `;
    }

    function refreshParagraphCardDom(index) {
        if (!Number.isFinite(index) || index < 0) {
            return false;
        }
        const current = document.querySelector(`.paragraph-card[data-p-index="${index}"]`);
        if (!current) {
            return false;
        }
        const next = createParagraphCardElement(index);
        if (!next) {
            return false;
        }
        current.replaceWith(next);
        return true;
    }

    function refreshParagraphCardsDom(indexes) {
        const uniq = Array.from(new Set((indexes || []).filter((idx) => Number.isFinite(idx) && idx >= 0)));
        if (!uniq.length) {
            return true;
        }
        let allFound = true;
        uniq.forEach((idx) => {
            if (!refreshParagraphCardDom(idx)) {
                allFound = false;
            }
        });
        return allFound;
    }

    function resetParagraphVirtualState() {
        if (state.virtualScrollRafId) {
            cancelAnimationFrame(state.virtualScrollRafId);
            state.virtualScrollRafId = 0;
        }
        cancelParagraphVirtualMeasure();
        state.virtualListActive = false;
        state.virtualStart = -1;
        state.virtualEnd = -1;
        state.virtualTaskId = '';
        state.virtualHeightCache = {};
        state.virtualPrefixHeights = [];
        state.virtualPrefixDirtyFrom = 0;
        state.virtualTotalLines = 0;
        state.virtualScrollAdjusting = false;
    }

    function shouldUseParagraphVirtualList() {
        return !!(state.paragraphBlocks && state.paragraphBlocks.length >= 140);
    }

    function getVirtualLineHeight(index) {
        const cached = state.virtualHeightCache[index];
        if (Number.isFinite(cached) && cached > 20) {
            return cached;
        }
        return Math.max(64, Number(state.virtualAvgHeight) || 92);
    }

    function invalidateVirtualPrefix(fromIndex = 0) {
        const nextFrom = Math.max(0, Number(fromIndex) || 0);
        state.virtualPrefixDirtyFrom = Math.min(state.virtualPrefixDirtyFrom, nextFrom);
    }

    function ensureVirtualPrefix(total) {
        const safeTotal = Math.max(0, Number(total) || 0);
        if (!Array.isArray(state.virtualPrefixHeights) || state.virtualPrefixHeights.length !== safeTotal + 1 || state.virtualTotalLines !== safeTotal) {
            state.virtualPrefixHeights = new Array(safeTotal + 1).fill(0);
            state.virtualPrefixDirtyFrom = 0;
            state.virtualTotalLines = safeTotal;
        }
        let start = Math.max(0, Math.min(safeTotal, state.virtualPrefixDirtyFrom));
        if (start === 0) {
            state.virtualPrefixHeights[0] = 0;
        } else if (!Number.isFinite(state.virtualPrefixHeights[start])) {
            start = 0;
            state.virtualPrefixHeights[0] = 0;
        }
        for (let i = start; i < safeTotal; i += 1) {
            state.virtualPrefixHeights[i + 1] = state.virtualPrefixHeights[i] + getVirtualLineHeight(i);
        }
        state.virtualPrefixDirtyFrom = safeTotal;
        return state.virtualPrefixHeights;
    }

    function createParagraphCardElement(index) {
        const html = renderParagraphCardHtml(index);
        if (!html) {
            return null;
        }
        const template = document.createElement('template');
        template.innerHTML = html.trim();
        return template.content.firstElementChild;
    }

    function findVirtualIndexByOffset(offset, total) {
        const safeTotal = Math.max(0, Number(total) || 0);
        if (safeTotal <= 0) {
            return -1;
        }
        const prefix = ensureVirtualPrefix(safeTotal);
        const target = Math.max(0, Math.min(Number(offset) || 0, prefix[safeTotal]));
        let lo = 0;
        let hi = safeTotal;
        while (lo < hi) {
            const mid = Math.floor((lo + hi + 1) / 2);
            if (prefix[mid] <= target) {
                lo = mid;
            } else {
                hi = mid - 1;
            }
        }
        return Math.min(safeTotal - 1, Math.max(0, lo));
    }

    function setVirtualLineHeight(index, height) {
        if (!Number.isFinite(index) || index < 0) {
            return false;
        }
        const normalized = Math.max(44, Math.min(420, Number(height) || 0));
        if (!Number.isFinite(normalized) || normalized <= 0) {
            return false;
        }
        const previous = getVirtualLineHeight(index);
        if (Math.abs(previous - normalized) < 1) {
            return false;
        }
        state.virtualHeightCache[index] = normalized;
        invalidateVirtualPrefix(index);
        return true;
    }

    function buildVirtualWindowBounds(scrollTop, viewportHeight, total) {
        const safeTotal = Math.max(0, Number(total) || 0);
        if (safeTotal <= 0) {
            return { start: 0, end: -1, topOffset: 0, bottomOffset: 0 };
        }
        const overscan = 14;
        const firstVisible = findVirtualIndexByOffset(scrollTop, safeTotal);
        const lastVisible = findVirtualIndexByOffset(scrollTop + viewportHeight, safeTotal);
        const start = Math.max(0, firstVisible - overscan);
        const end = Math.min(safeTotal - 1, lastVisible + overscan);
        const prefix = ensureVirtualPrefix(safeTotal);
        return {
            start,
            end,
            topOffset: prefix[start],
            bottomOffset: Math.max(0, prefix[safeTotal] - prefix[end + 1]),
        };
    }

    function cancelParagraphVirtualMeasure() {
        if (typeof state.virtualMeasureCancelHandle === 'function') {
            state.virtualMeasureCancelHandle();
            state.virtualMeasureCancelHandle = null;
        }
    }

    function measureParagraphVirtualWindow(taskId, context) {
        if (!context || !state.virtualListActive) {
            return;
        }
        if (state.virtualTaskId !== String(taskId || '')) {
            return;
        }
        if (state.virtualStart !== context.start || state.virtualEnd !== context.end) {
            return;
        }
        if (isParagraphTouchScrolling()) {
            return;
        }
        const container = document.getElementById('markdownBody');
        if (!container) {
            return;
        }
        const root = container.querySelector('#paragraphVirtualRoot');
        const topSpacer = root ? root.querySelector('#paragraphVirtualTop') : null;
        const windowEl = root ? root.querySelector('#paragraphVirtualWindow') : null;
        const bottomSpacer = root ? root.querySelector('#paragraphVirtualBottom') : null;
        if (!windowEl || !topSpacer || !bottomSpacer) {
            return;
        }
        const renderedCards = windowEl.querySelectorAll('.paragraph-card');
        if (!renderedCards.length) {
            return;
        }

        let measuredChanged = false;
        let totalHeight = 0;
        renderedCards.forEach((card) => {
            const measured = Number(card.offsetHeight) || Number(card.getBoundingClientRect().height) || 0;
            if (!Number.isFinite(measured) || measured <= 0) {
                return;
            }
            totalHeight += measured;
            const idx = Number(card.getAttribute('data-p-index'));
            if (setVirtualLineHeight(idx, measured)) {
                measuredChanged = true;
            }
        });

        const nextAvg = totalHeight / renderedCards.length;
        if (Number.isFinite(nextAvg) && nextAvg > 20) {
            const nextBlended = Math.max(64, Math.min(260, (state.virtualAvgHeight * 0.8) + (nextAvg * 0.2)));
            if (Math.abs(nextBlended - state.virtualAvgHeight) >= 0.5) {
                state.virtualAvgHeight = nextBlended;
                invalidateVirtualPrefix(0);
                measuredChanged = true;
            }
        }
        if (!measuredChanged) {
            return;
        }

        const total = Math.max(0, Number(context.total) || 0);
        if (!total) {
            return;
        }
        const prefixAfter = ensureVirtualPrefix(total);
        const safeAnchor = Number.isFinite(context.anchorIndex) && context.anchorIndex >= 0 ? context.anchorIndex : 0;
        const anchorTopAfter = prefixAfter[safeAnchor];
        const anchorTopBefore = Number(context.anchorTopBefore) || 0;
        const correction = anchorTopAfter - anchorTopBefore;
        if (!isParagraphTouchScrolling() && Math.abs(correction) >= 0.5) {
            state.virtualScrollAdjusting = true;
            container.scrollTop = Math.max(0, container.scrollTop + correction);
            requestAnimationFrame(() => {
                state.virtualScrollAdjusting = false;
            });
        }
        const safeStart = Math.max(0, Math.min(total - 1, context.start));
        const safeEnd = Math.max(safeStart, Math.min(total - 1, context.end));
        topSpacer.style.height = `${Math.max(0, prefixAfter[safeStart])}px`;
        bottomSpacer.style.height = `${Math.max(0, prefixAfter[total] - prefixAfter[safeEnd + 1])}px`;
    }

    function scheduleParagraphVirtualMeasure(taskId, context) {
        cancelParagraphVirtualMeasure();
        state.virtualMeasureCancelHandle = scheduleDoubleAnimationFrame(() => {
            state.virtualMeasureCancelHandle = null;
            measureParagraphVirtualWindow(taskId, context);
        });
    }

    function renderParagraphEditorVirtualWindow(taskId, force = false) {
        const container = document.getElementById('markdownBody');
        if (!container) {
            return;
        }
        const root = container.querySelector('#paragraphVirtualRoot');
        if (!root) {
            return;
        }
        const topSpacer = root.querySelector('#paragraphVirtualTop');
        const windowEl = root.querySelector('#paragraphVirtualWindow');
        const bottomSpacer = root.querySelector('#paragraphVirtualBottom');
        if (!topSpacer || !windowEl || !bottomSpacer) {
            return;
        }

        const total = state.paragraphBlocks.length;
        if (!total) {
            cancelParagraphVirtualMeasure();
            windowEl.innerHTML = '<div class="empty">当前文档没有可编辑内容</div>';
            topSpacer.style.height = '0px';
            bottomSpacer.style.height = '0px';
            state.virtualStart = -1;
            state.virtualEnd = -1;
            return;
        }

        const scrollTop = container.scrollTop;
        const viewportHeight = Math.max(1, container.clientHeight);
        const prefixBefore = ensureVirtualPrefix(total);
        const anchorIndex = findVirtualIndexByOffset(scrollTop, total);
        const anchorTopBefore = anchorIndex >= 0 ? prefixBefore[anchorIndex] : 0;
        const { start, end, topOffset, bottomOffset } = buildVirtualWindowBounds(scrollTop, viewportHeight, total);

        if (!force && start === state.virtualStart && end === state.virtualEnd && state.virtualTaskId === String(taskId || '')) {
            topSpacer.style.height = `${Math.max(0, topOffset)}px`;
            bottomSpacer.style.height = `${Math.max(0, bottomOffset)}px`;
            return;
        }

        const reuseCards = !force;
        const cachedByIndex = new Map();
        if (reuseCards) {
            windowEl.querySelectorAll('.paragraph-card').forEach((card) => {
                const idx = Number(card.getAttribute('data-p-index'));
                if (Number.isFinite(idx) && idx >= start && idx <= end) {
                    cachedByIndex.set(idx, card);
                }
            });
        }
        const fragment = document.createDocumentFragment();
        for (let i = start; i <= end; i += 1) {
            const reused = cachedByIndex.get(i);
            if (reused) {
                fragment.appendChild(reused);
                continue;
            }
            const created = createParagraphCardElement(i);
            if (created) {
                fragment.appendChild(created);
            }
        }
        windowEl.replaceChildren(fragment);
        topSpacer.style.height = `${Math.max(0, topOffset)}px`;
        bottomSpacer.style.height = `${Math.max(0, bottomOffset)}px`;
        state.virtualStart = start;
        state.virtualEnd = end;
        state.virtualTaskId = String(taskId || '');
        scheduleParagraphVirtualMeasure(taskId, {
            total,
            start,
            end,
            anchorIndex,
            anchorTopBefore,
        });
    }

    function onParagraphVirtualScroll() {
        if (!state.virtualListActive || state.virtualScrollRafId || state.virtualScrollAdjusting) {
            return;
        }
        state.virtualScrollRafId = requestAnimationFrame(() => {
            state.virtualScrollRafId = 0;
            renderParagraphEditorVirtualWindow(state.currentTaskId, false);
        });
    }

    function ensureParagraphVirtualScrollBinding() {
        const container = document.getElementById('markdownBody');
        if (!container) return;
        if (container.dataset.virtualScrollBound === '1') return;
        container.dataset.virtualScrollBound = '1';
        container.addEventListener('scroll', onParagraphVirtualScroll, { passive: true });
    }

    function applyDeleteDomPatch(deletedIndex) {
        if (state.virtualListActive) {
            return false;
        }
        if (!Number.isFinite(deletedIndex) || deletedIndex < 0) {
            return false;
        }
        const list = document.querySelector('#markdownBody .paragraph-list');
        if (!list) {
            return false;
        }
        const removed = list.querySelector(`.paragraph-card[data-p-index="${deletedIndex}"]`);
        if (!removed) {
            return false;
        }
        removed.remove();

        const newLength = state.paragraphBlocks.length;
        for (let i = deletedIndex + 1; i <= newLength; i += 1) {
            const oldNode = list.querySelector(`.paragraph-card[data-p-index="${i}"]`);
            if (!oldNode) {
                continue;
            }
            oldNode.setAttribute('data-p-index', String(i - 1));
            oldNode.querySelectorAll('[data-p-index]').forEach((el) => {
                el.setAttribute('data-p-index', String(i - 1));
            });
            oldNode.querySelectorAll('[data-p-editor]').forEach((el) => {
                el.setAttribute('data-p-editor', String(i - 1));
            });
        }

        const reRenderIndexes = [];
        for (let i = deletedIndex; i < newLength; i += 1) {
            reRenderIndexes.push(i);
        }
        return refreshParagraphCardsDom(reRenderIndexes);
    }

    function focusParagraphEditorIfNeeded(index) {
        if (!Number.isFinite(index) || index < 0) return;
        requestAnimationFrame(() => {
            const editor = document.querySelector(`[data-p-editor="${index}"]`);
            if (!editor) return;
            try {
                editor.focus({ preventScroll: true });
            } catch (_error) {
                editor.focus();
            }
        });
    }

    function renderParagraphEditor(taskId) {
        ensureParagraphEditorState();
        const container = document.getElementById('markdownBody');
        container.classList.add('edit-scroll-host');
        if (!state.paragraphBlocks.length) {
            resetParagraphVirtualState();
            container.innerHTML = '<div class="empty">当前文档没有可编辑内容</div>';
            buildOutline(container);
            teardownScrollSpy();
            return;
        }

        teardownScrollSpy();
        state.virtualListActive = shouldUseParagraphVirtualList();
        if (state.virtualListActive) {
            ensureParagraphVirtualScrollBinding();
            const shouldResetShell = !container.querySelector('#paragraphVirtualRoot') || state.virtualTaskId !== String(taskId || '');
            if (shouldResetShell) {
                state.virtualStart = -1;
                state.virtualEnd = -1;
                state.virtualTaskId = '';
                container.innerHTML = `
                    <div class="paragraph-virtual-root" id="paragraphVirtualRoot">
                        <div class="paragraph-virtual-spacer" id="paragraphVirtualTop"></div>
                        <div class="paragraph-list" id="paragraphVirtualWindow"></div>
                        <div class="paragraph-virtual-spacer" id="paragraphVirtualBottom"></div>
                    </div>
                `;
            }
            renderParagraphEditorVirtualWindow(taskId, true);
            focusParagraphEditorIfNeeded(state.paragraphEditingIndex);
            return;
        }

        resetParagraphVirtualState();
        const cards = state.paragraphBlocks.map((_block, index) => renderParagraphCardHtml(index));

        container.innerHTML = `<div class="paragraph-list">${cards.join('')}</div>`;
        enhanceRenderedContent(container, taskId, {
            withMedia: false,
            withLinks: false,
            withMermaid: false,
            withOutline: false,
        });
        focusParagraphEditorIfNeeded(state.paragraphEditingIndex);
    }

    function startParagraphEditing(index) {
        ensureParagraphEditorState();
        if (!Number.isFinite(index) || index < 0 || index >= state.paragraphBlocks.length) {
            return false;
        }
        const block = state.paragraphBlocks[index];
        if (!block) {
            return false;
        }
        const previousEditing = state.paragraphEditingIndex;
        if (previousEditing === index) {
            const existingEditor = document.querySelector(`[data-p-editor="${index}"]`);
            if (existingEditor) {
                existingEditor.focus({ preventScroll: true });
            }
            return true;
        }
        if (Number.isFinite(previousEditing) && previousEditing >= 0 && previousEditing < state.paragraphBlocks.length) {
            commitParagraphEditing(previousEditing, { leaveEditing: true, refreshDom: false });
        }
        state.paragraphEditingIndex = index;
        state.paragraphDraftText = String(block.text || '');
        if (!refreshParagraphCardsDom([previousEditing, index])) {
            renderParagraphEditor(state.currentTaskId);
        }
        requestAnimationFrame(() => {
            const editor = document.querySelector(`[data-p-editor="${index}"]`);
            if (!editor) return;
            try {
                editor.focus({ preventScroll: true });
            } catch (_error) {
                editor.focus();
            }
            const end = String(editor.value || '').length;
            editor.setSelectionRange(end, end);
        });
        return true;
    }

    function cancelParagraphEditing(index) {
        if (!Number.isFinite(index) || index < 0 || index >= state.paragraphBlocks.length) {
            return false;
        }
        const previousEditing = state.paragraphEditingIndex;
        if (previousEditing !== index) {
            return false;
        }
        state.paragraphEditingIndex = -1;
        state.paragraphDraftText = '';
        hideParagraphWikilinkPanel();
        if (!refreshParagraphCardsDom([previousEditing])) {
            renderParagraphEditor(state.currentTaskId);
        }
        return true;
    }

    function commitParagraphEditing(index, options = {}) {
        ensureParagraphEditorState();
        if (!Number.isFinite(index) || index < 0 || index >= state.paragraphBlocks.length) {
            return false;
        }
        const block = state.paragraphBlocks[index];
        if (!block) {
            return false;
        }
        const editor = document.querySelector(`[data-p-editor="${index}"]`);
        const fallbackText = state.paragraphEditingIndex === index ? state.paragraphDraftText : block.text;
        const nextText = editor ? editor.value : fallbackText;
        const normalizedNextText = String(nextText || '');
        const previousText = String(block.text || '');
        block.text = normalizedNextText;
        const changed = normalizedNextText !== previousText;
        if (changed) {
            syncCurrentMarkdownFromBlocks();
            scheduleParagraphBackgroundSync({ markdownChanged: true });
        }

        const previousEditing = state.paragraphEditingIndex;
        const leaveEditing = options.leaveEditing !== false;
        if (leaveEditing) {
            state.paragraphEditingIndex = -1;
            state.paragraphDraftText = '';
            hideParagraphWikilinkPanel();
        } else {
            state.paragraphEditingIndex = index;
            state.paragraphDraftText = normalizedNextText;
        }
        if (options.refreshDom !== false) {
            if (!refreshParagraphCardsDom([previousEditing, index]) && state.currentTaskId) {
                // 无段落卡片容器时回到标准 Markdown 渲染，避免误切到旧卡片模式。
                renderCurrentView();
            }
        }
        return changed;
    }

    function setParagraphEditorEnabled(enabled, options = {}) {
        const nextEnabled = !!enabled;
        if (!state.currentTaskId) {
            state.paragraphEditorEnabled = false;
            refreshQuickActionLabels();
            return false;
        }
        if (state.paragraphEditorEnabled === nextEnabled) {
            refreshQuickActionLabels();
            return true;
        }
        if (!nextEnabled) {
            const editingIndex = Number(state.paragraphEditingIndex);
            if (Number.isFinite(editingIndex) && editingIndex >= 0) {
                commitParagraphEditing(editingIndex, { leaveEditing: true, refreshDom: false });
            }
            hideParagraphWikilinkPanel();
        } else {
            ensureParagraphEditorState();
        }
        state.paragraphEditorEnabled = nextEnabled;
        refreshQuickActionLabels();
        if (options.render !== false) {
            renderCurrentView();
        }
        return true;
    }

    function toggleParagraphEditorMode() {
        if (!state.currentTaskId) {
            setTaskSummary(UI_COPY.openContentFirst, 'error');
            return;
        }
        setParagraphEditorEnabled(!state.paragraphEditorEnabled, { render: true });
    }

    function renderCurrentView() {
        if (!state.currentTaskId) return;
        if (isParagraphEditorMode()) {
            renderParagraphEditor(state.currentTaskId);
            return;
        }
        renderMarkdown(state.currentMarkdownRaw || '', state.currentTaskId);
    }

    async function persistParagraphBlocksAndRerender() {
        const markdown = joinParagraphBlocks(state.paragraphBlocks);
        const result = await saveMarkdownToServer(markdown);
        state.currentMarkdownRaw = markdown;
        if (result && result.markdownPath) {
            state.currentMarkdownPath = result.markdownPath;
        }
        if (result && result.baseDir) {
            state.currentMarkdownBaseDir = result.baseDir;
        }
        refreshViewerTitle();
        renderCurrentView();
    }

    function reindexParagraphMetaAfterDelete(deletedIndex, deletedCount = 1) {
        const safeDeleteCount = Number.isFinite(deletedCount) && deletedCount > 0 ? Math.floor(deletedCount) : 1;
        const nextFavorites = {};
        const nextComments = {};
        Object.keys(state.paragraphMeta.favorites || {}).forEach((k) => {
            const idx = Number(k);
            if (!Number.isFinite(idx) || idx < 0) return;
            if (idx >= deletedIndex && idx < deletedIndex + safeDeleteCount) return;
            const newIdx = idx >= deletedIndex + safeDeleteCount ? idx - safeDeleteCount : idx;
            nextFavorites[newIdx] = state.paragraphMeta.favorites[k];
        });
        Object.keys(state.paragraphMeta.comments || {}).forEach((k) => {
            const idx = Number(k);
            if (!Number.isFinite(idx) || idx < 0) return;
            if (idx >= deletedIndex && idx < deletedIndex + safeDeleteCount) return;
            const newIdx = idx >= deletedIndex + safeDeleteCount ? idx - safeDeleteCount : idx;
            nextComments[newIdx] = state.paragraphMeta.comments[k];
        });
        state.paragraphMeta = { favorites: nextFavorites, comments: nextComments };
    }

    const PARAGRAPH_READONLY_ACTIONS = new Set(['copy']);
    const PARAGRAPH_MARK_ENABLED = false;
    const PARAGRAPH_GESTURE_BLOCK_SELECTOR = 'button, textarea, img, video';
    const PARAGRAPH_GESTURE_CONFIG = Object.freeze({
        holdTriggerMs: 1000,
        moveCancelPx: 10,
        tapTolerancePx: 12,
        doubleTapWindowMs: 330,
    });
    // 手势动作映射集中配置：后续改交互策略时只改映射，不改手势状态机分支。
    const PARAGRAPH_GESTURE_ACTION_MAP = Object.freeze({
        doubleTap: null,
        longPress: 'copy',
    });

    // 手势权限矩阵：复制与收藏始终可用，删除与批注通过手势专用流程触发。
    function isParagraphActionAllowed(action) {
        if (!action) {
            return false;
        }
        return PARAGRAPH_READONLY_ACTIONS.has(action);
    }

    function isParagraphGestureTargetBlocked(target) {
        return !!(target && target.closest && target.closest(PARAGRAPH_GESTURE_BLOCK_SELECTOR));
    }

    function canHandleParagraphSwipeGesture(absX, absY) {
        return !!(absX >= 72 && absX > absY * 1.2);
    }

    function isParagraphTouchScrolling() {
        if (state.touchScrollActive) {
            return true;
        }
        const lastMoveAt = Number(state.touchScrollLastMoveAt) || 0;
        return lastMoveAt > 0 && (Date.now() - lastMoveAt) <= 220;
    }

    function resolveGestureParagraphIndex(eventTarget) {
        const target = resolveGestureParagraphTarget(eventTarget);
        if (!target) {
            return -1;
        }
        return target.index;
    }

    function resolveGestureParagraphTarget(eventTarget) {
        if (!eventTarget || !eventTarget.closest) {
            return null;
        }
        const card = eventTarget.closest('.paragraph-card[data-p-index]');
        if (card) {
            const index = Number(card.getAttribute('data-p-index'));
            if (Number.isFinite(index) && index >= 0) {
                return {
                    index,
                    lineSpan: 1,
                    source: 'line',
                };
            }
        }

        const lineNode = eventTarget.closest('[data-line]');
        if (!lineNode) {
            return null;
        }
        const startLine = Number(lineNode.getAttribute('data-line'));
        if (!Number.isFinite(startLine) || startLine <= 0) {
            return null;
        }
        let endLine = Number(lineNode.getAttribute('data-line-end'));
        if (!Number.isFinite(endLine) || endLine < startLine) {
            endLine = startLine;
        }
        ensureParagraphEditorState();
        const index = startLine - 1;
        if (index < 0 || index >= state.paragraphBlocks.length) {
            return null;
        }
        const maxSpan = Math.max(1, state.paragraphBlocks.length - index);
        const spanByLineRange = Math.max(1, Math.floor(endLine - startLine + 1));
        return {
            index,
            lineSpan: Math.min(maxSpan, spanByLineRange),
            source: 'semantic',
        };
    }

    function getParagraphCardByIndex(index) {
        if (!Number.isFinite(index) || index < 0) {
            return null;
        }
        const card = document.querySelector(`.paragraph-card[data-p-index="${index}"]`);
        if (card) {
            return card;
        }
        const markdownBody = document.getElementById('markdownBody');
        if (!markdownBody) {
            return null;
        }
        const line = String(index + 1);
        const candidates = Array.from(markdownBody.querySelectorAll(`[data-line="${line}"]`));
        if (!candidates.length) {
            return null;
        }
        return candidates.find((node) => node.matches && node.matches('p, li, blockquote, h1, h2, h3, h4, h5, h6, pre'))
            || candidates[0];
    }

    function clearParagraphHoldCue(gesture) {
        if (!gesture || !gesture.holdCard) {
            return;
        }
        gesture.holdCard.classList.remove('touch-hold-cue');
    }

    function triggerParagraphHoldActivated(card) {
        if (!card) {
            return;
        }
        card.classList.remove('touch-hold-cue');
        card.classList.remove('touch-hold-activated');
        // 强制重排，确保重复长按时动画能够重播。
        void card.offsetWidth;
        card.classList.add('touch-hold-activated');
        const clear = () => card.classList.remove('touch-hold-activated');
        card.addEventListener('animationend', clear, { once: true });
        setTimeout(clear, 460);
    }

    function fallbackCopyText(text) {
        const ta = document.createElement('textarea');
        ta.value = text;
        ta.setAttribute('readonly', 'readonly');
        ta.style.position = 'fixed';
        ta.style.top = '0';
        ta.style.left = '-9999px';
        ta.style.opacity = '0';
        document.body.appendChild(ta);
        try {
            ta.focus({ preventScroll: true });
        } catch (_error) {
            ta.focus();
        }
        ta.select();
        ta.setSelectionRange(0, ta.value.length);
        const ok = !!(document.execCommand && document.execCommand('copy'));
        ta.remove();
        return ok;
    }

    async function writeClipboardWithFallback(text) {
        let lastError = null;
        const hasAsyncClipboard = !!(
            window.isSecureContext
            && navigator.clipboard
            && typeof navigator.clipboard.writeText === 'function'
        );
        if (hasAsyncClipboard) {
            try {
                await navigator.clipboard.writeText(text);
                return;
            } catch (error) {
                lastError = error;
            }
        }
        if (fallbackCopyText(text)) {
            return;
        }
        throw lastError || new Error('浏览器拒绝写入剪贴板');
    }

    function resolveFavoriteFeedbackTarget(index) {
        if (!Number.isFinite(index) || index < 0) {
            return null;
        }
        const card = document.querySelector(`.paragraph-card[data-p-index="${index}"]`);
        if (card) {
            return card;
        }
        const markdownBody = document.getElementById('markdownBody');
        if (!markdownBody) {
            return null;
        }
        const line = String(index + 1);
        const candidates = Array.from(markdownBody.querySelectorAll(`[data-line="${line}"]`));
        if (!candidates.length) {
            return null;
        }
        return candidates.find((node) => node.matches && node.matches('p, li, blockquote, h1, h2, h3, h4, h5, h6'))
            || candidates[0];
    }

    function playFavoriteInlineFeedback(target) {
        if (!target) {
            return;
        }
        target.classList.remove('highlight-flash');
        void target.offsetWidth;
        target.classList.add('highlight-flash');
        setTimeout(() => {
            target.classList.remove('highlight-flash');
        }, 320);
    }

    function playFavoriteFeedback(index, added, options = {}) {
        const target = resolveFavoriteFeedbackTarget(index);
        playFavoriteInlineFeedback(target);

        // [STEVE-JOBS-STYLE] 标注交互增强
        // 1. 卡片微动效 (Scale Bounce)
        const card = getParagraphCardByIndex(index);
        if (card) {
            card.classList.remove('copy-active');
            void card.offsetWidth; // 强制重绘
            card.classList.add('copy-active');
            setTimeout(() => card.classList.remove('copy-active'), 200);
            if (card !== target) {
                playFavoriteInlineFeedback(card);
            }
        }

        // 2. 灵动 Tooltip 提示
        const vw = Math.max(0, window.innerWidth || 0);
        const vh = Math.max(0, window.innerHeight || 0);
        
        let x = Number(options.anchorX);
        let y = Number(options.anchorY);
        
        // 坐标兜底逻辑：手指 -> 元素中心 -> 屏幕中心
        if (!Number.isFinite(x) || !Number.isFinite(y)) {
            if (target && target.getBoundingClientRect) {
                const rect = target.getBoundingClientRect();
                x = rect.left + rect.width / 2;
                y = rect.top + rect.height / 2;
            } else {
                x = vw / 2;
                y = vh / 2;
            }
        }

        const tooltip = document.createElement('div');
        tooltip.className = 'copy-tooltip'; // 复用已有的胶囊样式
        tooltip.textContent = added ? '已标注' : '已取消';
        tooltip.style.left = `${x}px`;
        tooltip.style.top = `${y - 20}px`; // 默认上浮避免遮挡手指
        document.body.appendChild(tooltip);
        
        tooltip.addEventListener('animationend', () => tooltip.remove());
    }

    function applyFavoriteTagsToMarkdown(container) {
        if (!container) {
            return;
        }
        container.querySelectorAll('.md-favorite-line').forEach((node) => {
            node.classList.remove('md-favorite-line');
        });
        container.querySelectorAll('.inline-sticky-has-note').forEach((node) => {
            node.classList.remove('inline-sticky-has-note');
            node.removeAttribute('data-inline-sticky-count');
        });

        const favorites = state.paragraphMeta && state.paragraphMeta.favorites
            ? state.paragraphMeta.favorites
            : {};
        if (!PARAGRAPH_MARK_ENABLED) {
            if (Object.keys(favorites).length) {
                state.paragraphMeta.favorites = {};
                scheduleParagraphBackgroundSync({ metaChanged: true });
            }
            renderInlineStickyAnnotations(container);
            return;
        }
        Object.keys(favorites).forEach((rawIndex) => {
            if (!favorites[rawIndex]) {
                return;
            }
            const index = Number(rawIndex);
            if (!Number.isFinite(index) || index < 0) {
                return;
            }
            const line = String(index + 1);
            const candidates = Array.from(container.querySelectorAll(`[data-line="${line}"]`));
            if (!candidates.length) {
                return;
            }
            const target = candidates.find((node) => node.matches && node.matches('p, li, blockquote, h1, h2, h3, h4, h5, h6'))
                || candidates[0];
            target.classList.add('md-favorite-line');
        });
        const commentsMap = state.paragraphMeta && state.paragraphMeta.comments
            ? state.paragraphMeta.comments
            : {};
        Object.keys(commentsMap).forEach((rawIndex) => {
            const index = Number(rawIndex);
            if (!Number.isFinite(index) || index < 0) {
                return;
            }
            const comments = getParagraphComments(index);
            if (!comments.length) {
                return;
            }
            const line = String(index + 1);
            const candidates = Array.from(container.querySelectorAll(`[data-line="${line}"]`));
            if (!candidates.length) {
                return;
            }
            const target = candidates.find((node) => node.matches && node.matches('p, li, blockquote, h1, h2, h3, h4, h5, h6'))
                || candidates[0];
            target.classList.add('inline-sticky-has-note');
            target.setAttribute('data-inline-sticky-count', String(comments.length));
        });
        renderInlineStickyAnnotations(container);
    }

    async function copyParagraphText(index) {
        ensureParagraphEditorState();
        const block = state.paragraphBlocks[index];
        if (!block) return;
        const text = String(block.text || '');
        const card = getParagraphCardByIndex(index);
        const feedbackTarget = resolveFavoriteFeedbackTarget(index);

        try {
            await writeClipboardWithFallback(text);
            
            // [STEVE-JOBS-STYLE] 移除 alert，改用灵动提示与卡片微动效
            if (card) {
                card.classList.remove('copy-active');
                void card.offsetWidth; // 强制重绘触发重播
                card.classList.add('copy-active');
                setTimeout(() => card.classList.remove('copy-active'), 200);
            }

            const touch = state.touchGesture || {};
            const anchorX = Number.isFinite(touch.lastX) ? touch.lastX : (window.innerWidth / 2);
            const anchorY = Number.isFinite(touch.lastY) ? touch.lastY : (window.innerHeight / 2);
            
            // 如果没有触摸坐标（如双击），优先用元素中心
            let finalX = anchorX;
            let finalY = anchorY;
            if (!state.touchGesture && (card || feedbackTarget)) {
                const rect = (card || feedbackTarget).getBoundingClientRect();
                finalX = rect.left + rect.width / 2;
                finalY = rect.top + rect.height / 2;
            }

            const tooltip = document.createElement('div');
            tooltip.className = 'copy-tooltip';
            tooltip.textContent = '已复制';
            tooltip.style.left = `${finalX}px`;
            tooltip.style.top = `${finalY - 20}px`; // 默认上浮一点点，避免手指遮挡
            document.body.appendChild(tooltip);

            tooltip.addEventListener('animationend', () => tooltip.remove());
        } catch (error) {
            setTaskSummary(`复制失败：${normalizeErrorMessage(error, { fallback: '请稍后重试' })}`, 'error');
        }
    }

        paragraphMetaSaveQueue = paragraphMetaSaveQueue
            .catch(() => null)

            .catch((error) => {

    function getDownloadFilename(resp, fallback) {
        const disposition = resp.headers.get('content-disposition') || '';
        if (!disposition) {
            return fallback;
        }
        const utf8Match = disposition.match(/filename\*=UTF-8''([^;]+)/i);
        if (utf8Match && utf8Match[1]) {
            try {
                return decodeURIComponent(utf8Match[1]);
            } catch (_error) {
                return utf8Match[1];
            }
        }
        const plainMatch = disposition.match(/filename="?([^";]+)"?/i);
        if (plainMatch && plainMatch[1]) {
            return plainMatch[1];
        }
        return fallback;
    }

    async function pickExportWritableTarget(suggestedName) {
        if (typeof window.showSaveFilePicker !== 'function') {
            return { supported: false };
        }
        try {
            const handle = await window.showSaveFilePicker({
                suggestedName,
                types: [{
                    description: '离线包',
                    accept: { 'application/zip': ['.zip'] },
                }],
            });
            const writable = await handle.createWritable();
            return { supported: true, handle, writable };
        } catch (error) {
            if (error && error.name === 'AbortError') {
                return { supported: true, cancelled: true };
            }
            throw error;
        }
    }

    async function streamResponseToWritable(resp, writable, onProgress) {
        const total = Number(resp.headers.get('content-length')) || 0;
        const body = resp.body;
        if (!body || typeof body.getReader !== 'function') {
            const blob = await resp.blob();
            await writable.write(blob);
            await writable.close();
            onProgress(blob.size, total || blob.size);
            return { bytes: blob.size, total };
        }

        let received = 0;
        const reader = body.getReader();
        try {
            while (true) {
                const { done, value } = await reader.read();
                if (done) {
                    break;
                }
                if (!value || !value.byteLength) {
                    continue;
                }
                await writable.write(value);
                received += value.byteLength;
                onProgress(received, total);
            }
            await writable.close();
            return { bytes: received, total };
        } catch (error) {
            try {
                await writable.abort();
            } catch (_abortError) {
                // ignore abort errors
            }
            throw error;
        }
    }

    async function streamResponseToBlob(resp, onProgress) {
        const total = Number(resp.headers.get('content-length')) || 0;
        const body = resp.body;
        if (!body || typeof body.getReader !== 'function') {
            const blob = await resp.blob();
            onProgress(blob.size, total || blob.size);
            return { blob, bytes: blob.size, total };
        }

        const chunks = [];
        let received = 0;
        const reader = body.getReader();
        while (true) {
            const { done, value } = await reader.read();
            if (done) {
                break;
            }
            if (!value || !value.byteLength) {
                continue;
            }
            chunks.push(value);
            received += value.byteLength;
            onProgress(received, total);
        }
        const blob = new Blob(chunks, { type: 'application/zip' });
        return { blob, bytes: received || blob.size, total };
    }

    function triggerBrowserDownload(blob, filename) {
        const url = URL.createObjectURL(blob);
        try {
            const a = document.createElement('a');
            a.href = url;
            a.download = filename;
            document.body.appendChild(a);
            a.click();
            a.remove();
        } finally {
            URL.revokeObjectURL(url);
        }
    }

    async function parseJsonPayload(resp) {
        const text = await resp.text();
        if (!text) {
            return { payload: {}, rawText: '' };
        }
        const shouldUseWorker = (
            text.length >= 160 * 1024
            && !!jsonParseWorkerPool
            && typeof jsonParseWorkerPool.parse === 'function'
        );
        if (shouldUseWorker) {
            try {
                const payload = await jsonParseWorkerPool.parse(text);
                return { payload, rawText: text };
            } catch (_workerError) {
                // Worker 不可用或超时时回退主线程解析，优先保证功能可用。
            }
        }
        try {
            return { payload: JSON.parse(text), rawText: text };
        } catch (_error) {
            return { payload: {}, rawText: text };
        }
    }

    function normalizeExportJob(payload) {
        const raw = payload && typeof payload === 'object' ? payload : {};
        const statusRaw = String(raw.status || '').toLowerCase();
        const status = ['idle', 'running', 'success', 'error'].includes(statusRaw) ? statusRaw : 'idle';
        const percentRaw = Number(raw.percent);
        return {
            status,
            percent: Number.isFinite(percentRaw) ? Math.max(0, Math.min(100, percentRaw)) : null,
            message: raw.message ? String(raw.message) : '',
            downloadReady: !!raw.downloadReady,
            fileName: raw.fileName ? String(raw.fileName) : '',
            processedBytes: Number(raw.processedBytes) || 0,
            totalBytes: Number(raw.totalBytes) || 0,
            processedFiles: Number(raw.processedFiles) || 0,
            totalFiles: Number(raw.totalFiles) || 0,
            reused: !!raw.reused,
        };
    }

    async function requestExportPrepare(taskId) {
        const resp = await fetch(`${API_BASE}/tasks/${encodeURIComponent(taskId)}/export/prepare`, { method: 'POST' });
        const { payload, rawText } = await parseJsonPayload(resp);
        if (!resp.ok || payload.success === false) {
            throw new Error(payload.message || rawText || `HTTP ${resp.status}`);
        }
        return normalizeExportJob(payload);
    }

    async function requestExportStatus(taskId) {
        const resp = await fetch(`${API_BASE}/tasks/${encodeURIComponent(taskId)}/export/status`);
        const { payload, rawText } = await parseJsonPayload(resp);
        if (!resp.ok || payload.success === false) {
            throw new Error(payload.message || rawText || `HTTP ${resp.status}`);
        }
        return normalizeExportJob(payload);
    }

    function renderExportPrepareProgress(snapshot) {
        const hasPercent = Number.isFinite(snapshot.percent);
        const prefix = snapshot.message || UI_COPY.savePreparing;
        let detail = '';
        if (snapshot.totalFiles > 0) {
            detail = `（${snapshot.processedFiles}/${snapshot.totalFiles}）`;
        } else if (snapshot.totalBytes > 0) {
            detail = `（${formatBytes(snapshot.processedBytes)} / ${formatBytes(snapshot.totalBytes)}）`;
        }
        if (hasPercent) {
            setExportStatus('running', `${prefix} ${snapshot.percent.toFixed(1)}%${detail}`, { percent: snapshot.percent });
        } else {
            setExportStatus('running', `${prefix}${detail}`);
        }
    }

    async function waitUntilExportReady(taskId, firstSnapshot) {
        let snapshot = firstSnapshot;
        for (let attempt = 0; attempt < 600; attempt += 1) {
            if (snapshot) {
                if (snapshot.status === 'error') {
                    throw new Error(snapshot.message || UI_COPY.saveFailed);
                }
                if (snapshot.downloadReady || snapshot.status === 'success') {
                    return snapshot;
                }
                renderExportPrepareProgress(snapshot);
            }
            await new Promise((resolve) => setTimeout(resolve, 500));
            snapshot = await requestExportStatus(taskId);
        }
        throw new Error('导出准备超时，请稍后重试');
    }

    async function exportCurrentTaskZip() {
        if (!state.currentTaskId) {
            setTaskSummary(UI_COPY.openContentFirst, 'error');
            return;
        }
        if (state.exportInProgress) {
            setExportStatus('running', UI_COPY.saveBusy);
            return;
        }

        const fallback = `${String(state.currentTaskId).replace(/[:\\/]/g, '_')}_bundle.zip`;
        let pickerTarget = null;
        setExportStatus('running', UI_COPY.savePreparing);
        try {
            pickerTarget = await pickExportWritableTarget(fallback);
            if (pickerTarget && pickerTarget.cancelled) {
                setExportStatus('idle', UI_COPY.saveCanceled);
                return;
            }

            const prepared = await requestExportPrepare(state.currentTaskId);
            const readySnapshot = await waitUntilExportReady(state.currentTaskId, prepared);
            const resp = await fetch(`${API_BASE}/tasks/${encodeURIComponent(state.currentTaskId)}/export`);
            if (!resp.ok) {
                const { payload, rawText } = await parseJsonPayload(resp);
                throw new Error(payload.message || rawText || `HTTP ${resp.status}`);
            }

            const filename = readySnapshot.fileName || getDownloadFilename(resp, fallback) || fallback;
            const onProgress = (received, total) => {
                if (total > 0) {
                    const percent = Math.min(100, (received / total) * 100);
                    setExportStatus(
                        'running',
                        `正在下载导出包：${formatBytes(received)} / ${formatBytes(total)} (${percent.toFixed(1)}%)`,
                        { percent }
                    );
                    return;
                }
                setExportStatus('running', `正在下载导出包：${formatBytes(received)}（总大小未知）`);
            };

            if (pickerTarget && pickerTarget.writable) {
                const result = await streamResponseToWritable(resp, pickerTarget.writable, onProgress);
                setExportStatus(
                    'success',
                    `${UI_COPY.saveDone}：${filename}（${formatBytes(result.bytes)}）。后端已缓存，可重复下载。`,
                    { percent: 100 }
                );
                return;
            }

            const result = await streamResponseToBlob(resp, onProgress);
            triggerBrowserDownload(result.blob, filename);
            setExportStatus(
                'success',
                `${UI_COPY.saveDone}：${filename}（${formatBytes(result.bytes)}）。后端已缓存，可重复下载。`,
                { percent: 100 }
            );
        } catch (error) {
            if (pickerTarget && pickerTarget.writable) {
                try {
                    await pickerTarget.writable.abort();
                } catch (_abortError) {
                    // ignore abort errors
                }
            }
            setExportStatus('error', `${UI_COPY.saveFailed}：${normalizeErrorMessage(error, { fallback: '请稍后重试' })}`);
            throw error;
        } finally {
            if (state.exportState === 'running') {
                setExportStatus('idle', UI_COPY.saveHint);
            } else {
                setExportButtonsDisabled(false);
                state.exportInProgress = false;
            }
        }
    }

    function bindTaskPullToRefresh() {
        const taskView = document.getElementById('viewLibrary');
        const indicator = document.getElementById('taskPullIndicator');
        if (!taskView || !indicator) return;
        if (taskView.dataset.pullRefreshBound === '1') return;
        taskView.dataset.pullRefreshBound = '1';

        let gesture = null;
        let refreshing = false;

        const resetIndicator = (withAnimation) => {
            if (withAnimation) {
                indicator.classList.remove('dragging');
            } else {
                indicator.classList.add('dragging');
            }
            indicator.classList.remove('visible', 'ready', 'refreshing');
            indicator.style.height = '0px';
        };

        const updateIndicator = (pullDistance, options = {}) => {
            const distance = Math.max(0, Math.min(TASK_PULL_REFRESH_MAX_PX, Number(pullDistance) || 0));
            const dragging = !!options.dragging;
            const ready = !!options.ready;
            const isRefreshing = !!options.refreshing;
            indicator.classList.toggle('dragging', dragging);
            indicator.classList.toggle('visible', distance > 0 || isRefreshing);
            indicator.classList.toggle('ready', ready && !isRefreshing);
            indicator.classList.toggle('refreshing', isRefreshing);
            indicator.style.height = `${Math.round(distance)}px`;
        };

        const clearGesture = () => {
            gesture = null;
        };

        const shouldSkipTarget = (target) => {
            if (!target || !target.closest) return false;
            return !!target.closest('input, textarea, select, button, a, video, .inline-sticky-note, .submit-source-shell');
        };

        taskView.addEventListener('touchstart', (event) => {
            if (state.currentView !== 'tasks' || refreshing) {
                clearGesture();
                return;
            }
            if (!event.touches || event.touches.length !== 1) {
                clearGesture();
                return;
            }
            if (taskView.scrollTop > 0) {
                clearGesture();
                return;
            }
            const touch = event.touches[0];
            // 给左边缘返回手势留出热区，避免“想返回却触发刷新”的冲突。
            if (!touch || touch.clientX <= (EDGE_BACK_MOTION.hotZonePx + 6)) {
                clearGesture();
                return;
            }
            if (shouldSkipTarget(event.target)) {
                clearGesture();
                return;
            }
            gesture = {
                startX: touch.clientX,
                startY: touch.clientY,
                active: false,
                pullDistance: 0,
            };
        }, { passive: true });

        taskView.addEventListener('touchmove', (event) => {
            if (!gesture || refreshing) return;
            if (!event.touches || event.touches.length !== 1) return;
            const touch = event.touches[0];
            if (!touch) return;

            const dx = touch.clientX - gesture.startX;
            const dy = touch.clientY - gesture.startY;
            if (!gesture.active) {
                if (dy <= 0) return;
                if (Math.abs(dy) < Math.abs(dx) * 1.08) return;
                gesture.active = true;
            }
            if (!gesture.active) return;
            if (taskView.scrollTop > 0) {
                clearGesture();
                resetIndicator(true);
                return;
            }

            // 用阻尼曲线压缩位移：手感更接近原生，下拉足够明显但不会把布局拉得过大。
            const resistedPull = Math.pow(Math.max(0, dy), 0.92);
            const pullDistance = Math.min(TASK_PULL_REFRESH_MAX_PX, resistedPull * 0.74);
            if (pullDistance <= 0) return;
            gesture.pullDistance = pullDistance;
            const ready = pullDistance >= TASK_PULL_REFRESH_TRIGGER_PX;
            updateIndicator(pullDistance, { dragging: true, ready });
            event.preventDefault();
        }, { passive: false });

        const finishPullGesture = async (cancelled) => {
            if (!gesture) return;
            const shouldOpenComposer = !cancelled
                && gesture.active
                && gesture.pullDistance >= TASK_PULL_COMPOSER_TRIGGER_PX
                && !state.taskComposerExpanded
                && !refreshing;
            const shouldRefresh = !cancelled
                && gesture.active
                && gesture.pullDistance >= TASK_PULL_REFRESH_TRIGGER_PX
                && !refreshing;
            clearGesture();
            if (shouldOpenComposer) {
                resetIndicator(true);
                openTaskComposer({
                    focusInput: true,
                    pulse: true,
                    scrollIntoView: false,
                });
                setTaskSubmitTip(UI_COPY.composerIdleTip);
                return;
            }
            if (!shouldRefresh) {
                resetIndicator(true);
                return;
            }

            refreshing = true;
            updateIndicator(TASK_PULL_REFRESH_SETTLE_PX, { dragging: false, refreshing: true });
            const ok = await requestTaskListManualRefresh();
            await new Promise((resolve) => setTimeout(resolve, ok ? 220 : 320));
            refreshing = false;
            resetIndicator(true);
        };

        taskView.addEventListener('touchend', () => {
            finishPullGesture(false).catch((error) => {
                console.warn('下拉刷新失败', error);
                refreshing = false;
                resetIndicator(true);
            });
        }, { passive: true });
        taskView.addEventListener('touchcancel', () => {
            finishPullGesture(true).catch(() => {

            };
            taskComposerCard.addEventListener('touchstart', (event) => {
                if (state.currentView !== 'tasks' || !state.taskComposerExpanded) {
                    return;

                if (!event.touches || event.touches.length !== 1) {
                    return;
                }
                const touch = event.touches[0];
                composerSwipe = {
                    startX: touch.clientX,
                    startY: touch.clientY,
                    currentX: touch.clientX,
                    currentY: touch.clientY,
                    active: false,
                };
            }, { passive: true });
            taskComposerCard.addEventListener('touchmove', (event) => {
                if (!composerSwipe || !event.touches || event.touches.length !== 1) {
                    return;
                }
                const touch = event.touches[0];
                composerSwipe.currentX = touch.clientX;
                composerSwipe.currentY = touch.clientY;
                const dx = composerSwipe.currentX - composerSwipe.startX;
                const dy = composerSwipe.currentY - composerSwipe.startY;
                if (!composerSwipe.active) {
                    // 仅在“以上滑为主”的手势里激活收起，避免与输入区左右操作冲突。
                    if (dy >= -8 || Math.abs(dy) < Math.abs(dx) * 1.15) {
                        return;
                    }
                    composerSwipe.active = true;
                    taskComposerCard.classList.add('is-swiping');

                const upDistance = Math.max(0, Math.min(86, composerSwipe.startY - composerSwipe.currentY));
                taskComposerCard.style.setProperty('--composer-swipe-y', `${upDistance.toFixed(1)}px`);
                if (event.cancelable) {

                if (!composerSwipe) {

                const dx = composerSwipe.currentX - composerSwipe.startX;
                const upDistance = composerSwipe.startY - composerSwipe.currentY;
                const shouldClose = composerSwipe.active
                    && upDistance >= 56
                    && upDistance > Math.abs(dx) * 1.1;
                resetComposerSwipe();

    async function bootstrap() {
        const shareTargetPayload = (PWA_SHARE_TARGET && typeof PWA_SHARE_TARGET.consumeShareTargetPayloadFromUrl === 'function')
            ? PWA_SHARE_TARGET.consumeShareTargetPayloadFromUrl()
            : null;
        if (READER_TYPOGRAPHY && typeof READER_TYPOGRAPHY.applyDefaults === 'function') {

            });

        bindEvents();
