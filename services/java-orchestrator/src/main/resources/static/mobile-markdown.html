    function applyObsidianHighlightSyntax(markdown) {
        const lines = String(markdown || '').split(/\r?\n/);
        let inFence = false;
        let fenceChar = '';
        let fenceLen = 0;

        const transformed = lines.map((line) => {
            const fenceMatch = line.match(/^\s*(`{3,}|~{3,})/);
            if (fenceMatch) {
                const marker = fenceMatch[1];
                const markerChar = marker.charAt(0);
                const markerLen = marker.length;
                if (!inFence) {
                    inFence = true;
                    fenceChar = markerChar;
                    fenceLen = markerLen;
                } else if (markerChar === fenceChar && markerLen >= fenceLen) {
                    inFence = false;
                }
                return line;
            }
            if (inFence) {
                return line;
            }
            return line.replace(/==([^=\n][^=\n]*?)==/g, '<mark>$1</mark>');
        });
        return transformed.join('\n');
    }

    function transformObsidianSyntax(markdown, taskId) {
        let out = String(markdown || '');

        // Obsidian Callout 语法降级为可读 blockquote 标签，保证移动端可识别上下文。
        out = out.replace(/^>\s*\[!([A-Za-z]+)\][+-]?\s*(.*)$/gm, (_m, type, title) => {
            const t = String(type || 'NOTE').toUpperCase();
            const text = (title || '').trim();
            return `> **${t}** ${text}`;
        });

        // 处理 ![[...]] embed：图片/视频直接内嵌，其他资源转为可点击链接。
        out = out.replace(/!\[\[([^\]]+)\]\]/g, (_m, inner) => {
            const raw = String(inner || '').trim();
            const parts = raw.split('|');
            const path = (parts[0] || '').trim();
            const alias = (parts[1] || '').trim();
            if (!path) return _m;
            if (isImagePath(path)) {
                return `![](${buildAssetUrl(taskId, path)})`;
            }
            if (isVideoPath(path)) {
                return `<video controls playsinline preload="metadata" src="${buildAssetUrl(taskId, path)}"></video>`;
            }
            if (isMarkdownPath(path)) {
                const label = alias || path;
                return `[${label}](obsidian-note:${encodeURIComponent(path)})`;
            }
            const label = alias || path;
            return `[${label}](${buildAssetUrl(taskId, path)})`;
        });

        // 处理 [[...]] wikilink：优先视作同任务内笔记链接，否则当作资源链接。
        out = out.replace(/(^|[^!])\[\[([^\]]+)\]\]/g, (_m, prefix, inner) => {
            const raw = String(inner || '').trim();
            const parts = raw.split('|');
            let path = (parts[0] || '').trim();
            const alias = (parts[1] || '').trim();
            if (!path) return _m;
            const label = alias || path;
            if (!getExt(path)) {
                path = `${path}.md`;
            }
            if (isMarkdownPath(path)) {
                return `${prefix}[${label}](obsidian-note:${encodeURIComponent(path)})`;
            }
            return `${prefix}[${label}](${buildAssetUrl(taskId, path)})`;
        });

        out = applyObsidianHighlightSyntax(out);
        return out;
    }

    // 给宽内容（例如表格）添加局部横向滚动容器，避免撑破页面。
    function wrapWideContentBlocks(container) {
        if (!container) {
            return;
        }
        const tables = container.querySelectorAll('table');
        tables.forEach((table) => {
            const parent = table.parentElement;
            if (!parent || parent.classList.contains('md-table-scroll')) {
                return;
            }
            const wrapper = document.createElement('div');
            wrapper.className = 'md-table-scroll';
            parent.insertBefore(wrapper, table);
            wrapper.appendChild(table);
        });
    }

    // 解析 fenced code 语言标记（仅取首个语言 token），用于高亮与 UI 标签。
    function normalizeCodeLanguage(rawInfo) {
        const info = String(rawInfo || '').trim().toLowerCase();
        if (!info) return '';
        return info.split(/\s+/)[0];
    }

    // 基于 highlight.js 渲染代码块；若不可用则安全降级为纯文本。
    function renderHighlightedFence(token) {
        const language = normalizeCodeLanguage(token && token.info);
        const source = token && typeof token.content === 'string' ? token.content : '';
        const lineAttr = token && typeof token.attrGet === 'function' ? token.attrGet('data-line') : '';
        const lineFragment = lineAttr ? ` data-line="${escapeHtml(lineAttr)}"` : '';
        const languageClass = language ? ` language-${escapeHtml(language)}` : '';
        const languageTag = language ? ` data-lang="${escapeHtml(language)}"` : '';
        const hljs = window.hljs;

        let highlighted = '';
        if (hljs && typeof hljs.highlight === 'function') {
            try {
                if (language && (!hljs.getLanguage || hljs.getLanguage(language))) {
                    highlighted = hljs.highlight(source, { language, ignoreIllegals: true }).value;
                } else if (typeof hljs.highlightAuto === 'function') {
                    highlighted = hljs.highlightAuto(source).value;
                }
            } catch (error) {
                console.warn('[mobile-markdown] 代码高亮失败，降级为纯文本渲染', error);
                highlighted = '';
            }
        }

        if (!highlighted) {
            highlighted = escapeHtml(source);
        }
        return `<pre${lineFragment}${languageTag}><code class="hljs${languageClass}">${highlighted}</code></pre>`;
    }

    function getMarkdownEngine(taskId) {
        if (!window.markdownit) {
            return null;
        }
        const md = window.markdownit({
            html: true,
            linkify: true,
            breaks: true,
        });
        const defaultRenderToken = md.renderer.renderToken.bind(md.renderer);
        md.renderer.renderToken = function(tokens, idx, options) {
            const token = tokens[idx];
            if (
                token
                && token.nesting === 1
                && Array.isArray(token.map)
                && token.map.length > 0
                && !token.attrGet('data-line')
            ) {
                const startLine = Number(token.map[0]);
                if (Number.isFinite(startLine) && startLine >= 0) {
                    token.attrSet('data-line', String(startLine + 1));
                }
            }
            return defaultRenderToken(tokens, idx, options);
        };
        if (window.markdownitKatex) {
            try {
                md.use(window.markdownitKatex, {
                    throwOnError: false,
                    errorColor: '#cc0000',
                });
            } catch (error) {
                console.warn('KaTeX 插件初始化失败，降级为普通文本渲染', error);
            }
        }

        const defaultImageRule = md.renderer.rules.image ||
            function(tokens, idx, options, env, self) { return self.renderToken(tokens, idx, options); };
        md.renderer.rules.image = function(tokens, idx, options, env, self) {
            const token = tokens[idx];
            const src = token.attrGet('src');
            if (src && !isAbsoluteUrl(src)) {
                token.attrSet('src', buildAssetUrl(taskId, src));
            }
            token.attrSet('loading', 'lazy');
            token.attrSet('decoding', 'async');
            return defaultImageRule(tokens, idx, options, env, self);
        };

        const defaultLinkOpenRule = md.renderer.rules.link_open ||
            function(tokens, idx, options, env, self) { return self.renderToken(tokens, idx, options); };
        md.renderer.rules.link_open = function(tokens, idx, options, env, self) {
            const token = tokens[idx];
            const href = token.attrGet('href');
            if (href && href.startsWith('obsidian-note:')) {
                const notePath = decodeURIComponent(href.substring('obsidian-note:'.length));
                token.attrSet('href', '#');
                token.attrSet('data-note-path', notePath);
                token.attrSet('class', 'internal-note-link');
            } else if (href && !isAbsoluteUrl(href)) {
                token.attrSet('data-original-href', href);
                token.attrSet('href', buildAssetUrl(taskId, href));
            }
            return defaultLinkOpenRule(tokens, idx, options, env, self);
        };

        const defaultFenceRule = md.renderer.rules.fence ||
            function(tokens, idx, options, env, self) { return self.renderToken(tokens, idx, options); };
        md.renderer.rules.fence = function(tokens, idx, options, env, self) {
            const token = tokens[idx];
            if (Array.isArray(token.map) && token.map.length > 0 && !token.attrGet('data-line')) {
                const startLine = Number(token.map[0]);
                if (Number.isFinite(startLine) && startLine >= 0) {
                    token.attrSet('data-line', String(startLine + 1));
                }
            }
            const info = normalizeCodeLanguage(token.info);
            if (info === 'mermaid') {
                const lineAttr = token.attrGet('data-line');
                const lineFragment = lineAttr ? ` data-line="${escapeHtml(lineAttr)}"` : '';
                return `<div class="mermaid"${lineFragment}>${token.content}</div>`;
            }
            if (token) {
                return renderHighlightedFence(token);
            }
            return defaultFenceRule(tokens, idx, options, env, self);
        };

        return md;
    }

    async function fetchWithTimeout(url, options = {}, timeoutMs = 12000) {
        const controller = new AbortController();
        const timerId = setTimeout(() => controller.abort(), timeoutMs);
        try {
            return await fetch(url, { ...options, signal: controller.signal });
        } catch (error) {
            if (error && error.name === 'AbortError') {
                throw new Error(`请求超时（${Math.round(timeoutMs / 1000)}秒）`);
            }
            throw error;
        } finally {
            clearTimeout(timerId);
        }
    }

    async function fetchTasks() {
        const resp = await fetchWithTimeout(`${API_BASE}/tasks`, {}, 12000);
        if (!resp.ok) {
            throw new Error(`获取内容列表失败: HTTP ${resp.status}`);
        }
        state.tasks = await resp.json();
        return state.tasks;
    }

    function normalizeTaskLifecycleStatus(status) {
        return String(status || '').trim().toLowerCase();
    }

    function getTaskStatusVisual(status) {
        const normalized = normalizeTaskLifecycleStatus(status);
        if (normalized === 'completed') return 'completed';
        if (normalized === 'processing') return 'processing';
        if (normalized === 'failed') return 'failed';
        if (normalized === 'cancelled') return 'cancelled';
        return 'queued';
    }

    function inferTaskProgressPercent(task) {
        const raw = Number(task && task.progress);
        if (Number.isFinite(raw) && raw >= 0) {
            const normalized = raw <= 1 ? raw * 100 : raw;
            return Math.max(0, Math.min(100, normalized));
        }
        const visual = getTaskStatusVisual(task && task.status);
        if (visual === 'completed') return 100;
        if (visual === 'processing') return 62;
        if (visual === 'failed' || visual === 'cancelled') return 100;
        return 12;
    }

    function findTaskById(taskId) {
        const normalizedTaskId = String(taskId || '').trim();
        if (!normalizedTaskId) return null;
        return (state.tasks || []).find((task) => String(task && task.taskId || '') === normalizedTaskId) || null;
    }

    function isTaskInProgress(task) {
        const normalized = normalizeTaskLifecycleStatus(task && task.status);
        return (
            normalized === 'queued'
            || normalized === 'processing'
            || normalized === 'pending'
            || normalized === 'running'
            || normalized === 'submitted'
            || normalized === 'in_progress'
        );
    }

    function findSingleInProgressTask(tasks) {
        const list = Array.isArray(tasks) ? tasks : [];
        const normalized = list.filter((task) => !!(task && task.taskId));
        if (normalized.length !== 1) {
            return null;
        }
        return isTaskInProgress(normalized[0]) ? normalized[0] : null;
    }

    function compactTaskId(taskIdRaw) {
        const id = String(taskIdRaw || '');
        if (id.length <= 10) return id || 'N/A';
        return `${id.slice(0, 4)}…${id.slice(-4)}`;
    }

    function formatTaskCardTime(isoText) {
        if (!isoText) return '';
        const date = new Date(isoText);
        if (Number.isNaN(date.getTime())) return '';
        return date.toLocaleTimeString([], { hour: '2-digit', minute: '2-digit' });
    }

    function resolveTaskSourceKind(task) {
        const raw = String(
            (task && (task.videoUrl || task.source || task.platform || task.inputType || '')) || ''
        ).toLowerCase();
        if (!raw) return 'unknown';
        if (raw.includes('bilibili') || raw.includes('/video/bv') || /bv[0-9a-z]{10}/i.test(raw)) {
            return 'bilibili';
        }
        if (raw.startsWith('http://') || raw.startsWith('https://')) {
            return 'link';
        }
        if (raw.includes('.') || raw.includes('\\') || raw.includes('/')) {
            return 'file';
        }
        return 'unknown';
    }

    function focusTaskComposerFromEmptyState() {
        pushView('tasks');

        const card = document.querySelector('#viewLibrary .submit-card');
        requestAnimationFrame(() => {

    function handleEmptyStateAction(action) {
        const normalized = String(action || '').trim();
        if (!normalized) return false;
        if (normalized === 'start-first-task') {
            focusTaskComposerFromEmptyState();
            return true;
        }
        if (normalized === 'open-task-list') {
            pushView('tasks');
            return true;
        }
        if (normalized === 'open-reading-view') {
            if (state.currentTaskId) {
                pushView('reading');
            } else {
                pushView('tasks');
            }
            return true;
        }
        return false;
    }

    function pruneTaskFxState(now = Date.now()) {
        const motion = getTaskMotionState();
        let changed = false;
        const nextEntryFx = {};
        Object.keys(motion.entryFxUntil || {}).forEach((taskId) => {
            const expiresAt = Number(motion.entryFxUntil[taskId]) || 0;
            if (expiresAt > now) {
                nextEntryFx[taskId] = expiresAt;
            } else {
                changed = true;
            }
        });
        if (Object.keys(nextEntryFx).length !== Object.keys(motion.entryFxUntil || {}).length) {
            changed = true;
        }
        motion.entryFxUntil = nextEntryFx;

        const nextCompletionFx = {};
        Object.keys(motion.completionFxUntil || {}).forEach((taskId) => {
            const expiresAt = Number(motion.completionFxUntil[taskId]) || 0;
            if (expiresAt > now) {
                nextCompletionFx[taskId] = expiresAt;
            } else {
                changed = true;
            }
        });
        if (Object.keys(nextCompletionFx).length !== Object.keys(motion.completionFxUntil || {}).length) {
            changed = true;
        }
        motion.completionFxUntil = nextCompletionFx;

        const nextProcessingFx = {};
        Object.keys(motion.processingFxUntil || {}).forEach((taskId) => {
            const expiresAt = Number(motion.processingFxUntil[taskId]) || 0;
            if (expiresAt > now) {
                nextProcessingFx[taskId] = expiresAt;
            } else {
                changed = true;
            }
        });
        if (Object.keys(nextProcessingFx).length !== Object.keys(motion.processingFxUntil || {}).length) {
            changed = true;
        }
        motion.processingFxUntil = nextProcessingFx;

        const prevLen = (state.taskExitItems || []).length;
        state.taskExitItems = (state.taskExitItems || []).filter((item) => (Number(item.fxUntil) || 0) > now);
        if (state.taskExitItems.length !== prevLen) {
            changed = true;
        }
        return changed;
    }

    function scheduleTaskFxCleanup() {
        const motion = getTaskMotionState();
        if (motion.fxTimerId) {
            clearTimeout(motion.fxTimerId);
            motion.fxTimerId = 0;
        }
        const now = Date.now();
        let nearest = Infinity;
        Object.keys(motion.entryFxUntil || {}).forEach((taskId) => {
            const expiresAt = Number(motion.entryFxUntil[taskId]) || 0;
            if (expiresAt > now) {
                nearest = Math.min(nearest, expiresAt);
            }
        });
        Object.keys(motion.completionFxUntil || {}).forEach((taskId) => {
            const expiresAt = Number(motion.completionFxUntil[taskId]) || 0;
            if (expiresAt > now) {
                nearest = Math.min(nearest, expiresAt);
            }
        });
        Object.keys(motion.processingFxUntil || {}).forEach((taskId) => {
            const expiresAt = Number(motion.processingFxUntil[taskId]) || 0;
            if (expiresAt > now) {
                nearest = Math.min(nearest, expiresAt);
            }
        });
        (state.taskExitItems || []).forEach((item) => {
            const expiresAt = Number(item.fxUntil) || 0;
            if (expiresAt > now) {
                nearest = Math.min(nearest, expiresAt);
            }
        });
        if (!Number.isFinite(nearest)) {
            return;
        }
        const delay = Math.max(
            TASK_MOTION_CONFIG.cleanupMinDelayMs,
            Math.round(nearest - now) + TASK_MOTION_CONFIG.cleanupPaddingMs
        );
        motion.fxTimerId = setTimeout(() => {
            getTaskMotionState().fxTimerId = 0;
            const changed = pruneTaskFxState();
            if (changed) {
                renderTaskList();
            }
            scheduleTaskFxCleanup();
        }, delay);
    }

    // 任务列表动效决策链：识别“新入场 / 刚进入处理中 / 刚完成 / 刚消失”的任务，给出对应微交互反馈。
    function applyTaskListMotionDiff(previousTasks, nextTasks) {
        const now = Date.now();
        const prevList = Array.isArray(previousTasks) ? previousTasks : [];
        const nextList = Array.isArray(nextTasks) ? nextTasks : [];
        const nextIdSet = new Set(nextList.map((task) => String(task && task.taskId || '')));
        const prevById = new Map(prevList.map((task) => [String(task && task.taskId || ''), task]));
        const shouldAnimateNewRows = !!state.taskListHydrated;

        state.taskExitItems = (state.taskExitItems || []).filter((item) => !nextIdSet.has(String(item.taskId || '')));

        nextList.forEach((task) => {
            const taskId = String(task && task.taskId || '');
            if (!taskId) return;
            const previous = prevById.get(taskId);
            if (!previous) {
                if (shouldAnimateNewRows) {
                    setTaskMotionExpiry('entry', taskId, now + TASK_MOTION_CONFIG.entryFxMs);
                }
                return;
            }
            const prevStatus = normalizeTaskLifecycleStatus(previous.status);
            const nextStatus = normalizeTaskLifecycleStatus(task.status);
            if (prevStatus !== 'processing' && nextStatus === 'processing') {
                setTaskMotionExpiry('processing', taskId, now + TASK_MOTION_CONFIG.processingFxMs);
            }
            if (prevStatus !== 'completed' && nextStatus === 'completed') {
                setTaskMotionExpiry('completion', taskId, now + TASK_MOTION_CONFIG.completionFxMs);
            }
        });

        prevList.forEach((task, index) => {
            const taskId = String(task && task.taskId || '');
            if (!taskId || nextIdSet.has(taskId)) return;
            const exists = (state.taskExitItems || []).some((item) => item.taskId === taskId);
            if (exists) return;
            state.taskExitItems.push({
                taskId,
                title: task.title || taskId,
                status: task.status || 'COMPLETED',
                markdownAvailable: !!task.markdownAvailable,
                createdAt: task.createdAt || null,
                exitOrder: index + 0.35,
                fxUntil: now + TASK_MOTION_CONFIG.exitFxMs,
            });
            setTaskMotionExpiry('completion', taskId, now + TASK_MOTION_CONFIG.exitFxMs, { maxOnly: true });
        });

        state.taskListHydrated = true;
        pruneTaskFxState(now);
        scheduleTaskFxCleanup();
    }

    function resolveTaskItemMotionClasses(taskIdRaw, statusVisual, options = {}) {
        const classes = ['task-item'];
        if (!options.exiting && taskIdRaw === state.currentTaskId) {
            classes.push('active');
        }
        const entryFxUntil = getTaskMotionExpiry('entry', taskIdRaw);
        if (!options.exiting && entryFxUntil > Date.now()) {
            classes.push('fx-enter');
        }
        const processingFxUntil = getTaskMotionExpiry('processing', taskIdRaw);
        if (!options.exiting && statusVisual === 'processing' && processingFxUntil > Date.now()) {
            classes.push('fx-start-processing');
        }
        const completionFxUntil = getTaskMotionExpiry('completion', taskIdRaw);
        if (options.forceCompletionFx || completionFxUntil > Date.now()) {
            classes.push('fx-complete');
        }
        if (options.exiting) {
            classes.push('fx-exit');
        }
        return classes;
    }

    function buildTaskItemHtml(task, options = {}) {
        const taskIdRaw = String(task && task.taskId || '');
        const taskId = escapeHtml(taskIdRaw);
        const taskTitle = escapeHtml(String(task && (task.title || taskIdRaw) || taskIdRaw || '未命名任务'));
        const statusTextRaw = String(task && task.status || 'UNKNOWN');
        const statusVisual = getTaskStatusVisual(statusTextRaw);
        const progressPct = inferTaskProgressPercent(task).toFixed(1);
        const sourceKind = resolveTaskSourceKind(task);
        const sourceIcon = buildTaskSourceIconSvg(sourceKind);
        const compactId = escapeHtml(compactTaskId(taskIdRaw));
        const compactTime = escapeHtml(formatTaskCardTime(task && task.createdAt));
        const metaQuiet = compactTime ? `${compactId} · ${compactTime}` : compactId;

        const classes = resolveTaskItemMotionClasses(taskIdRaw, statusVisual, options);

        const taskIdAttr = options.exiting ? '' : `data-task-id="${taskId}"`;
        const disabledAttr = options.exiting ? 'disabled tabindex="-1" aria-hidden="true"' : '';
        return `
            <button class="${classes.join(' ')}" ${taskIdAttr} ${disabledAttr}>
                <div class="task-main-row">
                    <div class="task-title">${taskTitle}</div>
                    <span class="task-status-dot status-${statusVisual}" aria-label="${escapeHtml(statusTextRaw)}"></span>
                </div>
                <div class="task-progress-track status-${statusVisual}" aria-hidden="true">
                    <span class="task-progress-fill" style="width:${progressPct}%"></span>
                </div>
                <div class="task-quiet-row">
                    <span class="task-source-chip" aria-hidden="true">${sourceIcon}</span>
                    <span class="task-meta-quiet">${metaQuiet}</span>
                </div>
            </button>
        `;
    }

    async function reloadTaskList(options = {}) {
        if (state.taskListReloading) {
            return false;
        }
        state.taskListReloading = true;
        const loadingText = String(options.loadingText || '正在加载内容...');
        const showLoading = !options || options.showLoading !== false;
        const previousTasks = Array.isArray(state.tasks) ? state.tasks.map((task) => ({ ...task })) : [];
        let cancelLoadingHint = null;
        if (showLoading) {
            cancelLoadingHint = createDelayedTaskListLoadingHint(loadingText, {
                delayMs: TASK_LIST_LOADING_HINT_DELAY_MS,
                showLoadingPanelWhenEmpty: true,
            });
        }
        try {
            await retryAsync(() => fetchTasks(), 1);
            applyTaskListMotionDiff(previousTasks, state.tasks || []);
            renderTaskList();
            setTaskSummary('');
            return true;
        } catch (error) {
            const msg = normalizeErrorMessage(error);
            setTaskSummary(`内容加载失败：${msg}`, 'error');
            renderTaskListError(`内容加载失败：${msg}`, { withRetry: true });
            throw error;
        } finally {
            if (cancelLoadingHint) {
                cancelLoadingHint();
            }
            state.taskListReloading = false;
        }
    }

    // 任务列表刷新策略模块：
    // 把触发条件、轮询节奏、失败退避、可见性恢复收敛到一个入口，避免逻辑散落在事件绑定中。
    function createTaskListRefreshPolicy(options = {}) {
        const baseIntervalMs = Number(options.baseIntervalMs) > 0
            ? Number(options.baseIntervalMs)
            : TASK_LIST_AUTO_REFRESH_MS;
        const maxBackoffMs = Number(options.maxBackoffMs) > baseIntervalMs
            ? Number(options.maxBackoffMs)
            : (baseIntervalMs * 8);
        const viewEnterMinGapMs = Number(options.viewEnterMinGapMs) > 0
            ? Number(options.viewEnterMinGapMs)
            : 1200;
        const resumeMinGapMs = Number(options.resumeMinGapMs) > 0
            ? Number(options.resumeMinGapMs)
            : 3500;

        let timerId = 0;
        let stopped = false;
        let consecutiveFailures = 0;
        let lastAttemptAt = 0;

        function clearTimer() {
            if (!timerId) return;
            clearTimeout(timerId);
            timerId = 0;
        }

        function isAutoRefreshEligible() {
            return state.currentView === 'tasks' && !document.hidden;
        }

        function computeNextDelayMs() {
            const factor = Math.pow(2, Math.min(consecutiveFailures, 4));
            return Math.min(maxBackoffMs, Math.round(baseIntervalMs * factor));
        }

        function scheduleNext() {
            if (stopped) return;
            clearTimer();
            const delay = computeNextDelayMs();
            timerId = setTimeout(async () => {
                timerId = 0;
                if (!isAutoRefreshEligible()) {
                    renderTaskSummarySnapshot();
                    scheduleNext();
                    return;
                }
                await refresh('auto', {
                    showLoading: false,
                    minGapMs: Math.round(baseIntervalMs * 0.25),
                });
            }, delay);
        }

        async function refresh(source, options = {}) {
            const force = !!options.force;
            const showLoading = !!options.showLoading;
            const loadingText = options.loadingText || '正在加载内容...';
            const minGapMs = Number(options.minGapMs) > 0 ? Number(options.minGapMs) : 0;
            const throwOnError = !!options.throwOnError;

            if (!force && !isAutoRefreshEligible()) {
                scheduleNext();
                return false;
            }
            const now = Date.now();
            if (!force && minGapMs > 0 && (now - lastAttemptAt) < minGapMs) {
                scheduleNext();
                return false;
            }

            lastAttemptAt = now;
            try {
                await reloadTaskList({ showLoading, loadingText });
                consecutiveFailures = 0;
                return true;
            } catch (error) {
                consecutiveFailures = Math.min(consecutiveFailures + 1, 6);
                if (throwOnError) {
                    throw error;
                }
                console.warn(`任务列表刷新失败(${source})`, error);
                return false;
            } finally {
                scheduleNext();
            }
        }

        return {
            start() {
                stopped = false;
                scheduleNext();
            },
            stop() {
                stopped = true;
                clearTimer();
            },
            onVisibilityChange() {
                if (document.hidden) {
                    scheduleNext();
                    return;
                }
                refresh('resume', {
                    showLoading: false,
                    minGapMs: resumeMinGapMs,
                });
            },
            onViewChange(nextView, previousView) {
                if (nextView === 'tasks' && nextView !== previousView) {
                    refresh('view-enter', {
                        showLoading: false,
                        minGapMs: viewEnterMinGapMs,
                    });
                    return;
                }
                if (nextView !== 'tasks') {
                    renderTaskSummarySnapshot();
                }
            },
            async requestManualRefresh() {
                return refresh('manual', {
                    force: true,
                    showLoading: true,
                    loadingText: '正在刷新内容...',
                    throwOnError: true,
                });
            },
            async requestRetryRefresh() {
                return refresh('retry', {
                    force: true,
                    showLoading: true,
                    loadingText: '正在重试加载内容...',
                    throwOnError: true,
                });
            },
        };
    }

    const taskListRefreshPolicy = createTaskListRefreshPolicy({
        baseIntervalMs: TASK_LIST_AUTO_REFRESH_MS,
        maxBackoffMs: TASK_LIST_AUTO_REFRESH_MS * 8,
    });

    async function parseSubmitResponse(response) {
        const rawBody = await response.text();
        let result = {};
        try {
            result = rawBody ? JSON.parse(rawBody) : {};
        } catch (_parseError) {
            result = {};
        }
        if (!response.ok || !result.success) {
            const isBusyStatus = isBusyResponseStatus(response.status);
            const message = isBusyStatus
                ? USER_BUSY_MESSAGE
                : (result.message || `HTTP ${response.status}`);
            throw new Error(message);
        }
        return result;
    }

    async function submitTaskFromMobileForm(options = {}) {
        const urlInput = document.getElementById('mobileVideoUrl');
        const fileInput = document.getElementById('mobileVideoFile');
        const submitBtn = document.getElementById('mobileSubmitBtn');

        const rawInput = urlInput ? String(urlInput.value || '').trim() : '';
        const normalizedVideoUrl = normalizeTaskVideoInput(rawInput);
        const selectedVideoFile = fileInput && fileInput.files && fileInput.files.length > 0 ? fileInput.files[0] : null;

        if (!selectedVideoFile && !normalizedVideoUrl) {
            if (!options.silentIfEmpty) {
                setTaskSubmitTip(UI_COPY.composerInputRequired, 'error');
                alert(UI_COPY.composerInputRequired);
            }
            return false;
        }

        if (submitBtn) submitBtn.disabled = true;
        setTaskSubmitTip(selectedVideoFile ? COMPOSER_COPY.uploadingTip : COMPOSER_COPY.checkingTip);

        try {
            let response;
            if (selectedVideoFile) {
                const formData = new FormData();
                formData.append('videoFile', selectedVideoFile);
                formData.append('userId', MOBILE_USER_ID);
                formData.append('outputDir', './output');
                response = await fetch(`${TASK_API_BASE}/tasks/upload`, {
                    method: 'POST',
                    body: formData,
                });
            } else {
                response = await fetch(`${TASK_API_BASE}/tasks/submit`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({
                        userId: MOBILE_USER_ID,
                        videoUrl: normalizedVideoUrl,
                        outputDir: './output',
                    }),
                });
            }

            await parseSubmitResponse(response);
            setTaskSubmitTip(COMPOSER_COPY.queuedTip, 'success');

            if (urlInput) {
                urlInput.value = '';
            }
            if (fileInput) {
                fileInput.value = '';
            }

            await reloadTaskList({ showLoading: false });
            const autoOpened = await autoEnterSingleInProgressTask();
            if (!autoOpened) {
                pushView('tasks');
            }
            return true;
        } catch (error) {
            const msg = normalizeErrorMessage(error, { fallback: USER_BUSY_MESSAGE });
            setTaskSubmitTip(COMPOSER_COPY.errorTip, 'error');
            alert(`提交失败：${msg}`);
            return false;
        } finally {
            if (submitBtn) submitBtn.disabled = false;
        }
    }

    function renderTaskList() {
        const taskList = document.getElementById('taskList');
        if (!taskList) return;
        pruneTaskFxState();

        const tasks = state.tasks || [];
        const markdownTasks = tasks.filter(t => t.markdownAvailable);
        setTaskHeaderMeta(tasks.length, markdownTasks.length);
        if (!state.taskListReloading) {
            setTaskSummary('');
        }
        const exitingItems = (state.taskExitItems || []).slice().sort((a, b) => (a.exitOrder || 0) - (b.exitOrder || 0));

        if (!tasks.length && !exitingItems.length) {
            const emptyHtml = buildTaskListEmptyStateHtml();
            if (!crossFadeTaskListFromLoading(taskList, emptyHtml)) {
                commitTaskListHtml(taskList, emptyHtml);
            }
            return;
        }

        const rows = [];
        tasks.forEach((task, index) => {
            rows.push({
                order: index,
                html: buildTaskItemHtml(task),
            });
        });
        exitingItems.forEach((task) => {
            rows.push({
                order: Number(task.exitOrder) || (tasks.length + 0.5),
                html: buildTaskItemHtml(task, { exiting: true, forceCompletionFx: true }),
            });
        });
        rows.sort((a, b) => a.order - b.order);
        const html = rows.map((row) => row.html).join('');
        if (!crossFadeTaskListFromLoading(taskList, html)) {
            commitTaskListHtml(taskList, html);
        }
        scheduleTaskFxCleanup();
    }

    // 统一处理后端返回的 Markdown 载荷，确保标题策略可控且一致。
    function applyMarkdownPayloadToState(payload, options = {}) {
        const data = payload && typeof payload === 'object' ? payload : {};
        const keepExistingTitle = !!(options && options.keepExistingTitle);
        const fallbackTitle = (options && options.fallbackTitle) ? String(options.fallbackTitle) : '';
        state.currentMarkdownPath = data.markdownPath || null;

        state.currentMarkdownRaw = data.markdown || '';

        const resp = await fetch(url);
        if (!resp.ok) {
            const text = await resp.text();
            throw new Error(text || `HTTP ${resp.status}`);
        }
        return resp.json();
    }

        const task = findTaskById(taskId);

        if (task && !forceMarkdownRequest && isTaskInProgress(task) && !task.markdownAvailable) {

    function enhanceVideoLinks(container) {
        const links = Array.from(container.querySelectorAll('a[href]'));
        links.forEach(link => {
            const href = link.getAttribute('href') || '';
            const originalHref = link.getAttribute('data-original-href') || href;
            if (!originalHref || !isVideoPath(originalHref)) return;
            if (link.dataset.previewBound === '1') return;
            link.dataset.previewBound = '1';
            const video = document.createElement('video');
            video.controls = true;
            video.playsInline = true;
            video.preload = 'metadata';
            video.poster = DEFAULT_VIDEO_POSTER;
            video.src = href;
            link.insertAdjacentElement('afterend', video);
        });
    }

    function bindInternalNoteLinks(container, taskId) {
        container.querySelectorAll('a.internal-note-link[data-note-path]').forEach(link => {
            link.addEventListener('click', async (event) => {
                event.preventDefault();
                const notePath = link.getAttribute('data-note-path');

                try {

    function renderMarkdownFragment(markdownText, taskId) {
        const transformed = transformObsidianSyntax(String(markdownText || ''), taskId);
        const engine = getMarkdownEngine(taskId);
        let html = '';
        if (!engine) {
            html = `<pre>${String(transformed).replace(/</g, '&lt;')}</pre>`;
        } else {
            html = engine.render(transformed);
        }
        if (window.DOMPurify) {
            html = window.DOMPurify.sanitize(html, {
                ADD_TAGS: ['video', 'source'],
                ADD_ATTR: ['controls', 'playsinline', 'preload', 'src', 'class', 'data-note-path', 'data-original-href', 'data-line', 'loading', 'decoding', 'poster', 'alt'],
            });
        }
        return html;
    }

    function buildFallbackAltFromSrc(src) {
        const raw = String(src || '');
        if (!raw) return '图片';
        const clean = raw.split('?')[0].split('#')[0];
        const base = clean.split('/').filter(Boolean).pop() || '';
        if (!base) return '图片';
        try {
            return decodeURIComponent(base);
        } catch (_error) {
            return base;
        }
    }

    function applyNativeMediaOptimizations(container) {
        if (!container) return;
        container.querySelectorAll('img').forEach((img) => {
            img.setAttribute('loading', 'lazy');
            img.setAttribute('decoding', 'async');
            const currentAlt = (img.getAttribute('alt') || '').trim();
            if (!currentAlt) {
                img.setAttribute('alt', buildFallbackAltFromSrc(img.getAttribute('src')));
            }
        });
        container.querySelectorAll('iframe').forEach((frame) => {
            frame.setAttribute('loading', 'lazy');
        });
        container.querySelectorAll('video').forEach((video) => {
            if (!video.getAttribute('poster')) {
                video.setAttribute('poster', DEFAULT_VIDEO_POSTER);
            }
        });
    }

        const withMedia = !!(options && options.withMedia);
        const withLinks = !!(options && options.withLinks);
        const withMermaid = !!(options && options.withMermaid);
        const withOutline = options && Object.prototype.hasOwnProperty.call(options, 'withOutline')
            ? !!options.withOutline
            : true;
        wrapWideContentBlocks(container);
        applyNativeMediaOptimizations(container);
        if (withLinks && taskId) {
            bindInternalNoteLinks(container, taskId);

        if (withMedia) {
            enhanceVideoLinks(container);
            bindMediaLongPress(container);

        if (withOutline) {

        if (withMermaid) {

    function buildParagraphPreviewHtml(markdownText) {
        const raw = String(markdownText || '');
        if (!raw) {

    function normalizeParagraphComments(raw) {
        if (Array.isArray(raw)) {
            return raw.map((item) => String(item || '').trim()).filter(Boolean);
        }
        if (typeof raw === 'string') {
            const trimmed = raw.trim();
            return trimmed ? [trimmed] : [];
        }
        return [];
    }

    function getParagraphComments(index) {
        const all = state.paragraphMeta && state.paragraphMeta.comments ? state.paragraphMeta.comments : {};
        return normalizeParagraphComments(all[index]);
    }

    function setParagraphComments(index, comments) {
        const normalized = normalizeParagraphComments(comments);
        if (!state.paragraphMeta.comments) {
            state.paragraphMeta.comments = {};
        }
        if (!normalized.length) {
            delete state.paragraphMeta.comments[index];
            return;
        }
        state.paragraphMeta.comments[index] = normalized;
    }

    function normalizeCommentUnitsByLine(values) {
        const units = [];
        (values || []).forEach((value) => {
            String(value || '')
                .split(/\r?\n/)
                .map((line) => line.trim())
                .filter(Boolean)
                .forEach((line) => units.push(line));
        });
        return units;
    }

    async function deleteLineAtIndex(index, options) {
        const opts = options || {};
        if (!Number.isFinite(index) || index < 0 || index >= state.paragraphBlocks.length) {

        if (opts.confirmDelete && !confirm(UI_COPY.confirmDeleteLine)) {

    function deriveFilenameFromUrl(url, fallbackBase) {
        try {
            const parsed = new URL(url, window.location.origin);
            const pathHint = parsed.searchParams.get('path');
            if (pathHint) {
                const segment = decodeURIComponent(pathHint).split('/').filter(Boolean).pop();
                if (segment) return segment;
            }
            const pathname = parsed.pathname || '';
            const tail = pathname.split('/').filter(Boolean).pop();
            if (tail && tail.includes('.')) return tail;
        } catch (_error) {
            // 忽略 URL 解析异常，回退默认文件名。
        }
        const stamp = Date.now();
        return `${fallbackBase}_${stamp}.bin`;
    }

    async function saveMediaElementToLocal(mediaEl) {
        const src = mediaEl && (mediaEl.currentSrc || mediaEl.src);
        if (!src) {
            alert('未找到可保存的媒体链接');
            return;
        }
        const isVideo = mediaEl.tagName && mediaEl.tagName.toLowerCase() === 'video';
        const fallbackBase = isVideo ? 'video_clip' : 'image_asset';
        const filename = deriveFilenameFromUrl(src, fallbackBase);

        const resp = await fetch(src);
        if (!resp.ok) {
            throw new Error(`HTTP ${resp.status}`);
        }
        const blob = await resp.blob();
        const blobUrl = URL.createObjectURL(blob);
        try {
            const a = document.createElement('a');
            a.href = blobUrl;
            a.download = filename;
            document.body.appendChild(a);
            a.click();
            a.remove();
        } finally {
            URL.revokeObjectURL(blobUrl);
        }
    }

    function bindMediaLongPress(container) {
        if (!container) return;
        const mediaNodes = container.querySelectorAll('img, video');
        mediaNodes.forEach((node) => {
            if (node.dataset.saveBound === '1') return;
            node.dataset.saveBound = '1';

            const clearTimer = () => {
                if (state.mediaPressTimer) {
                    clearTimeout(state.mediaPressTimer);
                    state.mediaPressTimer = null;
                }
            };

            node.addEventListener('touchstart', () => {
                clearTimer();
                state.mediaPressTimer = setTimeout(async () => {
                    state.mediaPressTimer = null;
                    const ok = confirm('是否保存该媒体到本地？');
                    if (!ok) return;
                    try {
                        await saveMediaElementToLocal(node);
                    } catch (error) {
                        alert(`${UI_COPY.saveFailed}：${normalizeErrorMessage(error, { fallback: '请稍后重试' })}`);
                    }
                }, 2000);
            }, { passive: true });
            node.addEventListener('touchmove', clearTimer, { passive: true });
            node.addEventListener('touchend', clearTimer, { passive: true });
            node.addEventListener('touchcancel', clearTimer, { passive: true });
            node.addEventListener('contextmenu', async (event) => {
                event.preventDefault();
                const ok = confirm('是否保存该媒体到本地？');
                if (!ok) return;
                try {
                    await saveMediaElementToLocal(node);
                } catch (error) {
                    alert(`${UI_COPY.saveFailed}：${normalizeErrorMessage(error, { fallback: '请稍后重试' })}`);
                }
            });
        });
    }

    function touchDistance(t1, t2) {
        const dx = t1.clientX - t2.clientX;
        const dy = t1.clientY - t2.clientY;
        return Math.sqrt(dx * dx + dy * dy);
    }

    function renderParagraphCardHtml(index) {
        const block = state.paragraphBlocks[index];
        if (!block) {
            return '';
        }
        const favorite = !!state.paragraphMeta.favorites[index];
        const comments = getParagraphComments(index);
        const commentCount = comments.length;
        const latestComment = commentCount ? comments[commentCount - 1] : '';
        const editing = state.paragraphEditingIndex === index;
        const previewHtml = block.text
            ? buildParagraphPreviewHtml(block.text)
            : '<span class="paragraph-line-empty">（空行）</span>';
        const favoriteTagHtml = favorite ? '<span class="paragraph-favorite-tag" aria-label="已收藏"></span>' : '';
        const noteHtml = latestComment
            ? `<div class="paragraph-note">最近批注：${escapeHtml(latestComment)}${commentCount > 1 ? `（共 ${commentCount} 条）` : ''}</div>`
            : '';

        if (editing) {
            return `
                <section class="paragraph-card editing" data-p-index="${index}">
                    <textarea class="paragraph-textarea" data-p-editor="${index}">${escapeHtml(state.paragraphDraftText)}</textarea>
                    ${noteHtml}
                </section>
            `;
        }
        return `
            <section class="paragraph-card" data-p-index="${index}">
                <div class="paragraph-preview">${previewHtml}${favoriteTagHtml}</div>
                ${noteHtml}
            </section>
        `;
    }

    function refreshParagraphCardDom(index) {
        if (!state.editMode || !Number.isFinite(index) || index < 0) {
            return false;
        }
        const current = document.querySelector(`.paragraph-card[data-p-index="${index}"]`);
        if (!current) {
            return false;
        }
        const nextHtml = renderParagraphCardHtml(index);
        if (!nextHtml) {
            return false;
        }
        const holder = document.createElement('div');
        holder.innerHTML = nextHtml.trim();
        const next = holder.firstElementChild;
        if (!next) {
            return false;
        }
        current.replaceWith(next);
        return true;
    }

    function refreshParagraphCardsDom(indexes) {
        const uniq = Array.from(new Set((indexes || []).filter((idx) => Number.isFinite(idx) && idx >= 0)));
        if (!uniq.length) {
            return true;
        }
        let allFound = true;
        uniq.forEach((idx) => {
            if (!refreshParagraphCardDom(idx)) {
                allFound = false;
            }
        });
        return allFound;
    }

    function resetParagraphVirtualState() {
        if (state.virtualScrollRafId) {
            cancelAnimationFrame(state.virtualScrollRafId);
            state.virtualScrollRafId = 0;
        }
        state.virtualListActive = false;
        state.virtualStart = -1;
        state.virtualEnd = -1;
        state.virtualTaskId = '';
        state.virtualHeightCache = {};
        state.virtualPrefixHeights = [];
        state.virtualPrefixDirtyFrom = 0;
        state.virtualTotalLines = 0;
        state.virtualScrollAdjusting = false;
    }

    function shouldUseParagraphVirtualList() {
        return !!(state.editMode && state.paragraphBlocks && state.paragraphBlocks.length >= 140);
    }

    function getVirtualLineHeight(index) {
        const cached = state.virtualHeightCache[index];
        if (Number.isFinite(cached) && cached > 20) {
            return cached;
        }
        return Math.max(64, Number(state.virtualAvgHeight) || 92);
    }

    function invalidateVirtualPrefix(fromIndex = 0) {
        const nextFrom = Math.max(0, Number(fromIndex) || 0);
        state.virtualPrefixDirtyFrom = Math.min(state.virtualPrefixDirtyFrom, nextFrom);
    }

    function ensureVirtualPrefix(total) {
        const safeTotal = Math.max(0, Number(total) || 0);
        if (!Array.isArray(state.virtualPrefixHeights) || state.virtualPrefixHeights.length !== safeTotal + 1 || state.virtualTotalLines !== safeTotal) {
            state.virtualPrefixHeights = new Array(safeTotal + 1).fill(0);
            state.virtualPrefixDirtyFrom = 0;
            state.virtualTotalLines = safeTotal;
        }
        let start = Math.max(0, Math.min(safeTotal, state.virtualPrefixDirtyFrom));
        if (start === 0) {
            state.virtualPrefixHeights[0] = 0;
        } else if (!Number.isFinite(state.virtualPrefixHeights[start])) {
            start = 0;
            state.virtualPrefixHeights[0] = 0;
        }
        for (let i = start; i < safeTotal; i += 1) {
            state.virtualPrefixHeights[i + 1] = state.virtualPrefixHeights[i] + getVirtualLineHeight(i);
        }
        state.virtualPrefixDirtyFrom = safeTotal;
        return state.virtualPrefixHeights;
    }

    function findVirtualIndexByOffset(offset, total) {
        const safeTotal = Math.max(0, Number(total) || 0);
        if (safeTotal <= 0) {
            return -1;
        }
        const prefix = ensureVirtualPrefix(safeTotal);
        const target = Math.max(0, Math.min(Number(offset) || 0, prefix[safeTotal]));
        let lo = 0;
        let hi = safeTotal;
        while (lo < hi) {
            const mid = Math.floor((lo + hi + 1) / 2);
            if (prefix[mid] <= target) {
                lo = mid;
            } else {
                hi = mid - 1;
            }
        }
        return Math.min(safeTotal - 1, Math.max(0, lo));
    }

    function setVirtualLineHeight(index, height) {
        if (!Number.isFinite(index) || index < 0) {
            return false;
        }
        const normalized = Math.max(44, Math.min(420, Number(height) || 0));
        if (!Number.isFinite(normalized) || normalized <= 0) {
            return false;
        }
        const previous = getVirtualLineHeight(index);
        if (Math.abs(previous - normalized) < 1) {
            return false;
        }
        state.virtualHeightCache[index] = normalized;
        invalidateVirtualPrefix(index);
        return true;
    }

    function buildVirtualWindowBounds(scrollTop, viewportHeight, total) {
        const safeTotal = Math.max(0, Number(total) || 0);
        if (safeTotal <= 0) {
            return { start: 0, end: -1, topOffset: 0, bottomOffset: 0 };
        }
        const overscan = 14;
        const firstVisible = findVirtualIndexByOffset(scrollTop, safeTotal);
        const lastVisible = findVirtualIndexByOffset(scrollTop + viewportHeight, safeTotal);
        const start = Math.max(0, firstVisible - overscan);
        const end = Math.min(safeTotal - 1, lastVisible + overscan);
        const prefix = ensureVirtualPrefix(safeTotal);
        return {
            start,
            end,
            topOffset: prefix[start],
            bottomOffset: Math.max(0, prefix[safeTotal] - prefix[end + 1]),
        };
    }

    function renderParagraphEditorVirtualWindow(taskId, force = false) {
        const container = document.getElementById('markdownBody');
        if (!container) {
            return;
        }
        const root = container.querySelector('#paragraphVirtualRoot');
        if (!root) {
            return;
        }
        const topSpacer = root.querySelector('#paragraphVirtualTop');
        const windowEl = root.querySelector('#paragraphVirtualWindow');
        const bottomSpacer = root.querySelector('#paragraphVirtualBottom');
        if (!topSpacer || !windowEl || !bottomSpacer) {
            return;
        }

        const total = state.paragraphBlocks.length;
        if (!total) {
            windowEl.innerHTML = '<div class="empty">当前文档没有可编辑内容</div>';
            topSpacer.style.height = '0px';
            bottomSpacer.style.height = '0px';
            state.virtualStart = -1;
            state.virtualEnd = -1;
            return;
        }

        const scrollTop = container.scrollTop;
        const viewportHeight = Math.max(1, container.clientHeight);
        const prefixBefore = ensureVirtualPrefix(total);
        const anchorIndex = findVirtualIndexByOffset(scrollTop, total);
        const anchorTopBefore = anchorIndex >= 0 ? prefixBefore[anchorIndex] : 0;
        const { start, end, topOffset, bottomOffset } = buildVirtualWindowBounds(scrollTop, viewportHeight, total);

        if (!force && start === state.virtualStart && end === state.virtualEnd && state.virtualTaskId === taskId) {
            topSpacer.style.height = `${Math.max(0, topOffset)}px`;
            bottomSpacer.style.height = `${Math.max(0, bottomOffset)}px`;
            return;
        }

        const cards = [];
        for (let i = start; i <= end; i += 1) {
            cards.push(renderParagraphCardHtml(i));
        }
        windowEl.innerHTML = cards.join('');
        topSpacer.style.height = `${Math.max(0, topOffset)}px`;
        bottomSpacer.style.height = `${Math.max(0, bottomOffset)}px`;
        state.virtualStart = start;
        state.virtualEnd = end;
        state.virtualTaskId = taskId || '';

        const renderedCards = windowEl.querySelectorAll('.paragraph-card');
        let measuredChanged = false;
        const allowMeasure = !isParagraphTouchScrolling();
        if (allowMeasure && renderedCards.length) {
            let totalHeight = 0;
            renderedCards.forEach((card) => {
                const measured = card.getBoundingClientRect().height;
                totalHeight += measured;
                const idx = Number(card.getAttribute('data-p-index'));
                if (setVirtualLineHeight(idx, measured)) {
                    measuredChanged = true;
                }
            });
            const nextAvg = totalHeight / renderedCards.length;
            if (Number.isFinite(nextAvg) && nextAvg > 20) {
                const nextBlended = Math.max(64, Math.min(260, (state.virtualAvgHeight * 0.8) + (nextAvg * 0.2)));
                if (Math.abs(nextBlended - state.virtualAvgHeight) >= 0.5) {
                    state.virtualAvgHeight = nextBlended;
                    invalidateVirtualPrefix(0);
                    measuredChanged = true;
                }
            }
        }

        if (measuredChanged) {
            const prefixAfter = ensureVirtualPrefix(total);
            const safeAnchor = anchorIndex >= 0 ? anchorIndex : 0;
            const anchorTopAfter = prefixAfter[safeAnchor];
            const correction = anchorTopAfter - anchorTopBefore;
            if (!isParagraphTouchScrolling() && Math.abs(correction) >= 0.5) {
                state.virtualScrollAdjusting = true;
                container.scrollTop = Math.max(0, container.scrollTop + correction);
                requestAnimationFrame(() => {
                    state.virtualScrollAdjusting = false;
                });
            }
            topSpacer.style.height = `${Math.max(0, prefixAfter[start])}px`;
            bottomSpacer.style.height = `${Math.max(0, prefixAfter[total] - prefixAfter[end + 1])}px`;
        }
    }

    function onParagraphVirtualScroll() {
        if (!state.editMode || !state.virtualListActive || state.virtualScrollRafId || state.virtualScrollAdjusting) {
            return;
        }
        state.virtualScrollRafId = requestAnimationFrame(() => {
            state.virtualScrollRafId = 0;
            renderParagraphEditorVirtualWindow(state.currentTaskId, false);
        });
    }

    function ensureParagraphVirtualScrollBinding() {
        const container = document.getElementById('markdownBody');
        if (!container) return;
        if (container.dataset.virtualScrollBound === '1') return;
        container.dataset.virtualScrollBound = '1';
        container.addEventListener('scroll', onParagraphVirtualScroll, { passive: true });
    }

    function applyDeleteDomPatch(deletedIndex) {
        if (state.virtualListActive) {
            return false;
        }
        if (!state.editMode || !Number.isFinite(deletedIndex) || deletedIndex < 0) {
            return false;
        }
        const list = document.querySelector('#markdownBody .paragraph-list');
        if (!list) {
            return false;
        }
        const removed = list.querySelector(`.paragraph-card[data-p-index="${deletedIndex}"]`);
        if (!removed) {
            return false;
        }
        removed.remove();

        const newLength = state.paragraphBlocks.length;
        for (let i = deletedIndex + 1; i <= newLength; i += 1) {
            const oldNode = list.querySelector(`.paragraph-card[data-p-index="${i}"]`);
            if (!oldNode) {
                continue;
            }
            oldNode.setAttribute('data-p-index', String(i - 1));
            oldNode.querySelectorAll('[data-p-index]').forEach((el) => {
                el.setAttribute('data-p-index', String(i - 1));
            });
            oldNode.querySelectorAll('[data-p-editor]').forEach((el) => {
                el.setAttribute('data-p-editor', String(i - 1));
            });
        }

        const reRenderIndexes = [];
        for (let i = deletedIndex; i < newLength; i += 1) {
            reRenderIndexes.push(i);
        }
        return refreshParagraphCardsDom(reRenderIndexes);
    }

    function renderParagraphEditor(taskId) {
        ensureParagraphEditorState();
        const container = document.getElementById('markdownBody');
        container.classList.add('edit-scroll-host');
        if (!state.paragraphBlocks.length) {
            resetParagraphVirtualState();
            container.innerHTML = '<div class="empty">当前文档没有可编辑内容</div>';
            buildOutline(container);
            teardownScrollSpy();
            return;
        }

        teardownScrollSpy();
        state.virtualListActive = shouldUseParagraphVirtualList();
        if (state.virtualListActive) {
            ensureParagraphVirtualScrollBinding();
            const shouldResetShell = !container.querySelector('#paragraphVirtualRoot') || state.virtualTaskId !== String(taskId || '');
            if (shouldResetShell) {
                state.virtualStart = -1;
                state.virtualEnd = -1;
                state.virtualTaskId = '';
                container.innerHTML = `
                    <div class="paragraph-virtual-root" id="paragraphVirtualRoot">
                        <div class="paragraph-virtual-spacer" id="paragraphVirtualTop"></div>
                        <div class="paragraph-list" id="paragraphVirtualWindow"></div>
                        <div class="paragraph-virtual-spacer" id="paragraphVirtualBottom"></div>
                    </div>
                `;
            }
            renderParagraphEditorVirtualWindow(taskId, true);
            return;
        }

        resetParagraphVirtualState();
        const cards = state.paragraphBlocks.map((_block, index) => renderParagraphCardHtml(index));

        container.innerHTML = `<div class="paragraph-list">${cards.join('')}</div>`;
        enhanceRenderedContent(container, taskId, {
            withMedia: false,
            withLinks: false,
            withMermaid: false,
            withOutline: false,
        });
    }

    function startParagraphEditing(index) {
        ensureParagraphEditorState();
        if (!Number.isFinite(index) || index < 0 || index >= state.paragraphBlocks.length) {
            return false;
        }
        const block = state.paragraphBlocks[index];
        if (!block) {
            return false;
        }
        const previousEditing = state.paragraphEditingIndex;
        state.paragraphEditingIndex = index;
        state.paragraphDraftText = String(block.text || '');
        if (!refreshParagraphCardsDom([previousEditing, index]) && state.currentTaskId) {
            renderParagraphEditor(state.currentTaskId);
        }
        return true;
    }

    function commitParagraphEditing(index, options = {}) {
        ensureParagraphEditorState();
        if (!Number.isFinite(index) || index < 0 || index >= state.paragraphBlocks.length) {
            return false;
        }
        const block = state.paragraphBlocks[index];
        if (!block) {
            return false;
        }
        const editor = document.querySelector(`[data-p-editor="${index}"]`);
        const fallbackText = state.paragraphEditingIndex === index ? state.paragraphDraftText : block.text;
        const nextText = editor ? editor.value : fallbackText;
        const normalizedNextText = String(nextText || '');
        const previousText = String(block.text || '');
        block.text = normalizedNextText;
        const changed = normalizedNextText !== previousText;
        if (changed) {
            syncCurrentMarkdownFromBlocks();
            scheduleParagraphBackgroundSync();
        }

        const previousEditing = state.paragraphEditingIndex;
        const leaveEditing = options.leaveEditing !== false;
        if (leaveEditing) {
            state.paragraphEditingIndex = -1;
            state.paragraphDraftText = '';
        } else {
            state.paragraphEditingIndex = index;
            state.paragraphDraftText = normalizedNextText;
        }
        if (options.refreshDom !== false) {
            if (!refreshParagraphCardsDom([previousEditing, index]) && state.currentTaskId) {
                renderParagraphEditor(state.currentTaskId);
            }
        }
        return changed;
    }

    function setEditMode(enabled) {
        const nextEditMode = !!enabled;
        if (!nextEditMode && state.editMode && state.paragraphEditingIndex >= 0) {
            commitParagraphEditing(state.paragraphEditingIndex, { leaveEditing: true, refreshDom: false });
        }
        state.editMode = nextEditMode;
        pushView('reading');
        const btn = document.getElementById('toggleEditModeBtn');
        if (btn) {
            setControlLabel(btn, state.editMode ? UI_COPY.actionExitAdjust : UI_COPY.actionAdjustLines);
            btn.classList.toggle('btn-primary', state.editMode);
        }
        if (state.editMode) {
            state.paragraphBlocks = splitMarkdownIntoParagraphBlocks(state.currentMarkdownRaw || '');
            state.paragraphEditingIndex = -1;
            state.paragraphDraftText = '';
            resetParagraphVirtualState();
        } else {
            state.paragraphEditingIndex = -1;
            state.paragraphDraftText = '';
            resetParagraphVirtualState();
            closeCommentModal();
        }
        refreshQuickActionLabels();
        renderCurrentView();
    }

    function renderCurrentView() {
        if (!state.currentTaskId) return;
        if (state.editMode) {
            renderParagraphEditor(state.currentTaskId);
        } else {
            renderMarkdown(state.currentMarkdownRaw || '', state.currentTaskId);
        }
    }

    async function persistParagraphBlocksAndRerender() {
        const markdown = joinParagraphBlocks(state.paragraphBlocks);
        const result = await saveMarkdownToServer(markdown);
        state.currentMarkdownRaw = markdown;
        if (result && result.markdownPath) {
            state.currentMarkdownPath = result.markdownPath;
        }
        if (result && result.baseDir) {
            state.currentMarkdownBaseDir = result.baseDir;
        }
        refreshViewerTitle();
        renderCurrentView();
    }

    function reindexParagraphMetaAfterDelete(deletedIndex) {
        const nextFavorites = {};
        const nextComments = {};
        Object.keys(state.paragraphMeta.favorites || {}).forEach((k) => {
            const idx = Number(k);
            if (!Number.isFinite(idx) || idx === deletedIndex) return;
            const newIdx = idx > deletedIndex ? idx - 1 : idx;
            nextFavorites[newIdx] = state.paragraphMeta.favorites[k];
        });
        Object.keys(state.paragraphMeta.comments || {}).forEach((k) => {
            const idx = Number(k);
            if (!Number.isFinite(idx) || idx === deletedIndex) return;
            const newIdx = idx > deletedIndex ? idx - 1 : idx;
            nextComments[newIdx] = state.paragraphMeta.comments[k];
        });
        state.paragraphMeta = { favorites: nextFavorites, comments: nextComments };
    }

    const PARAGRAPH_READONLY_ACTIONS = new Set(['copy', 'favorite']);
    const PARAGRAPH_GESTURE_BLOCK_SELECTOR = 'button, textarea, img, video';
    const PARAGRAPH_GESTURE_CONFIG = Object.freeze({
        holdTriggerMs: 560,
        moveCancelPx: 10,
        tapTolerancePx: 12,
        doubleTapWindowMs: 330,
    });

    // 手势权限矩阵：阅读态保留复制与收藏，编辑相关动作通过手势专用流程触发。
    function isParagraphActionAllowed(action) {
        if (!action) {
            return false;
        }
        return PARAGRAPH_READONLY_ACTIONS.has(action);
    }

    function isParagraphGestureTargetBlocked(target) {
        return !!(target && target.closest && target.closest(PARAGRAPH_GESTURE_BLOCK_SELECTOR));
    }

    function canHandleParagraphSwipeGesture(absX, absY) {
        return !!(state.editMode && absX >= 72 && absX > absY * 1.2);
    }

    function isParagraphTouchScrolling() {
        if (!state.editMode) {
            return false;
        }
        if (state.touchScrollActive) {
            return true;
        }
        const lastMoveAt = Number(state.touchScrollLastMoveAt) || 0;
        return lastMoveAt > 0 && (Date.now() - lastMoveAt) <= 220;
    }

    function resolveGestureParagraphIndex(eventTarget) {
        if (!eventTarget || !eventTarget.closest) {
            return -1;
        }
        const card = eventTarget.closest('.paragraph-card[data-p-index]');
        if (card) {
            const index = Number(card.getAttribute('data-p-index'));
            if (Number.isFinite(index) && index >= 0) {
                return index;
            }
        }

        const lineNode = eventTarget.closest('[data-line]');
        if (!lineNode) {
            return -1;
        }
        const line = Number(lineNode.getAttribute('data-line'));
        if (!Number.isFinite(line) || line <= 0) {
            return -1;
        }
        ensureParagraphEditorState();
        const index = line - 1;
        if (index < 0 || index >= state.paragraphBlocks.length) {
            return -1;
        }
        return index;
    }

    function getParagraphCardByIndex(index) {
        if (!Number.isFinite(index) || index < 0) {
            return null;
        }
        return document.querySelector(`.paragraph-card[data-p-index="${index}"]`);
    }

    function clearParagraphHoldCue(gesture) {
        if (!gesture || !gesture.holdCard) {
            return;
        }
        gesture.holdCard.classList.remove('touch-hold-cue');
    }

    function triggerParagraphHoldActivated(card) {
        if (!card) {
            return;
        }
        card.classList.remove('touch-hold-cue');
        card.classList.remove('touch-hold-activated');
        // 强制重排，确保重复长按时动画能够重播。
        void card.offsetWidth;
        card.classList.add('touch-hold-activated');
        const clear = () => card.classList.remove('touch-hold-activated');
        card.addEventListener('animationend', clear, { once: true });
        setTimeout(clear, 460);
    }

    function fallbackCopyText(text) {
        const ta = document.createElement('textarea');
        ta.value = text;
        ta.setAttribute('readonly', 'readonly');
        ta.style.position = 'fixed';
        ta.style.top = '0';
        ta.style.left = '-9999px';
        ta.style.opacity = '0';
        document.body.appendChild(ta);
        try {
            ta.focus({ preventScroll: true });
        } catch (_error) {
            ta.focus();
        }
        ta.select();
        ta.setSelectionRange(0, ta.value.length);
        const ok = !!(document.execCommand && document.execCommand('copy'));
        ta.remove();
        return ok;
    }

    async function writeClipboardWithFallback(text) {
        let lastError = null;
        const hasAsyncClipboard = !!(
            window.isSecureContext
            && navigator.clipboard
            && typeof navigator.clipboard.writeText === 'function'
        );
        if (hasAsyncClipboard) {
            try {
                await navigator.clipboard.writeText(text);
                return;
            } catch (error) {
                lastError = error;
            }
        }
        if (fallbackCopyText(text)) {
            return;
        }
        throw lastError || new Error('浏览器拒绝写入剪贴板');
    }

    function resolveFavoriteFeedbackTarget(index) {
        if (!Number.isFinite(index) || index < 0) {
            return null;
        }
        const card = document.querySelector(`.paragraph-card[data-p-index="${index}"]`);
        if (card) {
            return card;
        }
        const markdownBody = document.getElementById('markdownBody');
        if (!markdownBody) {
            return null;
        }
        const line = String(index + 1);
        const candidates = Array.from(markdownBody.querySelectorAll(`[data-line="${line}"]`));
        if (!candidates.length) {
            return null;
        }
        return candidates.find((node) => node.matches && node.matches('p, li, blockquote, h1, h2, h3, h4, h5, h6'))
            || candidates[0];
    }

    function playFavoriteInlineFeedback(target, added) {
        if (!target) {
            return;
        }
        target.classList.remove('favorite-feedback', 'favorite-feedback-off');
        void target.offsetWidth;
        target.classList.add(added ? 'favorite-feedback' : 'favorite-feedback-off');
        setTimeout(() => {
            target.classList.remove('favorite-feedback', 'favorite-feedback-off');
        }, 720);
    }

    function spawnFavoriteSpark(added, options = {}) {
        const body = document.body;
        if (!body) {
            return;
        }
        const spark = document.createElement('span');
        spark.className = `favorite-spark ${added ? 'is-on' : 'is-off'}`;
        spark.innerHTML = buildFavoriteSparkSvg();

        const vw = Math.max(0, window.innerWidth || document.documentElement.clientWidth || 0);
        const vh = Math.max(0, window.innerHeight || document.documentElement.clientHeight || 0);
        let x = Number(options.anchorX);
        let y = Number(options.anchorY);
        if (!Number.isFinite(x) || !Number.isFinite(y)) {
            const target = options.target || resolveFavoriteFeedbackTarget(options.index);
            if (target && target.getBoundingClientRect) {
                const rect = target.getBoundingClientRect();
                x = rect.left + Math.min(36, Math.max(18, rect.width * 0.28));
                y = rect.top + Math.min(22, Math.max(12, rect.height * 0.34));
            }
        }

    function getDownloadFilename(resp, fallback) {
        const disposition = resp.headers.get('content-disposition') || '';
        if (!disposition) {
            return fallback;
        }
        const utf8Match = disposition.match(/filename\*=UTF-8''([^;]+)/i);
        if (utf8Match && utf8Match[1]) {
            try {
                return decodeURIComponent(utf8Match[1]);
            } catch (_error) {
                return utf8Match[1];
            }
        }
        const plainMatch = disposition.match(/filename="?([^";]+)"?/i);
        if (plainMatch && plainMatch[1]) {
            return plainMatch[1];
        }
        return fallback;
    }

    async function pickExportWritableTarget(suggestedName) {
        if (typeof window.showSaveFilePicker !== 'function') {
            return { supported: false };
        }
        try {
            const handle = await window.showSaveFilePicker({
                suggestedName,
                types: [{
                    description: '离线包',
                    accept: { 'application/zip': ['.zip'] },
                }],
            });
            const writable = await handle.createWritable();
            return { supported: true, handle, writable };
        } catch (error) {
            if (error && error.name === 'AbortError') {
                return { supported: true, cancelled: true };
            }
            throw error;
        }
    }

    async function streamResponseToWritable(resp, writable, onProgress) {
        const total = Number(resp.headers.get('content-length')) || 0;
        const body = resp.body;
        if (!body || typeof body.getReader !== 'function') {
            const blob = await resp.blob();
            await writable.write(blob);
            await writable.close();
            onProgress(blob.size, total || blob.size);
            return { bytes: blob.size, total };
        }

        let received = 0;
        const reader = body.getReader();
        try {
            while (true) {
                const { done, value } = await reader.read();
                if (done) {
                    break;
                }
                if (!value || !value.byteLength) {
                    continue;
                }
                await writable.write(value);
                received += value.byteLength;
                onProgress(received, total);
            }
            await writable.close();
            return { bytes: received, total };
        } catch (error) {
            try {
                await writable.abort();
            } catch (_abortError) {
                // ignore abort errors
            }
            throw error;
        }
    }

    async function streamResponseToBlob(resp, onProgress) {
        const total = Number(resp.headers.get('content-length')) || 0;
        const body = resp.body;
        if (!body || typeof body.getReader !== 'function') {
            const blob = await resp.blob();
            onProgress(blob.size, total || blob.size);
            return { blob, bytes: blob.size, total };
        }

        const chunks = [];
        let received = 0;
        const reader = body.getReader();
        while (true) {
            const { done, value } = await reader.read();
            if (done) {
                break;
            }
            if (!value || !value.byteLength) {
                continue;
            }
            chunks.push(value);
            received += value.byteLength;
            onProgress(received, total);
        }
        const blob = new Blob(chunks, { type: 'application/zip' });
        return { blob, bytes: received || blob.size, total };
    }

    function triggerBrowserDownload(blob, filename) {
        const url = URL.createObjectURL(blob);
        try {
            const a = document.createElement('a');
            a.href = url;
            a.download = filename;
            document.body.appendChild(a);
            a.click();
            a.remove();
        } finally {
            URL.revokeObjectURL(url);
        }
    }

    async function exportCurrentTaskZip() {
        if (!state.currentTaskId) {
            alert(UI_COPY.openContentFirst);
            return;
        }
        if (state.exportInProgress) {
            setExportStatus('running', UI_COPY.saveBusy);
            return;
        }

        const fallback = `${String(state.currentTaskId).replace(/[:\\/]/g, '_')}_bundle.zip`;
        let pickerTarget = null;
        setExportStatus('running', UI_COPY.savePreparing);
        try {
            pickerTarget = await pickExportWritableTarget(fallback);
            if (pickerTarget && pickerTarget.cancelled) {
                setExportStatus('idle', UI_COPY.saveCanceled);
                return;
            }

            const resp = await fetch(`${API_BASE}/tasks/${encodeURIComponent(state.currentTaskId)}/export`);
            if (!resp.ok) {
                const text = await resp.text();
                throw new Error(text || `HTTP ${resp.status}`);
            }

            const filename = getDownloadFilename(resp, fallback);
            const onProgress = (received, total) => {
                if (total > 0) {
                    const percent = Math.min(100, (received / total) * 100);
                    setExportStatus(
                        'running',
                        `${UI_COPY.saveProgress}：${formatBytes(received)} / ${formatBytes(total)} (${percent.toFixed(1)}%)`,
                        { percent }
                    );
                    return;
                }
                setExportStatus('running', `${UI_COPY.saveProgress}：${formatBytes(received)}（总大小未知）`);
            };

            if (pickerTarget && pickerTarget.writable) {
                const result = await streamResponseToWritable(resp, pickerTarget.writable, onProgress);
                setExportStatus(
                    'success',
                    `${UI_COPY.saveDone}：${filename}（${formatBytes(result.bytes)}）。已保存到你刚刚选择的位置。`,
                    { percent: 100 }
                );
                return;
            }

            const result = await streamResponseToBlob(resp, onProgress);
            triggerBrowserDownload(result.blob, filename);
            setExportStatus(
                'success',
                `${UI_COPY.saveDone}：${filename}（${formatBytes(result.bytes)}）。保存位置由浏览器决定，请在下载列表查看。`,
                { percent: 100 }
            );
        } catch (error) {
            if (pickerTarget && pickerTarget.writable) {
                try {
                    await pickerTarget.writable.abort();
                } catch (_abortError) {
                    // ignore abort errors
                }
            }
            setExportStatus('error', `${UI_COPY.saveFailed}：${normalizeErrorMessage(error, { fallback: '请稍后重试' })}`);
            throw error;
        } finally {
            if (state.exportState === 'running') {
                setExportStatus('idle', UI_COPY.saveHint);
            } else {
                setExportButtonsDisabled(false);
                state.exportInProgress = false;
            }
        }
    }
