    function bindTaskPullToRefresh() {
        const taskView = document.getElementById('viewLibrary');
        const indicator = document.getElementById('taskPullIndicator');
        if (!taskView || !indicator) return;
        if (taskView.dataset.pullRefreshBound === '1') return;
        taskView.dataset.pullRefreshBound = '1';

        let gesture = null;
        let refreshing = false;

        const resetIndicator = (withAnimation) => {
            if (withAnimation) {
                indicator.classList.remove('dragging');
            } else {
                indicator.classList.add('dragging');
            }
            indicator.classList.remove('visible', 'ready', 'refreshing');
            indicator.style.height = '0px';
        };

        const updateIndicator = (pullDistance, options = {}) => {
            const distance = Math.max(0, Math.min(TASK_PULL_REFRESH_MAX_PX, Number(pullDistance) || 0));
            const dragging = !!options.dragging;
            const ready = !!options.ready;
            const isRefreshing = !!options.refreshing;
            indicator.classList.toggle('dragging', dragging);
            indicator.classList.toggle('visible', distance > 0 || isRefreshing);
            indicator.classList.toggle('ready', ready && !isRefreshing);
            indicator.classList.toggle('refreshing', isRefreshing);
            indicator.style.height = `${Math.round(distance)}px`;
        };

        const clearGesture = () => {
            gesture = null;
        };

        const shouldSkipTarget = (target) => {
            if (!target || !target.closest) return false;
            return !!target.closest('input, textarea, select, button, a, video, .comment-modal, .submit-source-shell');
        };

        taskView.addEventListener('touchstart', (event) => {
            if (state.currentView !== 'tasks' || refreshing) {
                clearGesture();
                return;
            }
            if (!event.touches || event.touches.length !== 1) {
                clearGesture();
                return;
            }
            if (taskView.scrollTop > 0) {
                clearGesture();
                return;
            }
            const touch = event.touches[0];
            // 给左边缘返回手势留出热区，避免“想返回却触发刷新”的冲突。
            if (!touch || touch.clientX <= (EDGE_BACK_MOTION.hotZonePx + 6)) {
                clearGesture();
                return;
            }
            if (shouldSkipTarget(event.target)) {
                clearGesture();
                return;
            }
            gesture = {
                startX: touch.clientX,
                startY: touch.clientY,
                active: false,
                pullDistance: 0,
            };
        }, { passive: true });

        taskView.addEventListener('touchmove', (event) => {
            if (!gesture || refreshing) return;
            if (!event.touches || event.touches.length !== 1) return;
            const touch = event.touches[0];
            if (!touch) return;

            const dx = touch.clientX - gesture.startX;
            const dy = touch.clientY - gesture.startY;
            if (!gesture.active) {
                if (dy <= 0) return;
                if (Math.abs(dy) < Math.abs(dx) * 1.08) return;
                gesture.active = true;
            }
            if (!gesture.active) return;
            if (taskView.scrollTop > 0) {
                clearGesture();
                resetIndicator(true);
                return;
            }

            // 用阻尼曲线压缩位移：手感更接近原生，下拉足够明显但不会把布局拉得过大。
            const resistedPull = Math.pow(Math.max(0, dy), 0.92);
            const pullDistance = Math.min(TASK_PULL_REFRESH_MAX_PX, resistedPull * 0.74);
            if (pullDistance <= 0) return;
            gesture.pullDistance = pullDistance;
            const ready = pullDistance >= TASK_PULL_REFRESH_TRIGGER_PX;
            updateIndicator(pullDistance, { dragging: true, ready });
            event.preventDefault();
        }, { passive: false });

        const finishPullGesture = async (cancelled) => {
            if (!gesture) return;
            const shouldRefresh = !cancelled
                && gesture.active
                && gesture.pullDistance >= TASK_PULL_REFRESH_TRIGGER_PX
                && !refreshing;
            clearGesture();
            if (!shouldRefresh) {
                resetIndicator(true);
                return;
            }

            refreshing = true;
            updateIndicator(TASK_PULL_REFRESH_SETTLE_PX, { dragging: false, refreshing: true });
            const ok = await requestTaskListManualRefresh();
            await new Promise((resolve) => setTimeout(resolve, ok ? 220 : 320));
            refreshing = false;
            resetIndicator(true);
        };

        taskView.addEventListener('touchend', () => {
            finishPullGesture(false).catch((error) => {
                console.warn('下拉刷新失败', error);
                refreshing = false;
                resetIndicator(true);
            });
        }, { passive: true });
        taskView.addEventListener('touchcancel', () => {
            finishPullGesture(true).catch(() => {
                refreshing = false;
                resetIndicator(true);
            });
        }, { passive: true });
    }

            if (emptyActionBtn) {
                event.preventDefault();
                handleEmptyStateAction(emptyActionBtn.getAttribute('data-empty-action'));
                return;
            }
            const retryBtn = event.target.closest('[data-task-action="retry-load"]');
            if (retryBtn) {
                try {
                    await taskListRefreshPolicy.requestRetryRefresh();
                } catch (_error) {
                    // 错误状态已由 reloadTaskList 渲染，不重复提示。
                }
                return;
            }
            const item = event.target.closest('[data-task-id]');
            if (!item) return;
            const taskId = item.getAttribute('data-task-id');
            if (!taskId) return;
            try {
                await openTaskForReading(taskId);
            } catch (error) {
                showError(`打开内容失败：${normalizeErrorMessage(error)}`);
            }
        });

        document.getElementById('outlineList').addEventListener('click', (event) => {
            const emptyActionBtn = event.target.closest('[data-empty-action]');
            if (emptyActionBtn) {
                event.preventDefault();
                handleEmptyStateAction(emptyActionBtn.getAttribute('data-empty-action'));
                return;
            }
            const link = event.target.closest('[data-target-id]');
            if (!link) return;
            const targetId = link.getAttribute('data-target-id');
            if (!targetId) return;
            const heading = document.getElementById(targetId);
            if (!heading) return;
            pushView('reading');
            requestAnimationFrame(() => {
                heading.scrollIntoView({ behavior: 'smooth', block: 'start' });
            });
            setActiveOutline(targetId);
        });

        document.getElementById('commentModalCloseBtn').addEventListener('click', () => {
            closeCommentModal();
        });

        const commentDialog = document.getElementById('commentDialog');
        if (commentDialog) {
            commentDialog.addEventListener('cancel', (event) => {
                event.preventDefault();
                closeCommentModal();
            });
            commentDialog.addEventListener('close', () => {
                if (!state.commentModalVisible) {
                    return;
                }
                state.commentModalVisible = false;
                state.commentModalParagraphIndex = -1;
                state.commentModalDrafts = [];
            });
        }

        document.getElementById('commentModalBody').addEventListener('input', (event) => {
            if (!event.target.closest('[data-c-editor]')) return;
            syncCommentDraftsFromDom();
        });

        document.getElementById('commentModalBody').addEventListener('click', (event) => {
            const delBtn = event.target.closest('[data-c-action="delete"]');
            if (!delBtn) return;
            const idx = Number(delBtn.getAttribute('data-c-idx'));
            if (!Number.isFinite(idx) || idx < 0) return;
            syncCommentDraftsFromDom();
            state.commentModalDrafts.splice(idx, 1);
            renderCommentModal();
        });

        document.getElementById('commentModalAddBtn').addEventListener('click', () => {
            syncCommentDraftsFromDom();
            state.commentModalDrafts.push('');
            renderCommentModal();
        });

        document.getElementById('commentModalSaveBtn').addEventListener('click', async () => {
            if (state.commentModalParagraphIndex < 0) {
                closeCommentModal();
                return;
            }
            const lineIndex = state.commentModalParagraphIndex;
            syncCommentDraftsFromDom();
            const normalized = normalizeCommentUnitsByLine(state.commentModalDrafts);
            setParagraphComments(lineIndex, normalized);
            closeCommentModal();
            if (state.editMode && state.currentTaskId) {
                if (!refreshParagraphCardDom(lineIndex)) {
                    renderParagraphEditor(state.currentTaskId);
                }
            }
            scheduleParagraphBackgroundSync();
        });

        document.getElementById('undoToastBtn').addEventListener('click', async () => {
            undoLastDelete();
        });

        bindMarkdownBodyInteractions();
    }

    async function bootstrap() {
        bindEvents();
        applyStaticUiCopy();
        bindPressFeedback();
        bindListScrollMotion();
        bindRootOverscrollGuard();
        bindEdgeBackNavigation();
        taskListRefreshPolicy.start();
        pushView(state.currentView);
        refreshQuickActionLabels();
        renderCommentModal();
        setSyncStatus('synced');
        setExportStatus('idle', UI_COPY.saveHint);
        try {
            const runtimeLibrariesPromise = ensureRuntimeLibraries();
            await reloadTaskList({
                showLoading: true,
                loadingText: '正在加载内容...',
            });
            const libResult = await runtimeLibrariesPromise;
            if (libResult && Array.isArray(libResult.missing) && libResult.missing.length > 0) {
                setTaskSubmitTip(`渲染库加载不完整（${libResult.missing.join('、')}），将自动降级显示。`, 'error');
            }
            const query = new URLSearchParams(window.location.search);
            const preferredTaskId = query.get('taskId');
            let toOpen = null;
            if (preferredTaskId) {
                toOpen = state.tasks.find(t => t.taskId === preferredTaskId) || null;
            }
            if (toOpen) {
                try {
                    await openTaskForReading(toOpen.taskId);
                } catch (error) {
                    showError(`打开内容失败：${normalizeErrorMessage(error)}`, { forceTaskList: true });
                    pushView('tasks');
                }
            } else {
                let autoOpened = false;
                if (!preferredTaskId) {
                    autoOpened = await autoEnterSingleInProgressTask();
                }
                if (!autoOpened) {
                    pushView('tasks');
                }
                if (preferredTaskId) {
                    updateUrlTaskId(null);
                }
            }
        } catch (error) {
            showError(`初始化失败：${normalizeErrorMessage(error)}`, { forceTaskList: true });
            pushView('tasks');
        }
    }

    function buildOutline(container) {
        const outlineList = document.getElementById('outlineList');
        if (!outlineList) return;

        const headings = Array.from(container.querySelectorAll('h1, h2, h3, h4'));
        state.outlineHeadings = headings;
        if (!headings.length) {
            outlineList.innerHTML = buildOutlineEmptyStateHtml();
            state.activeOutlineId = '';
            teardownScrollSpy();
            return;
        }

        const usedIds = new Set();
        const items = headings.map((heading, index) => {
            let id = heading.id ? String(heading.id).trim() : '';
            if (!id || usedIds.has(id)) {
                id = `md-heading-${index + 1}`;
            }
            while (usedIds.has(id)) {
                id = `${id}-x`;
            }
            usedIds.add(id);
            heading.id = id;
            const level = Number(heading.tagName.substring(1)) || 1;
            const text = (heading.textContent || '').trim() || `标题 ${index + 1}`;
            return `<a class="outline-item outline-level-${level}" href="javascript:void(0)" data-target-id="${id}">${escapeHtml(text)}</a>`;
        });

        outlineList.innerHTML = items.join('');
        installScrollSpy(headings);
    }

    function setActiveOutline(targetId) {
        if (!targetId) return;
        state.activeOutlineId = targetId;
        document.querySelectorAll('#outlineList .outline-item').forEach((item) => {
            const isActive = item.getAttribute('data-target-id') === targetId;
            item.classList.toggle('active', isActive);
        });
    }

    function teardownScrollSpy() {
        if (!state.scrollSpyHandler) return;
        const target = state.scrollSpyContainer || window;
        target.removeEventListener('scroll', state.scrollSpyHandler);
        if (state.scrollSpyRafId) {
            cancelAnimationFrame(state.scrollSpyRafId);
            state.scrollSpyRafId = 0;
        }
        state.scrollSpyHandler = null;
        state.scrollSpyContainer = null;
    }

    function installScrollSpy(headings) {
        teardownScrollSpy();
        if (!headings || !headings.length) return;
        const scrollContainer = document.getElementById('viewReader') || window;

        const run = () => {
            state.scrollSpyRafId = 0;
            const anchorY = 120;
            let current = headings[0];
            const containerTop = scrollContainer === window
                ? 0
                : scrollContainer.getBoundingClientRect().top;
            for (let i = 0; i < headings.length; i += 1) {
                const top = headings[i].getBoundingClientRect().top - containerTop;
                if (top <= anchorY) {
                    current = headings[i];
                } else {
                    break;
                }
            }
            if (current && current.id) {
                setActiveOutline(current.id);
            }
        };

        const handler = () => {
            if (state.scrollSpyRafId) return;
            state.scrollSpyRafId = requestAnimationFrame(run);
        };

        state.scrollSpyHandler = handler;
        state.scrollSpyContainer = scrollContainer;
        scrollContainer.addEventListener('scroll', handler, { passive: true });
        run();
    }

    function setControlLabel(control, label) {
        if (!control) return;
        const text = String(label || '');
        const labelNode = control.querySelector('[data-btn-label], .btn-label');
        if (labelNode) {
            labelNode.textContent = text;
            return;
        }
        control.textContent = text;
    }

    function applyStaticUiCopy() {
        applyComposerCopy();

        const saveBtn = document.getElementById('exportTaskBtn');
        if (saveBtn) setControlLabel(saveBtn, UI_COPY.actionSaveFile);

        const editBtn = document.getElementById('toggleEditModeBtn');
        if (editBtn) setControlLabel(editBtn, UI_COPY.actionAdjustLines);

        const viewerTitle = document.getElementById('viewerTitle');
        if (viewerTitle && !state.currentTaskId) {
            viewerTitle.textContent = UI_COPY.viewerHintRead;
        }

        const emptyNode = document.querySelector('#markdownBody .empty');
        if (emptyNode && !state.currentTaskId) {
            emptyNode.textContent = UI_COPY.viewerHintReadContent;
        }
    }

    function refreshReadingToolsPanelActions() {
        const reloadBtn = document.getElementById('reloadCurrentBtn');
        if (!reloadBtn) return;
        const shouldShowReload = !!(state.readingNeedsReload || state.readingToolsAdvancedReveal);
        reloadBtn.hidden = !shouldShowReload;
        reloadBtn.setAttribute('aria-hidden', shouldShowReload ? 'false' : 'true');
    }

    function setReadingNeedsReload(flag) {
        state.readingNeedsReload = !!flag;
        refreshReadingToolsPanelActions();
    }

    function setReadingToolsAdvancedReveal(flag) {
        state.readingToolsAdvancedReveal = !!flag;
        refreshReadingToolsPanelActions();
    }

    function setReadingToolsOpen(open) {
        const next = !!open;
        state.readingToolsOpen = next;
        if (!next) {
            state.readingToolsAdvancedReveal = false;
        }
        const panel = document.getElementById('readingToolsPanel');
        const toggleBtn = document.getElementById('readingToolsToggleBtn');
        if (panel) {
            panel.classList.toggle('open', next);
        }
        if (toggleBtn) {
            toggleBtn.setAttribute('aria-expanded', next ? 'true' : 'false');
        }
        refreshReadingToolsPanelActions();
    }

    function refreshQuickActionLabels() {
        const outlineBtn = document.getElementById('readingOutlineBtn');
        if (outlineBtn) {
            setControlLabel(outlineBtn, UI_COPY.actionOutline);
        }
    }

    function bindRootOverscrollGuard() {
        if (document.body.dataset.rootOverscrollGuardBound === '1') return;
        document.body.dataset.rootOverscrollGuardBound = '1';
        const supportsOverscrollBehavior = !!(
            window.CSS
            && typeof window.CSS.supports === 'function'
            && window.CSS.supports('overscroll-behavior-y', 'contain')
        );
        if (supportsOverscrollBehavior) {
            return;
        }

        let guardState = null;
        const selector = '.task-list, .outline-list, .markdown-body.edit-scroll-host, .app-view';
        document.addEventListener('touchstart', (event) => {
            if (!event.touches || event.touches.length !== 1) return;
            const target = event.target;
            const scrollHost = target && target.closest ? target.closest(selector) : null;
            if (!scrollHost) {
                guardState = null;
                return;
            }
            guardState = {
                y: event.touches[0].clientY,
                scrollHost,
            };
        }, { passive: true });

        document.addEventListener('touchmove', (event) => {
            if (!guardState || !event.touches || event.touches.length !== 1) return;
            const scrollHost = guardState.scrollHost;
            if (!scrollHost) return;
            const currentY = event.touches[0].clientY;
            const dy = currentY - guardState.y;
            guardState.y = currentY;
            const atTop = scrollHost.scrollTop <= 0;
            const atBottom = Math.ceil(scrollHost.scrollTop + scrollHost.clientHeight) >= scrollHost.scrollHeight;
            if ((atTop && dy > 0) || (atBottom && dy < 0)) {
                event.preventDefault();
            }
        }, { passive: false });

        const clear = () => {
            guardState = null;
        };
        document.addEventListener('touchend', clear, { passive: true });
        document.addEventListener('touchcancel', clear, { passive: true });
    }

    function bindEdgeBackNavigation() {
        return getViewNavigation().bindEdgeBackNavigation();
    }

    function clearPressedFeedbackNode() {
        if (!state.pressedNode) return;
        state.pressedNode.classList.remove('is-pressed');
        state.pressedNode = null;
    }

    function spawnTaskItemRipple(target, event) {
        if (!target || !target.classList || !target.classList.contains('task-item')) {
            return;
        }
        const rect = target.getBoundingClientRect();
        if (!rect || rect.width <= 0 || rect.height <= 0) {
            return;
        }
        const hasPoint = Number.isFinite(event.clientX) && Number.isFinite(event.clientY);
        const x = hasPoint ? (event.clientX - rect.left) : (rect.width / 2);
        const y = hasPoint ? (event.clientY - rect.top) : (rect.height / 2);
        const size = Math.max(rect.width, rect.height) * 1.72;
        const ripple = document.createElement('span');
        ripple.className = 'task-item-ripple';
        ripple.style.width = `${size}px`;
        ripple.style.height = `${size}px`;
        ripple.style.left = `${x}px`;
        ripple.style.top = `${y}px`;
        target.appendChild(ripple);
        ripple.addEventListener('animationend', () => ripple.remove(), { once: true });
        setTimeout(() => ripple.remove(), 700);
    }

    function bindPressFeedback() {
        document.addEventListener('pointerdown', (event) => {
            const source = event.target;
            if (!source || !source.closest) return;
            const target = source.closest(PRESS_FEEDBACK_SELECTOR);
            if (!target || target.hasAttribute('disabled')) return;
            clearPressedFeedbackNode();
            state.pressedNode = target;
            state.pressedNode.classList.add('is-pressed');
            spawnTaskItemRipple(target, event);
        }, { passive: true });

        const clear = () => clearPressedFeedbackNode();
        document.addEventListener('pointerup', clear, { passive: true });
        document.addEventListener('pointercancel', clear, { passive: true });
        window.addEventListener('blur', clear);
    }

    function bindPaperScrollMotion(node) {
        if (!node || node.dataset.paperScrollBound === '1') return;
        node.dataset.paperScrollBound = '1';
        node.classList.add('paper-scroll-surface');

        let lastTop = node.scrollTop;
        let rafId = 0;
        let releaseTimer = 0;
        let pendingDelta = 0;

        const relax = () => {
            node.style.setProperty('--paper-shift-y', '0px');
            node.style.setProperty('--paper-tilt-x', '0deg');
            node.style.setProperty('--paper-scale', '1');
            node.style.setProperty('--paper-shadow-alpha', '0.06');
            node.classList.remove('is-paper-scrolling');
        };

        const apply = () => {
            rafId = 0;
            const delta = pendingDelta;
            pendingDelta = 0;

            const intensity = Math.min(1, Math.abs(delta) / 34);
            const shiftY = Math.max(-6, Math.min(6, -delta * 0.24));
            const tiltX = Math.max(-1.2, Math.min(1.2, delta * 0.05));
            const scale = 1 - intensity * 0.004;
            const shadowAlpha = 0.06 + intensity * 0.16;

            node.style.setProperty('--paper-shift-y', `${shiftY.toFixed(2)}px`);
            node.style.setProperty('--paper-tilt-x', `${tiltX.toFixed(2)}deg`);
            node.style.setProperty('--paper-scale', scale.toFixed(4));
            node.style.setProperty('--paper-shadow-alpha', shadowAlpha.toFixed(3));
            node.classList.add('is-paper-scrolling');
        };

        node.addEventListener('scroll', () => {
            const nowTop = node.scrollTop;
            const delta = nowTop - lastTop;
            lastTop = nowTop;
            if (Math.abs(delta) < 0.5) return;

            pendingDelta = delta;
            if (!rafId) {
                rafId = requestAnimationFrame(apply);
            }
            if (releaseTimer) {
                clearTimeout(releaseTimer);
            }
            releaseTimer = setTimeout(relax, PAPER_SCROLL_RELAX_DELAY_MS);
        }, { passive: true });
    }

    function bindListScrollMotion() {
        bindPaperScrollMotion(document.getElementById('taskList'));
        bindPaperScrollMotion(document.getElementById('outlineList'));
    }

    document.addEventListener('DOMContentLoaded', bootstrap);
</script>
