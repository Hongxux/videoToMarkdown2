# 配置文件 - Knowledge Engine Pipeline
# 所有路径均相对于项目根目录

# 1. 视频下载配置
# -----------------------------------------------------------------------------
video:
  output_dir: "output"
  download_subdir: "downloads"
  # 视频下载代理 (可选，如: "http://127.0.0.1:7890")
  download_proxy: ""
  # 是否禁用 SSL 证书验证 (仅在遇到证书问题时启用)
  disable_ssl_verify: false

# 2. AI 服务配置
# -----------------------------------------------------------------------------
ai:
  # DeepSeek API 配置
  # ⚠️ 安全提示：请勿在此处填写 API Key！
  # 推荐方式：设置环境变量 DEEPSEEK_API_KEY
  # Windows: setx DEEPSEEK_API_KEY "sk-your-key-here"
  # Linux/Mac: export DEEPSEEK_API_KEY="sk-your-key-here"
  api_key: ""  # 留空，从环境变量读取
  base_url: "https://api.deepseek.com"
  
  # 字幕整理模型
  refinement:
    model: "deepseek-chat"
    temperature: 0.1
    chunk_size: 2000      # 每个精修批次的字符数 (可调: 1500-4000)
    max_concurrency: 0    # 最大并发数 (0 = 不限制，适用于 DeepSeek)
  
  # 内容分析模型
  analysis:
    model: "deepseek-chat"
    temperature: 0.2
    fast_model: ""        # 用于简单任务的快速模型 (可选，如 deepseek-lite)
  
  # 主题识别模型
  topic:
    model: "deepseek-chat"
    temperature: 0.1

# 3. Whisper 转录配置
# -----------------------------------------------------------------------------
whisper:
  # 模型大小: tiny, base, small, medium, large-v2, large-v3
  # 推荐: small (平衡速度与准确度)
  model_size: "tiny"
  
  # 设备: cuda, cpu
  device: "cpu"
  
  # 是否使用 HF 镜像加速 (默认 true)
  use_mirror: false
  
  # HuggingFace 下载镜像 (仅在 use_mirror 为 true 时生效)
  # 留空则默认使用 https://hf-mirror.com
  hf_endpoint: "https://hf-mirror.com"
  
  # 下载代理 (可选，例如 "http://127.0.0.1:7890")
  # 如果镜像站 404，建议通过代理连接官方 Hub
  download_proxy: ""
  
  # 计算类型 (仅 CPU): int8, int16, float32
  # 计算类型 (GPU): float16, int8_float16
  compute_type: "int8"
  
  # 转录语言 (支持 99 种语言)
  # 常用: zh(中文), en(英语), ja(日语), ko(韩语), auto(自动检测)
  # 完整列表: https://github.com/openai/whisper#available-models-and-languages
  language: "auto"
  
  # 并行转录配置
  parallel:
    enabled: true          # 是否启用并行转录
    num_workers: 3         # 并行进程数（建议 2-4）
    segment_duration: 600  # 分段时长（秒），600 = 10分钟

# 4. 处理流程配置
# -----------------------------------------------------------------------------
processing:
  # 是否启用断点续传
  resume: true
  
  # 分析时的并发数
  analysis_concurrency: 8

# 5. 提示词路径配置
# -----------------------------------------------------------------------------
prompts:
  analysis: "knowledge_engine/resources/default_prompt.md"
  topic:    "knowledge_engine/resources/topic_identification.md"
  refine:   "knowledge_engine/resources/subtitle_refinement.md"

# 6. 视觉素材提取配置
# -----------------------------------------------------------------------------
visual:
  # 并行提取的最大线程数
  # 建议值: CPU 核心数的 1-2 倍
  max_workers: 8
  
  # 是否跳过已存在的图片（断点重续）
  skip_existing: true
  
  # 每个素材提取的候选帧数 (AI 将从中选择最佳帧)
  candidate_frames: 10

# 6.1 视觉 AI 配置 (智能选帧 - ERNIE 4.5 Turbo)
# -----------------------------------------------------------------------------
vision_ai:
  # 是否启用视觉 AI 选帧
  enabled: true
  
  # 服务商: ernie
  provider: "ernie"
  
  # 认证方式: Bearer Token (千帆平台)
  # 格式: bce-v3/ALTAK-xxxxx/yyyyyyy
  bearer_token: "bce-v3/ALTAK-x6AYc7wgkWGgpiFNctZ4m/9d3bcc1873dd33283acf5c260edafdd74348a11a"
  
  # API 端点 (千帆平台 ERNIE 4.5 Turbo)
  base_url: "https://qianfan.baidubce.com/v2/chat/completions"
  
  # 文本模型名称
  model: "ernie-4.5-turbo-32k"
  
  # 视觉模型名称
  vision_model: "ernie-4.5-turbo-vl-32k"
  
  # 温度参数 (越低越稳定)
  temperature: 0.3
  
  # 每次分析的最大帧数 (建议 5-8 张)
  max_frames_per_call: 8

# 6.2 截图提取配置
# -----------------------------------------------------------------------------
screenshot_extraction:
  # 采样率 (FPS)
  fps: 1.0
  
  # 场景变化检测阈值 (0.0-1.0)
  # 像素变化超过此比例才保留帧
  change_threshold: 0.02
  
  # 每个例子最多保留的帧数
  max_frames_per_example: 10
  
  # 是否启用智能去重
  enable_deduplication: true

# 6.3 AI驱动截图配置（新版，基于缺失信息）
# -----------------------------------------------------------------------------
ai_driven_screenshot:
  # 是否启用AI驱动截图（阶段1.5）
  enabled: true
  
  # 默认质量参数
  default_quality:
    output_resolution: "1920x1080"
    image_format: "png"
    compression_quality: 95
    anti_aliasing: false
  
  # 重试配置
  retry:
    max_attempts: 3
    time_offset_step: 2.0  # 秒
    multi_frame_fallback: true
  
  # 禁忌帧检测
  forbidden_detection:
    black_screen_threshold: 30  # 亮度低于此值视为黑屏
    transition_std_threshold: 10  # 标准差低于此值视为过渡帧
  
  # 记忆必要性与质量要求映射
  necessity_quality_map:
    高:
      resolution: "1920x1080"
      clarity: 95
    中:
      resolution: "1280x720"
      clarity: 90
    低:
      resolution: "1280x720"
      clarity: 85

# 6.3 视频片段筛选配置
# -----------------------------------------------------------------------------
video_filtering:
  # 是否启用严格的3类筛选
  enable_strict_filter: true
  
  # 允许的核心内容类型
  allowed_types:
    - "动画推演原因"
    - "动画展现核心机制"
    - "实操连贯步骤"
  
  # 非核心内容的处理方式
  # "text_only": 仅使用文字描述
  # "static_screenshot": 使用静态截图
  # "skip": 完全跳过
  non_core_handling: "static_screenshot"

# 7. 视频下载配置
# -----------------------------------------------------------------------------
download:
  # 并行下载配置
  parallel:
    enabled: true     # 是否启用并行下载（默认关闭）
    max_workers: 3     # 最大并发线程数（建议 2-4）

# 8. 缓存配置
# -----------------------------------------------------------------------------
cache:
  # 是否启用 SQLite 缓存层
  enabled: true
  # 缓存数据库路径 (相对于输出目录)
  db_path: ".cache/pipeline_cache.db"
  # 缓存过期时间 (天，0 = 永不过期)
  expire_days: 30

# 9. 流水线配置 (V9 新增)
# -----------------------------------------------------------------------------
pipeline:
  # 是否启用流水线重叠 (转录完一段立即精修)
  overlap_enabled: true
  # 阶段间队列大小
  queue_size: 10
  # 多集视频最大并发处理数
  max_concurrent_episodes: 2
  
  # 多视频并行处理 (V10 - 生产者-消费者模型)
  parallel_videos: true             # 启用多视频并行处理
  download_workers: 5               # 下载并发数
  transcription_concurrency: 1      # 转录并发数 (GPU/CPU 限制)
  postprocess_workers: 8            # 后处理并发数 (精修+分析+合成)
  transcription_queue_size: 3       # 待转录队列容量

# 9. 内容分类配置
# -----------------------------------------------------------------------------
content_classification:
  # 是否启用内容分类
  enabled: false  # 默认关闭，需要时手动开启
  
  # 分类策略
  strategy: "auto"  # auto / manual
  
  # 手动覆盖（优先级最高）
  manual_override:
    type: null  # 可选: "knowledge", "opinion", "skill", "interview"
    segments: null  # 手动指定时间段（未来扩展）
  
  # 时间段分割
  segmentation:
    enabled: true  # 是否启用时间段分类
    min_duration: null  # 最小时长（秒），null = 无限制
  
  # 各类型分析重点
  analysis_focus:
    knowledge:  # 知识讲解
      - "概念定义"
      - "逻辑推导"
      - "应用场景"
      - "常见误区"
      - "相关概念"
      - "练习题"
    
    opinion:  # 观点论述
      - "逻辑链重构"
      - "思维模式分析"
      - "核心洞察"
      - "论据支撑"
    
    skill:  # 技能教学
      - "操作步骤"
      - "工具清单"
      - "材料准备"
      - "注意事项"
      - "常见错误"
      - "技巧总结"
    
    interview:  # 访谈对话
      - "问答结构"
      - "各方观点"
      - "金句提取"
      - "观点对比"
      - "共识与分歧"

# 10. 归档配置
# -----------------------------------------------------------------------------
archive:
  # 目录结构：按视频集组织
  structure: "by_episode"
  
  # 输出根目录
  output_root: "output"
  
  # 是否保留原始素材
  keep_raw_materials: true
  
  # 是否生成Word文档
  generate_docx: false
  
  # 文件命名
  naming:
    screenshot_template: "example_{example_id:02d}_frame_{frame_id:02d}.jpg"
  
  # 单一markdown文件
  single_markdown:
    enabled: true
    include_appendix: true
    include_statistics: true
  
  # 全局索引
  global_index:
    enabled: true
    auto_update: true
    filename: "全局索引.md"
  
  # Obsidian集成
  obsidian:
    use_media_extended: true  # 使用Media Extended插件格式
    video_link_format: "![[videos/video.mp4#t={start},{end}]]"
    screenshot_relative_path: true  # 使用相对路径
