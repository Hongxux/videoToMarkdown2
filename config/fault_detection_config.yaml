# =============================================================================
# 检测参数配置
# =============================================================================
detection_params:
  # 上下文窗口大小 (前后各取多少个segment)
  context_window_before: 5
  context_window_after: 5
  
  # LLM相关参数
  llm_temperature: 0.3  # 温度参数,越低越确定
  llm_model: "deepseek-chat"
  
  # 置信度阈值
  min_confidence: 0.5  # 低于此置信度的检测结果会被过滤
  
  # 并发控制
  max_concurrent_segments: 10  # 最多并发分析的segment数量

# =============================================================================
# 领域特定配置 (可选,用于领域自适应)
# =============================================================================
domain_specific:
  算法:
    # 算法领域倾向于动态过程
    class2_weight_boost:
      动态过程: 0.2
  
  AI框架:
    # AI框架领域倾向于空间结构
    class2_weight_boost:
      空间结构: 0.2
  
  数学:
    # 数学领域倾向于公式
    class2_weight_boost:
      数学公式: 0.3
