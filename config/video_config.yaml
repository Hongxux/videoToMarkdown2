  # 鈿狅笍 瀹夊叏鎻愮ず锛氳鍕垮湪姝ゅ濉啓 API Key锛?
  # 鎺ㄨ崘鏂瑰紡锛氳缃幆澧冨彉閲?DEEPSEEK_API_KEY
  # Windows: setx DEEPSEEK_API_KEY "sk-your-key-here"
  # Linux/Mac: export DEEPSEEK_API_KEY="sk-your-key-here"
  api_key: "sk-97fdd2b65e8c4d1bbfa76e617c212a3c"  # 鐣欑┖锛屼粠鐜鍙橀噺璇诲彇锛堢敓浜х幆澧冨己鐑堝缓璁級
  base_url: "https://api.deepseek.com"
  
  # 瀛楀箷鏁寸悊妯″瀷
