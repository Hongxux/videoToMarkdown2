  # 鎴栬€呬紶鍏ユ墜宸ュ鍑虹殑 Netscape Cookie 鏂囦欢璺緞
  # 鍙～鐩稿璺緞锛堢浉瀵瑰綋鍓嶅惎鍔ㄧ洰褰曪級鎴栫粷瀵硅矾寰?
  download_cookies_file: ""
  # 涓嬭浇闃舵浼樺厛閫夋嫨 H.264锛坅vc1锛夊彲瑙ｇ爜杞ㄩ亾锛屽噺灏戝悗缁?OpenCV 鍏煎闂
  # true: 浼樺厛 H.264锛屽け璐ュ啀鍥為€€鍒伴粯璁?best 閾捐矾
  # false: 淇濇寔鍘嗗彶琛屼负锛坆est -> bestvideo+bestaudio/best锛?
