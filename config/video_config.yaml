content_pipeline:
  markdown_enhancer:
    # 鏄惁鍦ㄧ粨鏋勫寲鍓嶏紝鍩轰簬鍥剧墖鎻忚堪鍋氭鏂囧閲忚ˉ鍏?
    # 榛樿寮€鍚紱鍙鐜鍙橀噺 MODULE2_ENABLE_IMG_DESC_TEXT_AUGMENT 瑕嗙洊
    enable_img_desc_text_augment: true  # false 鍙檷浣?LLM 璋冪敤鎴愭湰锛屼絾鎻忚堪琛ュ叏鑳藉姏涓嬮檷
  observability:
    llm_trace:
      # 鏄惁鍚敤 Phase2B LLM 璋冪敤杩借釜锛堥€愭钀界洏 JSONL锛?
      enabled: true  # 鐢熶骇寤鸿榛樿 false锛岄棶棰樻帓鏌ユ椂鍐嶆墦寮€
      # 杩借釜绮掑害锛歠ull=瀹屾暣 prompt/response锛泂ummary=鎴柇鎽樿
      level: "full"  # full=瀹屾暣璇锋眰/鍝嶅簲锛宻ummary=鎽樿锛堟洿鐪佺鐩橈級
      # 杈撳嚭璺緞锛堢浉瀵?result.json 鎵€鍦ㄧ洰褰曪級锛涚暀绌鸿蛋榛樿 intermediates/phase2b_llm_trace.jsonl
      output_path: "intermediates/phase2b_llm_trace.jsonl"
    image_match_audit:
      # 鏄惁钀界洏鍥剧墖鍖归厤瀹¤锛坱imestamp->sentence_id锛?
      enabled: true  # 鐢熶骇寤鸿榛樿 false锛屽紑鍚悗渚夸簬瀵归綈閿欒杩芥煡

