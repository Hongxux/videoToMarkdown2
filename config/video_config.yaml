    temperature: 0.2
    fast_model: ""        # 鐢ㄤ簬绠€鍗曚换鍔＄殑蹇€熸ā鍨嬶紱涓虹┖鏃跺洖閫€ model
  
  # 涓婚璇嗗埆妯″瀷
  topic:
    model: "deepseek-chat"
    temperature: 0.1

# 3. Whisper 杞綍閰嶇疆
# -----------------------------------------------------------------------------
whisper:
  # 杞綍绛栫暐 (Model Layer Optimization)
  # - dynamic: 鑷姩鏍规嵁瑙嗛鏃堕暱閫夋嫨妯″瀷 (鎺ㄨ崘: <10m=medium, 10-60m=large-v2, >60m=large-v3)
  # - fastest: 鏋侀€熸ā寮?(寮哄埗 base 妯″瀷 + CPU INT8锛岃€楁椂鏈€灏?
  # - custom:  鑷畾涔夋ā寮?(瀹屽叏閬靛惊涓嬫柟 model_size 閰嶇疆)
  strategy: "fastest"  # 寤鸿锛欳PU 鐜鐢?fastest锛孏PU/绮惧害浼樺厛鍙敼 dynamic

  # 妯″瀷澶у皬: tiny, base, small, medium, large-v2, large-v3
  # 浠呭湪 strategy 涓?"custom" 鏃剁敓鏁堬紝鎴栦綔涓?dynamic 鐨勫厹搴?
  model_size: "medium"  # 浠?strategy=custom 鏃剁敓鏁?
  
  # 璁惧: cuda, cpu
  device: "cpu"  # cpu/cuda锛涜嫢鏈哄櫒鏃?CUDA 璇蜂繚鎸?cpu
  
  # 鏄惁浣跨敤 HF 闀滃儚鍔犻€?(榛樿 true)
  use_mirror: false
  
  # HuggingFace 涓嬭浇闀滃儚 (浠呭湪 use_mirror 涓?true 鏃剁敓鏁?
  # 鐣欑┖鍒欓粯璁や娇鐢?https://hf-mirror.com
  hf_endpoint: "https://hf-mirror.com"
  
  # 涓嬭浇浠ｇ悊 (鍙€夛紝渚嬪 "http://127.0.0.1:7890")
  # 濡傛灉闀滃儚绔?404锛屽缓璁€氳繃浠ｇ悊杩炴帴瀹樻柟 Hub
  download_proxy: ""
  
  # 褰撴ā鍨嬫枃浠舵牎楠屽け璐ユ椂鏄惁璺宠繃鏍￠獙缁х画浣跨敤宸蹭笅杞芥枃浠?
  # true: 璺宠繃鏍￠獙澶辫触骞剁户缁紙瀹归敊浼樺厛锛?
  # false: 瑙﹀彂寮哄埗閲嶆媺锛堝畬鏁存€т紭鍏堬級
  skip_integrity_check_on_failure: true

  # 妯″瀷棣栨涓嬭浇骞舵牎楠屽悗锛屽悗缁噸鍚槸鍚﹁烦杩囬噸澶嶆牎楠?
  # true: 浠呴娆℃牎楠岋紝鍚庣画澶嶇敤鏈湴宸叉牎楠屾爣璁?
  # false: 姣忔鍚姩閮芥墽琛屾牎楠屾祦绋?
  skip_reverify_after_success: true
  
  # 璁＄畻绫诲瀷 (浠?CPU): int8, int16, float32
  # 璁＄畻绫诲瀷 (GPU): float16, int8_float16
  compute_type: "int8"
  
  # 杞綍璇█ (鏀寔 99 绉嶈瑷€)
  # 甯哥敤: zh(涓枃), en(鑻辫), ja(鏃ヨ), ko(闊╄), auto(鑷姩妫€娴?
  # 瀹屾暣鍒楄〃: https://github.com/openai/whisper#available-models-and-languages
  language: "auto"
  beam_size: 4
  vad_filter: false
  language_detect_probe_sec: 120
  
  # 骞惰杞綍閰嶇疆
  parallel:
    enabled: true          # 鏄惁鍚敤骞惰杞綍
    num_workers: 5         # 骞惰杩涚▼鏁帮紙寤鸿 2-6锛?
    segment_duration: 150  # 鍒嗘鏃堕暱锛堢锛夛紝150 = 2.5鍒嗛挓
    segment_split_threshold_sec: 300  # 鍒嗘闃堝€硷紙绉掞級锛?=璇ュ€间笉鍒嗘锛岄粯璁?鍒嗛挓
    auto_resource_scheduling: true    # 鏄惁鎸塁PU/鍐呭瓨鑷姩璋冩暣骞跺彂
    reserve_cpu_cores: 1              # 缁欑郴缁熼鐣欑殑CPU鏍稿績鏁?
    reserve_cpu_ratio: 0.1            # 缁欑郴缁熼鐣欑殑CPU姣斾緥锛?~0.8锛?
    reserve_memory_gb: 2.0            # 缁欑郴缁熼鐣欑殑鍙敤鍐呭瓨锛圙B锛?
    memory_per_worker_gb: 1.5         # 鍗曚釜骞惰Worker浼扮畻鍗犵敤鍐呭瓨锛圙B锛?
    gpu_max_workers: 1                # GPU妯″紡涓嬪苟琛屼笂闄愶紙閬垮厤鏄惧瓨浜夋姠锛?
    segments_per_worker: 2            # 闀胯棰戞ā寮忎笅姣忎釜worker鐩爣娈垫暟锛堟彁楂楥PU鍒╃敤鐜囷級
    min_segment_duration_sec: 90      # 鍗曟鏈€灏忔椂闀匡紝闃叉鍒嗘杩囩粏瀵艰嚧璋冨害寮€閿€杩囬珮
    max_segment_count: 0              # 鍒嗘涓婇檺锛?=涓嶉檺鍒讹級

# 4. 澶勭悊娴佺▼閰嶇疆
# -----------------------------------------------------------------------------
processing:
  # 鏄惁鍚敤鏂偣缁紶
  resume: true  # true=鍚敤闃舵澶嶇敤锛沠alse=姣忔鍏ㄩ噺閲嶈窇
  
  # 鍒嗘瀽鏃剁殑骞跺彂鏁?
  analysis_concurrency: 8  # 鍊艰秺澶у悶鍚愯秺楂橈紝浣嗕細澧炲姞鍐呭瓨/CPU鍘嬪姏

# 鏂偣閲嶇画锛堟枃浠跺鐢級閰嶇疆
resume_control:
  # 馃攽 涓诲紑鍏筹細鍚敤鏂偣閲嶇画
  enabled: true  # false 鏃跺皢蹇界暐鏈妭鍏朵綑鍙傛暟
  # 褰撳墠浠呮敮鎸?file_reuse
  mode: "file_reuse"
  # 澶嶇敤鏍￠獙寮哄害锛歭ight / moderate / strict
  validation: "moderate"
  # 澶嶇敤澶辨晥绛栫暐锛歳ecompute / fail_fast
  on_invalid_reuse: "recompute"
  # 闈炰紭鍏堣祫婧愪繚鐣欏ぉ鏁帮紙TTL锛?
  non_priority_retention_days: 7  # 寤鸿鑼冨洿锛?~30锛涜秺澶х鐩樺崰鐢ㄨ秺楂?
  # 浠?Phase2A 浣滀负浼樺厛闀挎湡淇濈暀璧勬簮
  priority_keep_only_phase2a: true
  # 鍒嗙粍寮€鍏筹紙鍏ㄩ儴鍚敤锛?
  groups:
    transcribe: true
    stage1_text: true
    stage1_semantic: true
    stage1_visual: true
    stage1_document: true
    phase2a: true
    assets: true
    phase2b: true

# Module2 鏂囨。澧炲己閰嶇疆
