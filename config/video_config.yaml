  # 瑙嗛涓嬭浇浠ｇ悊 (鍙€夛紝濡? "http://127.0.0.1:7890")
  download_proxy: ""
  # 鏄惁绂佺敤 SSL 璇佷功楠岃瘉 (浠呭湪閬囧埌璇佷功闂鏃跺惎鐢?
