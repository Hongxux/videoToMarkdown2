  candidate_frames: 10

# 6.1 瑙嗚 AI 閰嶇疆 (鏅鸿兘閫夊抚 - ERNIE 4.5 Turbo)
# -----------------------------------------------------------------------------
vision_ai:
  # 鏄惁鍚敤瑙嗚 AI 閫夊抚
  enabled: true  # false 鏃堕€€鍖栦负绾?CV 璺緞
  
  # 鏈嶅姟鍟? ernie
  provider: "ernie"
  
  # 璁よ瘉鏂瑰紡: Bearer Token (鍗冨竼骞冲彴)
  # 鏍煎紡: bce-v3/ALTAK-xxxxx/yyyyyyy
  bearer_token: "bce-v3/ALTAK-nnnwJXbBpYKev1JlThzKL/0b20f94354d6380385a021bcfcf4cc6ab80cff48"  # 寤鸿鐣欑┖骞朵娇鐢ㄧ幆澧冨彉閲忔敞鍏ワ紝閬垮厤瀵嗛挜娉勬紡
  
  # API 绔偣 (鍗冨竼骞冲彴 ERNIE 4.5 Turbo)
  base_url: "https://qianfan.baidubce.com/v2/chat/completions"
  
  # 妯″瀷鍚嶇О
  model: "ernie-4.5-turbo-vl-32k"  # 涓庢湇鍔″晢鍙敤妯″瀷淇濇寔涓€鑷?
  
  # 娓╁害鍙傛暟 (瓒婁綆瓒婄ǔ瀹?
  temperature: 0.1  # 寤鸿 0.0~0.3锛涜秺浣庤秺绋冲畾锛岃秺楂樿秺鍙戞暎
  
  # 姣忔鍒嗘瀽鐨勬渶澶у抚鏁?(寤鸿 5-8 寮?
  max_frames_per_call: 8  # 寤鸿 4~10锛涜繃澶у彲鑳藉鍔犳椂寤朵笌 token 鎴愭湰
  batch:
    enabled: true
    max_size: 4
    flush_ms: 20
    max_inflight_batches: 2
  # 浜虹墿涓讳綋棰勮繃婊わ紙杩涘叆 Vision API 涔嬪墠鎵ц锛?
  person_subject_filter:
    enabled: true
    # 浜虹墿钂欑増鍍忕礌鍗犳瘮 > area_threshold 鏃讹紝鐩存帴鍒ゅ畾涓?false 骞惰烦杩?Vision
    area_threshold: 0.3
    # segmentation_mask 鐨勪簩鍊煎寲闃堝€硷紙0~1锛?
    mask_threshold: 0.5
    high_conf_threshold: 0.8
    high_conf_min_area: 0.08
    # 0: General锛?: Landscape锛圡ediaPipe SelfieSegmentation锛?
    model_selection: 1
  # PP-Structure 鎷嗗浘棰勫鐞?
  structure_preprocess:
    enabled: true
    # Windows + PaddleOCR2.x 下强制关闭 IR 优化，规避 fused_conv2d / OneDNN 崩溃
    force_disable_ir_optim: true
    # 命中 oneDNN/mkldnn 后端异常时，是否自动禁用 mkldnn 后重试一次 PP-Structure
    backend_compat_retry_enabled: true
    # 缁撴瀯鍖栨媶鍥惧幓閲嶉槇鍊硷紙瓒婁綆瓒婂鏄撳悎骞讹級
    dedup_similarity_threshold: 0.6
    # bbox 閲嶅彔姣斾緥闃堝€硷細浜ら泦闈㈢Н/杈冨皬妗嗛潰绉?> 闃堝€兼椂杩涜 bbox 鍚堝苟
    bbox_overlap_merge_threshold: 0.9
    # (寰呮彁鍙?type 鐨?bbox 闈㈢Н鍜? / (鎵€鏈夎瘑鍒?type 鐨勫鎺ョ煩褰㈤潰绉? >= 闃堝€兼椂锛屽洖閫€鍘熷浘
    skip_split_bbox_coverage_threshold: 0.8

